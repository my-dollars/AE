<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Core DAO | Web3 Wallet</title>
    <script src="https://cdn.ethers.io" type="application/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --tg-bg: #0e1621;
            --tg-card: #17212b;
            --tg-blue: #2481cc;
            --accent: #00fbff;
        }
        body { background: var(--tg-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: var(--tg-card); border: 1px solid rgba(255,255,255,0.1); }
        .shimmer { animation: shimmer 2s infinite; background: linear-gradient(90deg, #2481cc, #00fbff, #2481cc); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen flex flex-col p-4">

    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold tracking-tighter uppercase">Quantum<span class="text-blue-500">Core</span></h1>
            <div class="flex items-center gap-2">
                <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest">Mainnet Live 2026</span>
            </div>
        </div>
        <button id="connectBtn" class="glass px-4 py-2 rounded-full text-xs font-bold border-blue-500/50 hover:bg-blue-600 transition">
            Connect Wallet
        </button>
    </div>

    <!-- Wallet Card (The Real Part) -->
    <div class="glass rounded-3xl p-6 mb-6 relative overflow-hidden">
        <div class="relative z-10">
            <p class="text-sm text-gray-400 mb-1">Ваш баланс</p>
            <div class="flex items-end gap-2">
                <h2 id="balance" class="text-4xl font-mono font-bold">0.00</h2>
                <span class="text-blue-400 font-bold mb-1">QTC</span>
            </div>
            <p id="walletAddress" class="text-[10px] text-gray-500 mt-4 font-mono truncate">Wallet not connected</p>
        </div>
        <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl">⚛️</div>
    </div>

    <!-- Blockchain Stats (Math & Scarcity) -->
    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="glass rounded-2xl p-4">
            <p class="text-[10px] text-gray-500 uppercase">Max Supply</p>
            <p class="font-mono text-sm">21,000,000</p>
        </div>
        <div class="glass rounded-2xl p-4">
            <p class="text-[10px] text-gray-500 uppercase">Difficulty</p>
            <p class="font-mono text-sm text-blue-400">14.2T Hash</p>
        </div>
    </div>

    <!-- DAO Governance Section -->
    <div class="flex-1">
        <h3 class="text-xs font-bold text-gray-500 uppercase px-2 mb-3 tracking-widest">DAO Governance</h3>
        <div class="space-y-3">
            <div class="glass rounded-2xl p-4 flex justify-between items-center">
                <div>
                    <p class="text-sm font-medium">Proposal #104: ZK-Privacy</p>
                    <p class="text-[10px] text-green-400">Status: Voting Active</p>
                </div>
                <button class="bg-blue-600 px-3 py-1 rounded-lg text-xs">Vote</button>
            </div>
        </div>
    </div>

    <!-- Real-time Log -->
    <div class="mt-6 glass rounded-xl p-3 h-20 overflow-hidden">
        <div id="log" class="text-[9px] font-mono text-blue-300/60 leading-tight">
            [SYS]: Awaiting Web3 Handshake...<br>
            [MATH]: Verifying Zero-Knowledge Proof Layer...
        </div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const balanceEl = document.getElementById('balance');
        const addressEl = document.getElementById('walletAddress');
        const logEl = document.getElementById('log');

        function addLog(msg) {
            const div = document.createElement('div');
            div.innerHTML = `[${new Date().toLocaleTimeString()}]: ${msg}`;
            logEl.prepend(div);
        }

        async function connect() {
            if (window.ethereum) {
                try {
                    addLog("Requesting account access...");
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    const address = await signer.getAddress();
                    const balance = await provider.getBalance(address);
                    const ethBalance = ethers.utils.formatEther(balance);

                    addressEl.innerText = address;
                    balanceEl.innerText = parseFloat(ethBalance).toFixed(4);
                    connectBtn.innerText = "Connected";
                    connectBtn.classList.add('bg-green-600');
                    
                    addLog("Encryption Layer: Active (AES-GCM)");
                    addLog(`Wallet linked: ${address.substring(0,6)}...`);
                } catch (error) {
                    addLog("Connection failed!");
                    console.error(error);
                }
            } else {
                alert("Пожалуйста, установите MetaMask или другой Web3 кошелек!");
                addLog("Error: No Web3 Provider found.");
            }
        }

        connectBtn.addEventListener('click', connect);

        // Имитация математической сложности
        setInterval(() => {
            const hashes = ["0x4a2b...", "0x9f1c...", "0xbc33...", "0x110a..."];
            addLog(`Verifying block hash: ${hashes[Math.floor(Math.random()*hashes.length)]}`);
        }, 8000);
    </script>
</body>
</html>
