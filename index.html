<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Crypto Messenger</title>
    <!-- Подключаем библиотеки напрямую из CDN. Если заблокировано - приложение выдаст ошибку -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --blue: #0088cc; --bg: #f0f2f5; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .screen { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }
        #auth-screen { justify-content: center; align-items: center; background: white; padding: 20px; box-sizing: border-box; }
        .card { width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--blue); color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: #dcf8c6; }
        .them { align-self: flex-start; background: white; }
        .footer { padding: 10px; background: white; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="auth-screen" class="screen active">
    <div class="card">
        <h2 style="color:var(--blue)">Safe Messenger</h2>
        <input id="alias" placeholder="Твой логин">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="auth('login')">Войти</button>
        <button onclick="auth('reg')" style="background:none; color:var(--blue); margin-top:5px;">Создать аккаунт</button>
        <div id="st" style="font-size:11px; margin-top:20px; color:gray;">Подключение к P2P сети...</div>
    </div>
</div>

<div id="chat-screen" class="screen">
    <header style="padding:15px; background:white; border-bottom:1px solid #ddd; font-weight:bold;">
        Чат активен <span style="float:right; color:#999; font-weight:normal;" onclick="location.reload()">Выйти</span>
    </header>
    <div id="messages"></div>
    <div class="footer">
        <input id="msg-input" style="margin:0" placeholder="Сообщение...">
        <button style="width:60px" onclick="send()">➤</button>
    </div>
</div>

<script>
    // 1. Инициализация P2P сети
    const gun = Gun(['https://gun-manhattan.herokuapp.com']);
    const user = gun.user().recall({storage: true});

    // Проверка статуса
    setInterval(() => {
        const st = document.getElementById('st');
        if (typeof Gun === 'undefined') {
            st.innerHTML = "<b style='color:red'>Ошибка: Браузер блокирует скрипты!</b>";
        } else {
            st.innerHTML = "<b style='color:green'>Система P2P готова</b>";
        }
    }, 1000);

    // 2. Авторизация
    async function auth(type) {
        const a = document.getElementById('alias').value;
        const p = document.getElementById('pass').value;
        if(!a || !p) return alert("Введите данные");

        if(type === 'reg') {
            user.create(a, p, (ack) => {
                if(ack.err) alert(ack.err); else alert("Аккаунт создан! Теперь жми Войти");
            });
        } else {
            user.auth(a, p, (ack) => {
                if(ack.err) alert("Ошибка: " + ack.err); else openChat(a);
            });
        }
    }

    // 3. Работа чата
    function openChat(name) {
        document.getElementById('auth-screen').classList.remove('active');
        document.getElementById('chat-screen').classList.add('active');
        
        // Слушаем новые сообщения в комнате
        gun.get('global_encrypted_room_p2p').map().once(async (data) => {
            if(!data || !data.text) return;
            const dec = await SEA.decrypt(data.text, 'secret_key_123');
            if(!dec) return;

            const isMe = data.who === document.getElementById('alias').value;
            const div = document.createElement('div');
            div.className = 'msg ' + (isMe ? 'me' : 'them');
            div.innerHTML = `<small style="color:var(--blue)">${data.who}</small><br>${dec}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 99999;
        });
    }

    async function send() {
        const input = document.getElementById('msg-input');
        if(!input.value) return;
        const secret = await SEA.encrypt(input.value, 'secret_key_123');
        gun.get('global_encrypted_room_p2p').set({
            who: document.getElementById('alias').value,
            text: secret
        });
        input.value = '';
    }
</script>
</body>
</html>
