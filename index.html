<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // P2P MESH CORE</title>
    <style>
        :root { --bg: #000; --green: #00ff41; --dim: #0a0a0a; --border: #1a1a1a; --safe-bot: env(safe-area-inset-bottom); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 40px 25px 20px; border-bottom: 1px solid var(--border); background: #050505; }
        .bal-val { font-size: 38px; font-weight: 900; color: var(--green); }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--dim); border-bottom: 1px solid var(--border); font-size: 8px; text-align: center; }
        .s-box { padding: 10px; border-right: 1px solid var(--border); }
        .s-box b { display: block; font-size: 10px; color: #fff; margin-top: 2px; }

        .viewport { flex: 1; overflow-y: auto; padding: 15px; background: #020202; padding-bottom: 100px; }
        .block-card { background: #080808; border: 1px solid var(--border); padding: 12px; margin-bottom: 8px; border-left: 3px solid var(--green); cursor: pointer; }
        .block-card:active { opacity: 0.7; }
        .hash-tag { font-size: 8px; color: #444; word-break: break-all; margin-top: 5px; }

        /* FIXED CONTROLS */
        .controls { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); padding: 15px 20px calc(15px + var(--safe-bot)); z-index: 100; }
        .tx-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .input { flex: 1; background: #000; border: 1px solid var(--border); color: var(--green); padding: 12px; font-size: 11px; outline: none; }
        .btn { width: 100%; background: var(--green); color: #000; border: none; padding: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn:disabled { background: #111; color: #333; }
        
        /* EXPLORER MODAL */
        #explorer { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; padding: 30px; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 8px; color: #444; letter-spacing: 2px;">NETWORK ASSET VALUE (AXN)</div>
    <div class="bal-val" id="ui-bal">0.0000</div>
    <div id="ui-node" style="font-size: 8px; color: #333; margin-top: 5px;">PEER ID: DISCONNECTED</div>
</header>

<div class="stats-grid">
    <div class="s-box">БЛОКИ<b id="ui-h">0</b></div>
    <div class="s-box">СЛОЖНОСТЬ<b id="ui-d">3</b></div>
    <div class="s-box">РЕЖИМ<b>DECENTRAL</b></div>
</div>

<div class="viewport" id="chain-view"></div>

<div class="controls">
    <div class="tx-bar">
        <input type="text" id="tx-addr" class="input" placeholder="ADDR...">
        <input type="number" id="tx-amt" class="input" style="max-width: 70px;" placeholder="AMT">
        <button class="btn" style="padding: 0 15px; width: auto;" onclick="Core.sendTx()">➤</button>
    </div>
    <button id="mine-btn" class="btn" onclick="Core.mine()">ПОДТВЕРДИТЬ БЛОК (POW)</button>
</div>

<div id="explorer" onclick="this.style.display='none'">
    <h2 style="color: var(--green); margin-bottom: 20px;">EXPLORER</h2>
    <div id="exp-content" style="font-size: 10px; line-height: 1.8; color: #888;"></div>
    <p style="margin-top: 30px; color: #333; font-size: 9px;">[ НАЖМИТЕ, ЧТОБЫ ВЫЙТИ ]</p>
</div>

<script>
const Core = {
    chain: JSON.parse(localStorage.getItem('axon_p2p_v4') || '[]'),
    mempool: [],

    init() {
        this.render();
        this.updateUI();
        // В будущем здесь инициализация WebRTC (PeerJS)
    },

    async sha256(s) {
        const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
        return Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join('');
    },

    sendTx() {
        const addr = document.getElementById('tx-addr').value;
        const amt = document.getElementById('tx-amt').value;
        if(!addr || !amt) return;
        this.mempool.push({ to: addr, amt: amt, ts: Date.now() });
        alert("Транзакция в мемпуле. Она станет частью блокчейна после майнинга.");
        document.getElementById('tx-addr').value = '';
        document.getElementById('tx-amt').value = '';
    },

    async mine() {
        const btn = document.getElementById('mine-btn');
        btn.disabled = true; btn.innerText = "ХЕШИРОВАНИЕ...";
        
        let nonce = 0;
        let prev = this.chain.length > 0 ? this.chain[0].hash : "0".repeat(64);
        let hash = "";
        const diff = 3 + Math.floor(this.chain.length / 10); // Рост сложности каждые 10 блоков
        const target = "0".repeat(diff);

        while (true) {
            nonce++;
            hash = await this.sha256(prev + nonce + JSON.stringify(this.mempool));
            if (nonce % 1000 === 0) await new Promise(r => setTimeout(r, 0));
            if (hash.startsWith(target)) break;
        }

        const block = {
            h: this.chain.length + 1,
            hash: hash,
            prev: prev,
            n: nonce,
            txs: [...this.mempool],
            r: 50 / Math.pow(2, Math.floor(this.chain.length / 100)), // Халвинг каждые 100 блоков
            ts: new Date().toLocaleString()
        };

        this.chain.unshift(block);
        this.mempool = [];
        localStorage.setItem('axon_p2p_v4', JSON.stringify(this.chain.slice(0, 50)));
        
        this.render();
        this.updateUI();
        btn.disabled = false; btn.innerText = "ПОДТВЕРДИТЬ БЛОК (POW)";
    },

    openExplorer(h) {
        const b = this.chain.find(x => x.h === h);
        if(!b) return;
        document.getElementById('exp-content').innerHTML = `
            <b>BLOCK HEIGHT:</b> ${b.h}<br>
            <b>HASH:</b> ${b.hash}<br>
            <b>PREVIOUS:</b> ${b.prev}<br>
            <b>NONCE:</b> ${b.n}<br>
            <b>TIMESTAMP:</b> ${b.ts}<br>
            <b>REWARD:</b> ${b.r} AXN<br>
            <b>TRANSACTIONS:</b> ${b.txs.length || 'NONE'}
        `;
        document.getElementById('explorer').style.display = 'flex';
    },

    render() {
        const view = document.getElementById('chain-view');
        view.innerHTML = this.chain.map(b => `
            <div class="block-card" onclick="Core.openExplorer(${b.h})">
                <div style="display:flex; justify-content:space-between">
                    <b>BLOCK #${b.h}</b>
                    <span style="color:#444">${b.ts.split(',')[1]}</span>
                </div>
                <div class="hash-tag">${b.hash}</div>
            </div>
        `).join('');
    },

    updateUI() {
        const bal = this.chain.reduce((s, b) => s + b.r, 0);
        document.getElementById('ui-bal').innerText = bal.toFixed(4);
        document.getElementById('ui-h').innerText = this.chain.length;
        document.getElementById('ui-d').innerText = 3 + Math.floor(this.chain.length / 10);
    }
};
window.onload = () => Core.init();
</script>
</body>
</html>
