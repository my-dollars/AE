<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Chat</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://js.pusher.com"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #2c2c2c; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 80%; }
        .controls { padding: 15px; background: #1f1f1f; }
        input { width: 90%; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2c2c2c; color: white; }
    </style>
</head>
<body>
    <div id="chat"><div class="msg">Enter password and wait for messages.</div></div>
    <div class="controls">
        <input type="password" id="pass" placeholder="Secret Password">
    </div>
    <script>
        const pusher = new Pusher('89ebab06ba698e6e5944', { cluster: 'eu' });
        const channel = pusher.subscribe('my-channel');
        channel.bind('my-event', function(data) {
            const password = document.getElementById('pass').value;
            if (!password) return;
            try {
                const bytes = CryptoJS.AES.decrypt(data.message, password);
                const text = bytes.toString(CryptoJS.enc.Utf8);
                if (text) {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = text;
                    document.getElementById('chat').appendChild(div);
                }
            } catch (e) {}
        });
    </script>
</body>
</html>
