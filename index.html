<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Chat</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; width: 280px; text-align: center; border: 1px solid #333; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <h3>Вход в чат</h3>
        <input id="user" placeholder="Имя">
        <input id="key" type="password" placeholder="Ключ комнаты">
        <button onclick="enterChat()">Войти в чат</button>
        <p id="info" style="font-size: 10px; color: #666; margin-top: 10px;">Шифрование через браузер (AES-GCM)</p>
    </div>

    <div id="chat-screen" class="hidden" style="width: 100%; height: 100%; flex-direction: column;">
        <header style="padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333;">Чат активен</header>
        <div id="box" style="flex: 1; padding: 20px; overflow-y: auto;"></div>
        <div style="padding: 10px; display: flex; gap: 10px; background: #1e1e1e;">
            <input id="msg" style="margin:0" placeholder="Сообщение...">
            <button style="width: 60px;" onclick="alert('Для отправки нужны библиотеки GunDB. Скачай их в репозиторий!')">➤</button>
        </div>
    </div>

    <script>
        function enterChat() {
            const u = document.getElementById('user').value;
            const k = document.getElementById('key').value;
            if(!u || !k) return alert("Введи имя и ключ!");

            // Переключаем интерфейс БЕЗ проверки библиотек
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-screen').style.display = 'flex';
            
            console.log("Интерфейс переключен. Пользователь:", u);
        }
    </script>
</body>
</html>
