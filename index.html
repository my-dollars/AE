<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Chat</title>
    <!-- Подключаем всё одним бандлом для стабильности -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 320px; text-align: center; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; background: #f0f2f5; position: fixed; top: 0; left: 0; }
        .active { display: flex; }
        h2 { margin-bottom: 20px; color: #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #0088cc; color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .secondary { background: none; color: #0088cc; margin-top: 15px; border: 1px solid #0088cc; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #e5ddd5; }
        .msg { padding: 8px 12px; border-radius: 10px; background: white; max-width: 80%; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .footer { padding: 10px; background: white; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ЛОГИНА -->
    <div id="auth-screen" class="card">
        <h2>Вход в чат</h2>
        <input id="alias" placeholder="Логин">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="doLogin()">Войти</button>
        <button class="secondary" onclick="doRegister()">Создать аккаунт</button>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="screen">
        <div style="background:#0088cc; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
            <span>Crypto Chat</span>
            <span onclick="location.reload()">Выход</span>
        </div>
        <div id="messages"></div>
        <div class="footer">
            <input id="msg-input" placeholder="Сообщение...">
            <button style="width:60px;" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        // Инициализация
        const gun = Gun(['https://gun-manhattan.herokuapp.com']);
        const user = gun.user();

        // 1. Создание аккаунта
        function doRegister() {
            const a = document.getElementById('alias').value;
            const p = document.getElementById('pass').value;
            if(!a || !p) return alert("Заполни поля!");

            user.create(a, p, (ack) => {
                if(ack.err) alert("Ошибка: " + ack.err);
                else alert("Аккаунт " + a + " создан! Теперь жми Войти");
            });
        }

        // 2. Вход
        function doLogin() {
            const a = document.getElementById('alias').value;
            const p = document.getElementById('pass').value;
            
            user.auth(a, p, (ack) => {
                if(ack.err) alert("Неверный логин/пароль");
                else {
                    // ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
                    document.getElementById('auth-screen').style.display = 'none';
                    document.getElementById('chat-screen').classList.add('active');
                    startApp();
                }
            });
        }

        // 3. Работа чата
        async function send() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;
            const secret = await SEA.encrypt(input.value, 'room123'); // Шифруем
            gun.get('global-chat-v1').set({ name: document.getElementById('alias').value, text: secret });
            input.value = '';
        }

        function startApp() {
            gun.get('global-chat-v1').map().once(async (data) => {
                if(!data || !data.text) return;
                const dec = await SEA.decrypt(data.text, 'room123');
                const div = document.createElement('div');
                div.className = 'msg ' + (data.name === document.getElementById('alias').value ? 'me' : '');
                div.innerText = data.name + ": " + dec;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = 99999;
            });
        }
    </script>
</body>
</html>
