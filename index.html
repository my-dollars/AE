<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AICORE NODE v1.0</title>
    <!-- Загружаем библиотеки с надежных CDN -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F2F2F7; font-family: -apple-system, system-ui, sans-serif; }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .tab-btn.active { color: #007AFF; border-bottom: 2px solid #007AFF; }
        .mono { font-family: ui-monospace, SFMono-Regular, monospace; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen">

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="p-6 pt-20">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter text-gray-900">AI<span class="text-blue-600">CORE</span></h1>
            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mt-2">Decentralized P2P Ledger</p>
        </div>
        
        <div class="ios-card p-6 space-y-4">
            <input id="alias" type="text" class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:ring-1 ring-blue-400" placeholder="Логин (ID)">
            <input id="pass" type="password" class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-gray-100 focus:ring-1 ring-blue-400" placeholder="Пароль (Ключ)">
            
            <div class="grid grid-cols-2 gap-3 pt-2">
                <button onclick="signUp()" class="w-full py-4 bg-gray-100 text-gray-900 rounded-xl font-bold text-xs uppercase hover:bg-gray-200 transition">Создать</button>
                <button onclick="signIn()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200 hover:bg-blue-700 transition">Войти</button>
            </div>
        </div>
        <p class="text-[9px] text-center text-gray-400 mt-6 uppercase font-bold tracking-tighter">Математическая защита: SHA-256 + PBKDF2</p>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app" class="hidden flex flex-col min-h-screen">
        <header class="p-5 bg-white border-b border-gray-100 flex justify-between items-center sticky top-0 z-50">
            <span id="user-display" class="font-black italic text-blue-600 tracking-tighter uppercase text-sm">USER</span>
            <div class="flex items-center gap-3">
                <div id="net-indicator" class="w-2 h-2 bg-yellow-400 rounded-full"></div>
                <button onclick="location.reload()" class="text-[10px] font-bold text-red-500 uppercase">Выход</button>
            </div>
        </header>

        <!-- ВКЛАДКА: КОШЕЛЕК -->
        <main id="tab-wallet" class="p-4 space-y-4 flex-1">
            <div class="ios-card p-8 text-center border border-white">
                <p class="text-[10px] uppercase font-black text-gray-300 tracking-[0.3em] mb-3">Available AIC</p>
                <h2 id="balance" class="text-6xl font-black tracking-tighter text-gray-900">0.00</h2>
                <div class="mt-6 p-3 bg-blue-50 rounded-xl">
                    <p class="text-[8px] text-blue-400 uppercase font-bold mb-1">Public Address Hash</p>
                    <p id="pub-key" class="mono text-[9px] text-blue-600 break-all opacity-70"></p>
                </div>
            </div>

            <div class="ios-card p-5 space-y-3">
                <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Network Info</h3>
                <div class="flex justify-between text-xs border-b border-gray-50 pb-2">
                    <span class="text-gray-400">Total Supply:</span>
                    <span class="font-bold font-mono">21,000,000</span>
                </div>
                <div class="flex justify-between text-xs">
                    <span class="text-gray-400">Security Layer:</span>
                    <span id="security-status" class="text-red-500 font-bold uppercase">Disabled</span>
                </div>
            </div>
        </main>

        <!-- ВКЛАДКА: МАЙНИНГ -->
        <main id="tab-mine" class="p-4 space-y-4 hidden flex-1">
            <div class="ios-card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic">MINING UNIT</h2>
                    <span id="hashrate" class="mono text-blue-600 text-xs font-bold">0 H/s</span>
                </div>
                <div class="bg-gray-900 rounded-xl p-4 h-48 overflow-y-auto mb-4 mono text-[9px] text-green-400 leading-relaxed" id="mine-logs">
                    > Initialize miner...<br>
                    > System ready.
                </div>
                <button id="mine-btn" onclick="toggleMining()" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-200">Start PoW Node</button>
            </div>
        </main>

        <!-- НАВИГАЦИЯ -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-3 pb-8">
            <button onclick="switchTab('wallet')" id="btn-wallet" class="tab-btn active px-6 py-2 font-bold text-[10px] uppercase tracking-widest">Wallet</button>
            <button onclick="switchTab('mine')" id="btn-mine" class="tab-btn px-6 py-2 font-bold text-[10px] uppercase tracking-widest">Mining</button>
        </nav>
    </div>

    <script>
        // Инициализация Gun БЕЗ блокировки интерфейса
        const gun = Gun({
            peers: ['https://gun-manhattan.herokuapp.com'],
            localStorage: true
        });
        const user = gun.user();
        const ledger = gun.get('aicore_final_ledger_21m');
        
        let isMining = false;
        let myBalance = 0;

        // --- ФУНКЦИИ ВХОДА ---
        function signUp() {
            const alias = document.getElementById('alias').value;
            const pass = document.getElementById('pass').value;
            if(!alias || !pass) return alert("Введите данные!");
            
            user.create(alias, pass, (ack) => {
                if(ack.err) alert(ack.err);
                else alert("Аккаунт создан! Теперь нажмите Войти.");
            });
        }

        function signIn() {
            const alias = document.getElementById('alias').value;
            const pass = document.getElementById('pass').value;
            
            user.auth(alias, pass, (ack) => {
                if(ack.err) return alert("Ошибка входа: " + ack.err);
                
                // Переход в приложение
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = alias;
                document.getElementById('pub-key').innerText = user.is.pub;
                document.getElementById('net-indicator').classList.replace('bg-yellow-400', 'bg-green-500');
                
                // Подгрузка баланса
                ledger.get(alias).on(data => {
                    myBalance = data ? data.bal : 0;
                    document.getElementById('balance').innerText = parseFloat(myBalance).toFixed(2);
                });
            });
        }

        // --- МАЙНИНГ ---
        async function toggleMining() {
            isMining = !isMining;
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('security-status');
            const logs = document.getElementById('mine-logs');

            if(isMining) {
                btn.innerText = "Stop Node";
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                status.innerText = "Enabled (Active)";
                status.className = "text-green-500 font-bold uppercase";
                runMining();
            } else {
                btn.innerText = "Start PoW Node";
                btn.classList.replace('bg-red-500', 'bg-blue-600');
                status.innerText = "Disabled";
                status.className = "text-red-500 font-bold uppercase";
            }
        }

        async function runMining() {
            const logs = document.getElementById('mine-logs');
            while(isMining) {
                const nonce = Math.random().toString(36);
                const hash = await Gun.SEA.work(nonce, 'salt'); // Математическое усложнение
                
                document.getElementById('hashrate').innerText = Math.floor(Math.random()*100 + 400) + " H/s";

                // Условие успеха (нахождение блока)
                if(hash.includes('00')) {
                    myBalance += 0.10;
                    ledger.get(user.is.alias).put({ bal: myBalance });
                    logs.innerHTML += `<br>> Блок найден! +0.10 AIC. Hash: ${hash.substring(0,12)}...`;
                    logs.scrollTop = logs.scrollHeight;
                }
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        // --- ВКЛАДКИ ---
        function switchTab(tab) {
            document.getElementById('tab-wallet').classList.add('hidden');
            document.getElementById('tab-mine').classList.add('hidden');
            document.getElementById('btn-wallet').classList.remove('active');
            document.getElementById('btn-mine').classList.remove('active');
            
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
