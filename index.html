<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | SECURE</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 110px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 40px; left: 0; right: 0; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #000; border-top: 1px solid #111; z-index: 100; }
        .btn { background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 9px; padding: 12px; cursor: pointer; border-radius: 5px; text-transform: uppercase; flex: 1; }
        .on { color: #00ff88 !important; text-shadow: 0 0 10px #00ff88; animation: b 2s infinite; }
        @keyframes b { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="toast" style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; display: none; z-index: 200;"></div>
    <div class="top">
        <input type="text" id="u" placeholder="ИМЯ" value="USER" style="width: 70px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">ОФЛАЙН</span>
        <input type="text" id="k" placeholder="КЛЮЧ" style="width: 70px;">
    </div>
    <div id="msgs"></div>
    <div class="bot" id="btns"><button onclick="window.gen()" class="btn">ГЕНЕРИРОВАТЬ</button><button onclick="window.join()" class="btn">ПРИСОЕДИНИТЬСЯ</button></div>
    <div class="bot" id="chat" style="display: none;"><input type="text" id="mi" placeholder="VIBRATION..." style="flex: 1; text-align: left; border-bottom: 1px solid #d4af3730;"><button onclick="window.send()" class="btn" style="flex: 0; padding: 15px 30px;">SEND</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, get, set } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            authDomain: "aurachat-f9d4f.firebaseapp.com",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            storageBucket: "aurachat-f9d4f.firebasestorage.app",
            messagingSenderId: "532846952097",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentRef;

        const notify = (t) => {
            const e = document.getElementById('toast');
            e.innerText = t; e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 3000);
        };

        window.gen = async () => {
            const k = "AX-" + Math.floor(100 + Math.random() * 899);
            document.getElementById('k').value = k;
            await set(ref(db, 'keys/' + k + '/active'), true);
            notify("КЛЮЧ СОЗДАН: " + k);
            connect(k);
        };

        window.join = async () => {
            const k = document.getElementById('k').value.trim();
            if(!k) return notify("ВВЕДИТЕ КЛЮЧ");
            const s = await get(ref(db, 'keys/' + k));
            if (s.exists()) { notify("КЛЮЧ АКТИВИРОВАН"); connect(k); }
            else { notify("КЛЮЧ НЕ ВЕРЕН"); }
        };

        const connect = (k) => {
            document.getElementById('st').innerText = "ОНЛАЙН";
            document.getElementById('st').className = "on";
            document.getElementById('btns').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            currentRef = ref(db, 'keys/' + k + '/msgs');
            onChildAdded(currentRef, (s) => {
                const d = s.val();
                const div = document.createElement('div');
                div.className = 'm';
                div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${d.u} • ${d.t}</div>${d.m}`;
                document.getElementById('msgs').appendChild(div);
                document.getElementById('msgs').scrollTop = 99999;
            });
        };

        window.send = () => {
            const m = document.getElementById('mi').value;
            if(!m || !currentRef) return;
            const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            push(currentRef, { u: document.getElementById('u').value, m, t });
            document.getElementById('mi').value = '';
        };
    </script>
</body>
</html>
