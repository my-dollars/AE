<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | LUXURY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        input { background: transparent; border-bottom: 1px solid #222; text-align: center; color: white; outline: none; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; }
        .indicator { width: 6px; height: 6px; border-radius: 50%; background: #222; transition: 0.5s; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #messages { flex: 1; overflow-y: auto; padding: 100px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="fixed top-0 w-full flex justify-between p-8 bg-[#050505] z-50">
        <input type="text" id="user" placeholder="NAME" value="USER" class="w-24">
        <div id="dot" class="indicator self-center"></div>
        <input type="text" id="room" placeholder="ROOM" value="LOBBY" class="w-24">
    </div>
    <div id="messages"></div>
    <div class="p-8 bg-[#050505] border-t border-[#111] flex gap-4">
        <input type="text" id="msg-input" placeholder="VIBRATION..." class="flex-1 text-left uppercase">
        <button onclick="handle()" id="btn" class="text-[10px] font-bold tracking-[3px]">JOIN</button>
    </div>
    <script>
        let socket, connected = false;
        const serverUrl = "https://ae-production.up.railway.app"; // ТВОЙ СЕРВЕР

        function handle() {
            const u = document.getElementById('user').value;
            const r = document.getElementById('room').value;
            const i = document.getElementById('msg-input');

            if (!connected) {
                socket = io(serverUrl);
                socket.on("connect", () => {
                    connected = true;
                    document.getElementById('dot').classList.add('online');
                    document.getElementById('btn').innerText = "SEND";
                    socket.emit("join", { user: u, room: r });
                });
                socket.on("update", (d) => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `<div class="opacity-20 text-[7px] mb-1">${d.u} • ${d.t}</div>${d.m}`;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = 99999;
                });
            } else if (i.value.trim()) {
                socket.emit("message", { user: u, room: r, msg: i.value });
                i.value = '';
            }
        }
    </script>
</body>
</html>
