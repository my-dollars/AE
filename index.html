<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Chat</title>
    <!-- Пытаемся загрузить библиотеки снова -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 320px; text-align: center; }
        .hidden { display: none !important; }
        #chat-screen { width: 100%; height: 100%; flex-direction: column; background: #e5ddd5; position: fixed; top: 0; left: 0; display: none; }
        #chat-screen.active { display: flex; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #0088cc; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        #status { font-size: 10px; color: red; margin-top: 10px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВХОД -->
    <div id="auth-screen" class="card">
        <h2>Вход в чат</h2>
        <input id="alias" placeholder="Логин">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="handleLogin()">Войти</button>
        <button onclick="handleReg()" style="background:none; color:#0088cc; margin-top:10px;">Создать аккаунт</button>
        <div id="status">Проверка системы...</div>
    </div>

    <!-- ЭКРАН 2: ПРИЛОЖЕНИЕ -->
    <div id="chat-screen">
        <div style="background:#0088cc; color:white; padding:15px; font-weight:bold;">
            Чат запущен!
        </div>
        <div id="msg-box" style="flex:1; padding:20px;">
            Привет! Если ты это видишь, интерфейс переключился.
        </div>
        <div style="padding:10px; background:white; display:flex;">
            <input id="m" style="flex:1" placeholder="Сообщение">
            <button style="width:60px" onclick="alert('Отправлено (тест)')">➤</button>
        </div>
    </div>

    <script>
        // Проверка: загрузились ли библиотеки
        window.onload = function() {
            const status = document.getElementById('status');
            if (typeof Gun !== 'undefined') {
                status.style.color = "green";
                status.innerText = "Система готова к работе";
            } else {
                status.innerText = "Ошибка: Библиотеки заблокированы браузером!";
            }
        };

        const gun = (typeof Gun !== 'undefined') ? Gun(['https://gun-manhattan.herokuapp.com']) : null;

        function handleReg() {
            alert("Пытаюсь создать аккаунт...");
            if(!gun) return alert("Ошибка: Нет связи с сервером Gun");
            
            const a = document.getElementById('alias').value;
            const p = document.getElementById('pass').value;
            
            gun.user().create(a, p, (ack) => {
                if(ack.err) alert("Ошибка: " + ack.err);
                else alert("Готово! Теперь входи.");
            });
        }

        function handleLogin() {
            // МГНОВЕННОЕ ПЕРЕКЛЮЧЕНИЕ ДЛЯ ПРОВЕРКИ
            console.log("Клик по 'Войти'");
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.add('active');
            
            // Здесь должна быть реальная проверка пароля, 
            // но мы сначала проверяем, работает ли вообще переключение
        }
    </script>
</body>
</html>
