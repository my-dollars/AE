<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: 'Inter', sans-serif; margin: 0; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }
        input { background: transparent; border-bottom: 1px solid #222; text-align: center; color: white; outline: none; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; transition: 0.3s; }
        input:focus { border-color: #d4af37; }
        .indicator { width: 8px; height: 8px; border-radius: 50%; background: #1a1a1a; transition: 0.5s; margin: 0 20px; }
        .online { background: #00ff88; box-shadow: 0 0 15px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        #messages { flex: 1; overflow-y: auto; padding: 120px 30px 30px; display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth; }
        .msg { border-left: 1px solid rgba(212, 175, 55, 0.2); padding-left: 20px; font-size: 14px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg-info { display: flex; justify-content: space-between; width: 100%; opacity: 0.2; font-size: 8px; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        ::-webkit-scrollbar { width: 1px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; }
    </style>
</head>
<body>

    <!-- Верхняя панель управления -->
    <div class="fixed top-0 w-full flex justify-center items-center p-8 bg-gradient-to-b from-[#050505] to-transparent z-50">
        <input type="text" id="user-input" placeholder="USER" value="ADMIN" class="w-24">
        <div id="status-dot" class="indicator"></div>
        <input type="text" id="room-input" placeholder="ROOM" value="LOBBY" class="w-24">
    </div>

    <!-- Область сообщений -->
    <div id="messages">
        <div style="text-align: center; opacity: 0.1; font-size: 9px; letter-spacing: 5px; margin-top: 30vh;">AURA INITIALIZED</div>
    </div>

    <!-- Нижняя панель ввода -->
    <div class="p-8 bg-[#050505] border-t border-[#111] flex gap-6 items-center">
        <input type="text" id="msg-input" placeholder="TYPE VIBRATION..." class="flex-1 text-left uppercase py-2">
        <button onclick="handleAction()" id="action-btn" class="text-[10px] font-bold tracking-[4px] hover:text-white transition-colors">JOIN</button>
    </div>

    <script>
        // Твоя конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isConnected = false;
        let roomRef = null;

        function handleAction() {
            const user = document.getElementById('user-input').value.trim();
            const room = document.getElementById('room-input').value.trim();
            const msgInput = document.getElementById('msg-input');
            const btn = document.getElementById('action-btn');

            if (!user || !room) return;

            if (!isConnected) {
                // ПЕРВЫЙ КЛИК: ПОДКЛЮЧЕНИЕ
                isConnected = true;
                document.getElementById('status-dot').classList.add('online');
                btn.innerText = "SEND";
                document.getElementById('messages').innerHTML = ""; 
                
                roomRef = db.ref('rooms/' + room);
                roomRef.on('child_added', (snapshot) => {
                    const data = snapshot.val();
                    const time = data.timestamp || "";
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `
                        <div class="msg-info">
                            <span>${data.user}</span>
                            <span>${time}</span>
                        </div>
                        <div style="color: #eee; font-weight: 200;">${data.text}</div>
                    `;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                });
            } else if (msgInput.value.trim()) {
                // ПОСЛЕДУЮЩИЕ КЛИКИ: ОТПРАВКА С ДАТОЙ
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                roomRef.push({ 
                    user: user, 
                    text: msgInput.value,
                    timestamp: now // Интегрированная дата
                });
                msgInput.value = '';
            }
        }

        // Отправка по нажатию Enter
        document.getElementById('msg-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") handleAction();
        });
    </script>
</body>
</html>
