<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Node v2.0</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #0a0b10; color: #00f2ff; font-family: monospace; margin: 0; padding: 20px; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #00f2ff; color: #00f2ff; padding: 10px; width: 80%; margin: 10px 0; border-radius: 5px; }
        button { background: #00f2ff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        button:active { opacity: 0.7; }
        #console { background: #000; height: 100px; overflow-y: auto; font-size: 10px; text-align: left; padding: 10px; border: 1px solid #333; color: #3fb950; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- ЭКРАН АВТОРИЗАЦИИ -->
    <div id="auth-screen" class="card">
        <h2>NODE LOGIN</h2>
        <input type="password" id="node-pass" placeholder="Придумайте пароль">
        <button onclick="login()">ENTER SYSTEM</button>
    </div>

    <!-- ЭКРАН МАЙНИНГА -->
    <div id="main-screen" class="hidden">
        <div class="card">
            <div style="font-size: 10px; color: #8b949e;">BALANCE</div>
            <div id="bal" style="font-size: 32px; font-weight: bold;">0.00</div>
            <div id="status" style="font-size: 10px; margin-top: 10px;">IDLE</div>
        </div>
        
        <button id="mineBtn" onclick="toggleMining()">START MINER</button>
        <br><br>
        <div id="console"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let minerWorker;
        let isMining = false;
        let state = {
            bal: parseFloat(localStorage.getItem('bc_bal')) || 0,
            height: 0,
            diff: 3,
            lastHash: "genesis_hash"
        };

        function login() {
            const pass = document.getElementById('node-pass').value;
            if (pass.length < 4) return alert("Пароль слишком короткий");
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            log("System authorized.");
            updateUI();
        }

        function log(m) {
            const c = document.getElementById('console');
            c.innerHTML += `> ${m}<br>`;
            c.scrollTop = c.scrollHeight;
        }

        function updateUI() {
            document.getElementById('bal').innerText = state.bal.toFixed(4);
        }

        function toggleMining() {
            if (!isMining) {
                isMining = true;
                document.getElementById('mineBtn').innerText = "STOP MINER";
                document.getElementById('status').innerText = "MINING...";
                
                // Запуск воркера
                minerWorker = new Worker('worker.js');
                minerWorker.postMessage({ height: state.height, lastHash: state.lastHash, difficulty: state.diff });
                
                minerWorker.onmessage = function(e) {
                    if (e.data.status === 'found') {
                        state.bal += 50;
                        state.height++;
                        state.lastHash = e.data.hash;
                        log(`Found! Hash: ${e.data.hash.substr(0,10)}`);
                        localStorage.setItem('bc_bal', state.bal);
                        updateUI();
                        tg.HapticFeedback.notificationOccurred('success');
                        // Перезапуск для следующего блока
                        minerWorker.postMessage({ height: state.height, lastHash: state.lastHash, difficulty: state.diff });
                    } else {
                        document.getElementById('status').innerText = `NONCE: ${e.data.nonce}`;
                    }
                };
            } else {
                isMining = false;
                minerWorker.terminate();
                document.getElementById('mineBtn').innerText = "START MINER";
                document.getElementById('status').innerText = "STOPPED";
                log("Miner terminated.");
            }
        }
    </script>
</body>
</html>
