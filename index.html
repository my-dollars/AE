<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Chat</title>
    <!-- Библиотеки: Pusher для связи и CryptoJS для шифрования -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://js.pusher.com"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .header { padding: 15px; background: #1f1f1f; text-align: center; border-bottom: 1px solid #333; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #2c2c2c; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 80%; word-wrap: break-word; }
        .controls { padding: 15px; background: #1f1f1f; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2c2c2c; color: white; outline: none; }
        #password-input { border-color: #f44336; } /* Выделяем поле пароля */
    </style>
</head>
<body>

<div class="header">
    <strong>🔐 Crypto Chat</strong><br>
    <small>Ключ Pusher: 89eb...5944</small>
</div>

<div id="chat">
    <div class="msg">Система: Введите пароль и ждите сообщений из Debug Console.</div>
</div>

<div class="controls">
    <input type="password" id="password-input" placeholder="Введите СЕКРЕТНЫЙ ПАРОЛЬ">
    <p style="font-size: 10px; margin: 0; color: #888;">* Сообщения без этого пароля не расшифруются</p>
</div>

<script>
    // Настройки из твоего скриншота
    const PUSHER_KEY = '89ebab06ba698e6e5944';
    const PUSHER_CLUSTER = 'eu';

    const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
    const channel = pusher.subscribe('my-channel'); // Имя канала из скрина
    const chatDiv = document.getElementById('chat');
    const passInput = document.getElementById('password-input');

    // СЛУШАЕМ СООБЩЕНИЯ
    channel.bind('my-event', function(data) {
        const password = passInput.value;
        if (!password) {
            addMessage("Система: Получено зашифрованное сообщение, но пароль не введен!");
            return;
        }

        try {
            // Расшифровка AES
            const bytes = CryptoJS.AES.decrypt(data.message, password);
            const originalText = bytes.toString(CryptoJS.enc.Utf8);

            if (originalText) {
                addMessage(originalText);
            } else {
                addMessage("⚠ Ошибка: Неверный пароль!");
            }
        } catch (e) {
            addMessage("⚠ Ошибка: Данные повреждены или не зашифрованы.");
        }
    });

    function addMessage(text) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.textContent = text;
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    }
</script>
</body>
</html>
