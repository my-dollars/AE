<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | LUXURY CHAT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #d4af37; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .glass { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); width: 100%; max-width: 450px; border-radius: 40px; padding: 30px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        input { background: transparent; border-bottom: 1px solid #222; text-align: center; text-transform: uppercase; letter-spacing: 0.2em; font-size: 10px; padding: 10px; transition: 0.4s; color: white; width: 100%; margin-bottom: 20px; }
        input:focus { border-color: #d4af37; outline: none; }
        .btn { background: #d4af37; color: black; font-weight: bold; border-radius: 50px; padding: 15px; width: 100%; letter-spacing: 0.2em; font-size: 10px; transition: 0.5s; cursor: pointer; }
        
        /* Мигающий индикатор */
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; display: inline-block; margin-right: 10px; transition: 0.5s; }
        .online { background: #00ff88; box-shadow: 0 0 15px #00ff88; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #chat-area { margin-top: 30px; height: 300px; overflow-y: auto; border-top: 1px solid #222; padding-top: 20px; display: none; }
        .msg { margin-bottom: 15px; font-size: 12px; }
        .msg-user { color: #d4af37; font-size: 8px; text-transform: uppercase; margin-bottom: 2px; opacity: 0.5; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; }
    </style>
</head>
<body>

    <div class="glass">
        <h1 style="text-align: center; letter-spacing: 0.5em; font-weight: 200; margin-bottom: 40px;">AURA</h1>
        
        <!-- Поля ввода -->
        <input type="text" id="username" placeholder="NAME">
        <input type="text" id="room-id" placeholder="ROOM ID">
        
        <!-- Кнопка с индикатором -->
        <button id="main-btn" onclick="toggleConnection()" class="btn">
            <span id="dot" class="status-dot"></span>
            <span id="btn-text">ENTER FREQUENCY</span>
        </button>

        <!-- Область чата (появится ниже) -->
        <div id="chat-area">
            <div id="messages"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <input type="text" id="msg-input" placeholder="MESSAGE..." style="margin-bottom: 0; text-align: left;">
                <button onclick="sendMsg()" style="color: #d4af37; font-size: 10px; letter-spacing: 0.1em;">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            authDomain: "aurachat-f9d4f.firebaseapp.com",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            storageBucket: "aurachat-f9d4f.firebasestorage.app",
            messagingSenderId: "532846952097",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let connected = false;
        let roomRef = null;

        function toggleConnection() {
            const user = document.getElementById('username').value.trim();
            const room = document.getElementById('room-id').value.trim();

            if (!user || !room) return alert("FILL NAME AND ROOM");

            if (!connected) {
                // ВХОД
                connected = true;
                document.getElementById('dot').classList.add('online');
                document.getElementById('btn-text').innerText = "ONLINE / EXIT";
                document.getElementById('chat-area').style.display = 'block';
                
                roomRef = db.ref('rooms/' + room);
                roomRef.on('child_added', (s) => {
                    const d = s.val();
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `<div class="msg-user">${d.user}</div><div>${d.text}</div>`;
                    document.getElementById('messages').appendChild(div);
                    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                });
            } else {
                // ВЫХОД
                location.reload();
            }
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const user = document.getElementById('username').value;
            if (!input.value.trim() || !roomRef) return;
            
            roomRef.push({ user: user, text: input.value });
            input.value = '';
        }

        // Отправка по Enter
        document.getElementById('msg-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMsg();
        });
    </script>
</body>
</html>
