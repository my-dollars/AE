<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // Quantum-Safe Node</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00ff41; --text: #fff; --dim: #666; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* New Entropy Auth Screen */
        #auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        #entropy-canvas { border: 1px solid var(--accent); border-radius: 50%; width: 150px; height: 150px; margin: 20px 0; cursor: crosshair; position: relative; overflow: hidden; }
        #entropy-progress { position: absolute; bottom: 0; left: 0; width: 0%; height: 4px; background: var(--accent); transition: 0.1s; }
        
        .header { padding: 40px 20px 20px; border-bottom: 1px solid var(--border); }
        .bal-val { font-size: 40px; font-weight: 800; margin: 5px 0; color: var(--text); }
        .addr-box { font-family: monospace; font-size: 10px; color: var(--accent); background: #080808; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); display: inline-block; }

        .tabs { display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 12px 22px; border-radius: 14px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--text); color: #000; }

        .content { flex: 1; overflow-y: auto; padding: 10px 20px 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 15px; }
        .log { background: #050505; border: 1px solid var(--border); border-radius: 15px; padding: 15px; font-family: monospace; font-size: 10px; color: var(--accent); height: 180px; overflow-y: auto; line-height: 1.6; }
        
        .btn { width: 100%; background: var(--accent); color: #000; padding: 18px; border-radius: 16px; border: none; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <h2 style="letter-spacing: 2px;">AXON GENESIS</h2>
        <p style="font-size: 12px; color: var(--dim); margin-top: 10px;">Двигайте пальцем по кругу для сбора энтропии</p>
        
        <div id="entropy-canvas">
            <canvas id="e-draw" width="150" height="150"></canvas>
            <div id="entropy-progress"></div>
        </div>

        <div id="key-preview" style="font-family: monospace; font-size: 10px; color: var(--dim); word-break: break-all; margin-top: 10px;">GENERATE_HASH_...</div>
        <button id="init-btn" class="btn" style="margin-top: 30px; display: none;" onclick="Core.finalizeAuth()">Создать уникальный ключ</button>
    </div>

    <header class="header">
        <div style="font-size: 10px; color: var(--dim); text-transform: uppercase;">Node Balance</div>
        <div class="bal-val"><span id="total-bal">150.00</span> <small style="font-size: 16px; color: var(--dim);">AXN</small></div>
        <div class="addr-box" id="node-addr">AX-QUANTUM-SHIELD</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="UI.tab(this, 'p-main')">Обзор</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-mine')">Майнинг</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-dao')">Управление</button>
    </div>

    <div class="content">
        <div id="p-main" class="page active">
            <div id="log" class="log">> Ожидание инициализации...</div>
        </div>

        <div id="p-mine" class="page">
            <div class="card" style="text-align: center;">
                <div style="font-size: 12px; color: var(--dim);">Mining Yield</div>
                <div id="yield" style="font-size: 32px; font-weight: 800; margin: 15px 0;">0.0000</div>
                <button class="btn" id="mine-btn" onclick="Core.toggleMining()">Активировать узел</button>
            </div>
        </div>

        <div id="p-dao" class="page">
            <div class="card">
                <h3>BIP-51: Пост-квантовая защита</h3>
                <div style="height: 4px; background: #222; margin: 20px 0; border-radius: 2px;">
                    <div id="vote-bar" style="width: 42%; height: 100%; background: var(--accent);"></div>
                </div>
                <button class="btn" style="background: #fff; color: #000;" onclick="Core.vote()">Поддержать (10 AXN)</button>
            </div>
        </div>
    </div>

    <script>
        const Core = {
            bal: 150.00,
            active: false,
            entropy: [],
            hash: '',

            collectEntropy(e) {
                if (this.entropy.length >= 200) return;
                const touch = e.touches ? e.touches[0] : e;
                this.entropy.push(`${touch.clientX}${touch.clientY}${Date.now()}`);
                
                const progress = (this.entropy.length / 200) * 100;
                document.getElementById('entropy-progress').style.width = progress + '%';
                
                if (this.entropy.length === 200) {
                    document.getElementById('init-btn').style.display = 'block';
                    document.getElementById('key-preview').innerText = "ENTROPY_READY_HASH_LOCKED";
                }
            },

            async finalizeAuth() {
                // Создание "неподбираемого" ключа через SHA-256 (имитация)
                const rawString = this.entropy.join('-');
                const msgBuffer = new TextEncoder().encode(rawString);
                const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                this.hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('node-addr').innerText = 'AX-' + this.hash.substring(0, 14).toUpperCase();
                this.log("Node Initialized with Quantum-Safe Key.");
                this.log("Auth Status: <span style='color:#fff'>DETERMINISTIC_LOCK_ON</span>");
            },

            log(m) {
                const l = document.getElementById('log');
                l.innerHTML = `[${new Date().toLocaleTimeString()}] > ${m}<br>` + l.innerHTML;
            },

            toggleMining() {
                this.active = !this.active;
                const btn = document.getElementById('mine-btn');
                btn.innerText = this.active ? "Остановить" : "Запустить";
                btn.style.background = this.active ? "#ff4141" : "var(--accent)";
                if (this.active) this.mine();
            },

            mine() {
                if (!this.active) return;
                const reward = 0.0055;
                this.bal += reward;
                document.getElementById('total-bal').innerText = this.bal.toFixed(4);
                document.getElementById('yield').innerText = reward.toFixed(4);
                this.log(`Packet Relayed. Reward: +${reward} AXN`);
                UI.haptic(30);
                setTimeout(() => this.mine(), 3000);
            },

            vote() {
                if(this.bal < 10) return;
                this.bal -= 10;
                document.getElementById('total-bal').innerText = this.bal.toFixed(4);
                document.getElementById('vote-bar').style.width = '55%';
                this.log("Governance vote signed & broadcasted.");
                UI.haptic(100);
            }
        };

        const UI = {
            tab(btn, id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                this.haptic(5);
            },
            haptic(ms) { if(window.navigator.vibrate) window.navigator.vibrate(ms); }
        };

        const canvas = document.getElementById('e-draw');
        canvas.addEventListener('mousemove', (e) => Core.collectEntropy(e));
        canvas.addEventListener('touchmove', (e) => Core.collectEntropy(e));
    </script>
</body>
</html>
