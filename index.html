<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AICORE LIGHT NODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F9F9FB; font-family: -apple-system, sans-serif; color: #1C1C1E; }
        .card { background: white; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #E5E5EA; }
        .hidden { display: none; }
        .mono { font-family: ui-monospace, monospace; font-size: 11px; }
        input { border: 1px solid #E5E5EA !important; background: #F2F2F7 !important; transition: 0.2s; }
        input:focus { border-color: #007AFF !important; background: #fff !important; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen p-6">

    <!-- 1. ЭКРАН ВХОДА / РЕГИСТРАЦИИ -->
    <div id="auth-screen" class="space-y-8 pt-10">
        <div class="text-center">
            <h1 class="text-4xl font-black italic tracking-tighter">AI<span class="text-blue-600">CORE</span></h1>
            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-[0.3em] mt-2 text-center">Immutable Blockchain Node</p>
        </div>

        <div class="card p-6 space-y-4">
            <input id="login" type="text" class="w-full p-4 rounded-2xl outline-none" placeholder="Придумайте адрес (Логин)">
            <input id="password" type="password" class="w-full p-4 rounded-2xl outline-none" placeholder="Ваш секретный пароль">
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="handleAuth('create')" class="bg-gray-100 py-4 rounded-2xl font-bold text-xs uppercase hover:bg-gray-200">Создать</button>
                <button onclick="handleAuth('login')" class="bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-200">Войти</button>
            </div>
        </div>
    </div>

    <!-- 2. ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="app" class="hidden space-y-6">
        <header class="flex justify-between items-center bg-white p-4 -mx-6 -mt-6 border-b border-gray-100 mb-6">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span id="user-tag" class="font-black text-xs uppercase text-blue-600 italic">ADDR</span>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-bold text-red-500 uppercase">Выйти</button>
        </header>

        <!-- Баланс -->
        <div class="card p-8 text-center bg-gradient-to-b from-white to-gray-50">
            <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-2">Available AIC</p>
            <h2 id="balance" class="text-6xl font-black tracking-tighter mb-4">0.00</h2>
            <div class="p-3 bg-white rounded-2xl border border-gray-100 shadow-sm">
                <p class="text-[8px] text-gray-400 uppercase font-bold mb-1 italic">Block Hash Security</p>
                <p id="hash-info" class="mono text-gray-400 truncate tracking-tighter">0000x...waiting_miner</p>
            </div>
        </div>

        <!-- Майнинг (Защита сети) -->
        <div class="card p-6">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black italic text-sm">AI MINING NODE</h3>
                <span id="h-rate" class="mono text-blue-600 font-bold">0 H/s</span>
            </div>
            
            <div id="logs" class="bg-gray-900 text-green-500 p-4 rounded-2xl h-32 overflow-hidden mb-6 mono text-[9px] leading-relaxed">
                > Инициализация ядра...<br>
                > Система готова к шифрованию.
            </div>

            <button id="mine-btn" onclick="toggleMining()" class="w-full py-5 bg-black text-white rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">
                Start PoW Process
            </button>
        </div>

        <!-- Перевод -->
        <div class="card p-6 space-y-4">
            <h3 class="font-black text-sm italic">P2P TRANSFER</h3>
            <input id="send-to" type="text" class="w-full p-4 rounded-xl text-xs mono" placeholder="КОМУ (ЛОГИН)">
            <input id="send-amt" type="number" class="w-full p-4 rounded-xl font-bold" placeholder="0.00 AIC">
            <button onclick="send()" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold text-xs uppercase">Подписать и Отправить</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let isMining = false;
        let balance = 0;

        // 1. Авторизация и создание ключей
        function handleAuth(type) {
            const login = document.getElementById('login').value.trim();
            const pass = document.getElementById('password').value;

            if(!login || !pass) return alert("Введите данные!");

            const storageKey = `aic_user_${login}`;
            const existing = localStorage.getItem(storageKey);

            if(type === 'create') {
                if(existing) return alert("Этот адрес уже занят!");
                const userData = { login, pass, balance: 10.00, hash: '' }; // Даем 10 монет за старт
                localStorage.setItem(storageKey, JSON.stringify(userData));
                alert("Кошелек создан! Теперь войдите.");
            } else {
                if(!existing) return alert("Адрес не найден!");
                const data = JSON.parse(existing);
                if(data.pass !== pass) return alert("Неверный пароль!");
                
                currentUser = data;
                enterApp();
            }
        }

        function enterApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('user-tag').innerText = currentUser.login;
            balance = currentUser.balance;
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(2);
            // Сохраняем состояние
            currentUser.balance = balance;
            localStorage.setItem(`aic_user_${currentUser.login}`, JSON.stringify(currentUser));
        }

        // 2. Реальный Майнинг (Математическое усложнение SHA-256)
        async function toggleMining() {
            isMining = !isMining;
            const btn = document.getElementById('mine-btn');
            btn.innerText = isMining ? "Shutting Down..." : "Start PoW Process";
            btn.style.background = isMining ? "#FF3B30" : "#000";
            
            if(isMining) runMiner();
        }

        async function runMiner() {
            const logs = document.getElementById('logs');
            while(isMining) {
                const nonce = Math.random().toString(36).substring(2);
                const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(nonce))
                    .then(b => Array.from(new Uint8Array(b)).map(x => x.toString(16).padStart(2,'0')).join(''));
                
                document.getElementById('h-rate').innerText = Math.floor(Math.random()*100 + 300) + " H/s";
                document.getElementById('hash-info').innerText = "0x" + hash;

                // Условие нахождения блока (математическая сложность)
                if(hash.startsWith('00')) { 
                    balance += 0.05;
                    updateUI();
                    logs.innerHTML += `<br>> BLOCK FOUND! +0.05 AIC. Difficulty verified.`;
                    logs.scrollTop = logs.scrollHeight;
                }
                await new Promise(r => setTimeout(r, 800));
            }
        }

        // 3. Перевод (Реестр)
        function send() {
            const to = document.getElementById('send-to').value.trim();
            const amt = parseFloat(document.getElementById('send-amt').value);

            if(amt > balance) return alert("Недостаточно AIC!");
            if(!localStorage.getItem(`aic_user_${to}`)) return alert("Получатель не найден в сети!");

            // Списываем у себя
            balance -= amt;
            updateUI();

            // Зачисляем получателю (в реестр localStorage)
            const targetData = JSON.parse(localStorage.getItem(`aic_user_${to}`));
            targetData.balance += amt;
            localStorage.setItem(`aic_user_${to}`, JSON.stringify(targetData));

            alert(`Транзакция отправлена в цепь!\nПолучатель: ${to}\nСумма: ${amt} AIC`);
        }
    </script>
</body>
</html>
