<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // GENESIS v4.6</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00ff41; --text: #fff; --dim: #666; --border: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* AUTH SCREEN - FIXED GLOW */
        #auth-gate { 
            position: fixed; inset: 0; background: var(--bg); z-index: 2000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 30px; text-align: center;
        }
        
        .entropy-container { position: relative; width: 260px; height: 260px; margin: 20px 0; display: flex; align-items: center; justify-content: center; }
        #entropy-svg { transform: rotate(-90deg); width: 220px; height: 220px; z-index: 5; }
        .circle-bg { fill: none; stroke: #111; stroke-width: 6; }
        .circle-progress { 
            fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; 
            stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.1s linear;
        }

        /* Исправление квадрата: мягкое свечение через градиент под SVG */
        .glow-layer {
            position: absolute; width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(0,255,65,0.15) 0%, transparent 70%);
            border-radius: 50%; z-index: 1; pointer-events: none;
        }

        #e-touch { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; cursor: crosshair; }

        .btn { 
            width: 100%; max-width: 320px; background: var(--accent); color: #000; 
            padding: 20px; border-radius: 20px; border: none; font-weight: 800; 
            font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-init { opacity: 0; transform: translateY(10px); pointer-events: none; }
        .btn-init.ready { opacity: 1; transform: translateY(0); pointer-events: auto; }
        
        /* КНОПКА АВТОРИЗАЦИИ */
        .btn-vault { 
            background: transparent; border: 1px solid var(--border); color: var(--dim); 
            display: none; margin-top: 20px; font-size: 13px;
        }
        .btn-vault.show { display: block; }

        /* MAIN UI */
        header { padding: 40px 20px 20px; border-bottom: 1px solid var(--border); }
        .bal-main { font-size: 42px; font-weight: 800; display: flex; align-items: baseline; gap: 8px; }
        .addr-tag { font-family: monospace; font-size: 11px; color: var(--accent); background: #0a0a0a; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px; display: inline-block; }

        .tabs { display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .tab-btn { background: var(--card); border: 1px solid var(--border); color: var(--dim); padding: 12px 22px; border-radius: 14px; font-size: 13px; font-weight: 700; white-space: nowrap; cursor: pointer; }
        .tab-btn.active { background: var(--text); color: #000; }

        .content { flex: 1; overflow-y: auto; padding: 10px 20px 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 22px; margin-bottom: 15px; }
        .log-box { background: #050505; border: 1px solid var(--border); border-radius: 18px; padding: 15px; font-family: monospace; font-size: 11px; color: var(--accent); height: 200px; overflow-y: auto; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="auth-gate">
        <h2 style="letter-spacing: 4px; font-weight: 900;">AXON GENESIS</h2>
        <p style="font-size: 12px; color: var(--dim); margin-top: 10px;">Сбор квантовой энтропии для ключа</p>
        
        <div class="entropy-container">
            <div class="glow-layer" id="glow-fx"></div>
            <svg id="entropy-svg" viewBox="0 0 200 200">
                <circle class="circle-bg" cx="100" cy="100" r="95"></circle>
                <circle id="progress-line" class="circle-progress" cx="100" cy="100" r="95"></circle>
            </svg>
            <canvas id="e-touch" width="260" height="260"></canvas>
        </div>

        <div id="status-label" style="font-family: monospace; font-size: 10px; color: var(--dim);">ENTROPY: 0%</div>
        
        <button id="init-btn" class="btn btn-init" onclick="Core.finalizeAuth(false)">Создать новый ключ</button>
        <button id="vault-btn" class="btn btn-vault" onclick="Core.finalizeAuth(true)">Войти в профиль <span id="v-addr"></span></button>
    </div>

    <header>
        <div style="font-size: 10px; color: var(--dim); text-transform: uppercase; font-weight: 800;">Node Balance</div>
        <div class="bal-main"><span id="total-bal">0.0000</span> <small style="font-size:18px; color:var(--dim)">AXN</small></div>
        <div class="addr-tag" id="node-addr">AX-OFFLINE</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="UI.tab(this, 'p-main')">Обзор</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-mine')">Майнинг</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-tx')">Перевод</button>
    </div>

    <div class="content">
        <div id="p-main" class="page active">
            <div id="log" class="log-box">> Система готова...</div>
        </div>
        <div id="p-mine" class="page">
            <div class="card" style="text-align:center;">
                <div id="yield-val" style="font-size:32px; font-weight:800; color:var(--accent); margin-bottom:15px;">0.0000</div>
                <button class="btn" style="opacity:1; pointer-events:auto; transform:none;" id="mine-btn" onclick="Core.toggleMining()">Запустить узел</button>
            </div>
        </div>
        <div id="p-tx" class="page">
            <input type="text" id="tx-to" class="input" style="width:100%; background:var(--card); border:1px solid var(--border); color:#fff; padding:18px; border-radius:16px; margin-bottom:15px; outline:none;" placeholder="AX-XXXX-XXXX">
            <button class="btn" style="opacity:1; pointer-events:auto; transform:none;" onclick="Core.transfer()">Отправить</button>
        </div>
    </div>

    <script>
        const Core = {
            state: { bal: 0.0, active: false, entropy: [], hash: '' },

            init() {
                const vault = localStorage.getItem('axon_vault_v4');
                if (vault) {
                    const data = JSON.parse(atob(vault));
                    document.getElementById('vault-btn').classList.add('show');
                    document.getElementById('v-addr').innerText = 'AX-' + data.hash.substring(0, 8).toUpperCase();
                }
            },

            collectEntropy(e) {
                if (this.state.entropy.length >= 200) return;
                const touch = e.touches ? e.touches[0] : e;
                this.state.entropy.push(`${touch.clientX}${touch.clientY}${Date.now()}`);
                
                const percent = this.state.entropy.length / 200;
                document.getElementById('progress-line').style.strokeDashoffset = 628 - (percent * 628);
                document.getElementById('status-label').innerText = `ENTROPY: ${Math.round(percent * 100)}%`;
                
                // Усиливаем свечение при заполнении
                document.getElementById('glow-fx').style.background = `radial-gradient(circle, rgba(0,255,65,${0.15 + (percent * 0.2)}) 0%, transparent 70%)`;
                
                if (this.state.entropy.length >= 200) {
                    document.getElementById('init-btn').classList.add('ready');
                }
                if(window.navigator.vibrate) window.navigator.vibrate(2);
            },

            async finalizeAuth(isVault) {
                if (isVault) {
                    const data = JSON.parse(atob(localStorage.getItem('axon_vault_v4')));
                    this.state.hash = data.hash;
                    this.state.bal = data.bal;
                } else {
                    const raw = this.state.entropy.join('-');
                    const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
                    this.state.hash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                    this.state.bal = 150.0;
                }
                
                localStorage.setItem('axon_vault_v4', btoa(JSON.stringify({hash: this.state.hash, bal: this.state.bal})));
                document.getElementById('auth-gate').style.display = 'none';
                document.getElementById('node-addr').innerText = 'AX-' + this.state.hash.substring(0, 12).toUpperCase();
                this.updateUI();
                this.log(isVault ? "Авторизация успешна. Данные восстановлены." : "Новый узел создан.");
            },

            updateUI() {
                document.getElementById('total-bal').innerText = this.state.bal.toFixed(4);
                if(this.state.hash) localStorage.setItem('axon_vault_v4', btoa(JSON.stringify({hash: this.state.hash, bal: this.state.bal})));
            },

            log(m) {
                const l = document.getElementById('log');
                l.innerHTML = `<span style="color:#444">[${new Date().toLocaleTimeString()}]</span> > ${m}<br>` + l.innerHTML;
            },

            toggleMining() {
                this.state.active = !this.state.active;
                const b = document.getElementById('mine-btn');
                b.innerText = this.state.active ? "Остановить" : "Запустить";
                b.style.background = this.state.active ? "#ff4141" : "var(--accent)";
                if (this.state.active) this.mine();
            },

            mine() {
                if (!this.state.active) return;
                const reward = 0.0075;
                this.state.bal += reward;
                document.getElementById('yield-val').innerText = `+${reward.toFixed(4)}`;
                this.updateUI();
                setTimeout(() => this.mine(), 4000);
            }
        };

        const UI = {
            tab(btn, id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        };

        const canvas = document.getElementById('e-touch');
        ['mousemove', 'touchmove'].forEach(e => {
            canvas.addEventListener(e, (ev) => { ev.preventDefault(); Core.collectEntropy(ev); }, { passive: false });
        });

        window.onload = () => Core.init();
    </script>
</body>
</html>
