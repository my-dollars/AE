<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA</title>
    <!-- Используем надежный CDN для PeerJS -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 20px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 80px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        /* Кнопка и ввод приподняты выше (защита от клавиатуры) */
        .bot { position: fixed; bottom: 20px; left: 0; right: 0; padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #111; }
        .on { color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top">
        <input type="text" id="u" placeholder="NAME" value="USER" style="width: 80px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">OFFLINE</span>
        <input type="text" id="r" placeholder="ROOM ID" style="width: 80px;">
    </div>
    <div id="msgs"></div>
    <div class="bot">
        <input type="text" id="i" placeholder="MESSAGE..." style="flex: 1; text-align: left;">
        <button onclick="conn()" id="btn" style="background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 10px; padding: 10px 15px; cursor: pointer; border-radius: 5px;">JOIN</button>
    </div>

    <script>
        let peer, connection, user;
        function conn() {
            user = document.getElementById('u').value || "ANON";
            const room = document.getElementById('r').value;
            if(!room) return alert("ENTER ROOM ID");

            document.getElementById('st').innerText = "CONNECTING...";
            peer = new Peer(room); // Пытаемся создать комнату

            peer.on('open', (id) => {
                document.getElementById('st').innerText = "HOSTING";
                document.getElementById('st').className = "on";
            });

            peer.on('connection', (c) => {
                connection = c;
                setup();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    // Если комната занята — подключаемся как гость
                    peer = new Peer();
                    peer.on('open', () => {
                        connection = peer.connect(room);
                        setup();
                    });
                } else {
                    document.getElementById('st').innerText = "OFFLINE";
                }
            });
        }

        function setup() {
            document.getElementById('st').innerText = "ONLINE";
            document.getElementById('st').className = "on";
            document.getElementById('btn').innerText = "SEND";
            document.getElementById('btn').onclick = send;
            connection.on('data', (d) => add(d.u, d.m));
        }

        function send() {
            const m = document.getElementById('i').value;
            if(!m || !connection) return;
            connection.send({ u: user, m: m });
            add(user, m);
            document.getElementById('i').value = "";
        }

        function add(u, m) {
            const d = document.createElement('div');
            d.className = 'm';
            d.innerHTML = `<div style="opacity:0.2; font-size:7px;">${u}</div>${m}`;
            document.getElementById('msgs').appendChild(d);
            document.getElementById('msgs').scrollTop = 99999;
        }
    </script>
</body>
</html>
