<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Blockchain Node</title>
    <script src="https://telegram.org"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 18px; color: var(--neon); font-weight: bold; }
        
        #console { background: #000; height: 150px; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: 11px; overflow-y: auto; color: #3fb950; margin-bottom: 20px; }
        
        .mine-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 15px;
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .mine-btn:active { transform: scale(0.98); }
        .mining-active { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">Баланс</div>
            <div class="stat-value" id="balance">0.00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Сложность</div>
            <div class="stat-value" id="difficulty">4</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Блок №</div>
            <div class="stat-value" id="block-height">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Награда</div>
            <div class="stat-value" id="reward">50.0</div>
        </div>
    </div>

    <div id="console">Initializing Node v1.0.26...<br>Waiting for operator...</div>

    <button class="mine-btn" id="actionBtn" onclick="toggleMining()">START MINING</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let isMining = false;
        let blockchain = {
            height: 0,
            balance: parseFloat(localStorage.getItem('bc_balance')) || 0,
            difficulty: 4,
            reward: 50
        };

        function log(msg) {
            const con = document.getElementById('console');
            con.innerHTML += `> ${msg}<br>`;
            con.scrollTop = con.scrollHeight;
        }

        function updateUI() {
            document.getElementById('balance').innerText = blockchain.balance.toFixed(2);
            document.getElementById('block-height').innerText = blockchain.height;
            document.getElementById('difficulty').innerText = blockchain.difficulty;
            document.getElementById('reward').innerText = blockchain.reward;
        }

        // Базовая функция переключения состояния
        function toggleMining() {
            isMining = !isMining;
            const btn = document.getElementById('actionBtn');
            if(isMining) {
                btn.innerText = "MINING IN PROGRESS...";
                btn.classList.add('mining-active');
                log("Mining worker started...");
                startMiningLoop();
            } else {
                btn.innerText = "START MINING";
                btn.classList.remove('mining-active');
                log("Mining suspended.");
            }
            tg.HapticFeedback.impactOccurred('medium');
        }

        updateUI();
    </script>
</body>
</html>
