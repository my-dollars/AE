<!DOCTYPE html>
<html>
<head>
    <title>CryptoChat</title>
    <!-- Подключаем библиотеку для шифрования и связи -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://js.pusher.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; }
        #chat { border: 1px solid #333; height: 300px; overflow-y: scroll; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
        input { width: 80%; padding: 10px; background: #222; border: 1px solid #444; color: white; }
        button { padding: 10px; background: #075e54; color: white; border: none; border-radius: 5px; }
        .msg { margin-bottom: 8px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h2>Private Chat</h2>
    <input type="password" id="secret" placeholder="Секретный пароль (ключ)">
    <div id="chat"></div>
    <form id="send-form">
        <input type="text" id="message" placeholder="Сообщение..." required>
        <button type="submit">Отправить</button>
    </form>

    <script>
        // 1. НАСТРОЙКА PUSHER (вставь свой ключ)
        const pusher = new Pusher('ТВОЙ_APP_KEY', { cluster: 'eu' });
        const channel = pusher.subscribe('my-chat');
        const secretInput = document.getElementById('secret');

        // 2. ПОЛУЧЕНИЕ И РАСШИФРОВКА
        channel.bind('message', function(data) {
            const secret = secretInput.value;
            if (!secret) return alert('Введите пароль для расшифровки!');
            
            try {
                const bytes = CryptoJS.AES.decrypt(data.text, secret);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                
                if (decryptedText) {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = "> " + decryptedText;
                    document.getElementById('chat').appendChild(div);
                }
            } catch (e) { console.log("Ошибка ключа"); }
        });

        // 3. ШИФРОВАНИЕ И ОТПРАВКА
        document.getElementById('send-form').onsubmit = async (e) => {
            e.preventDefault();
            const text = document.getElementById('message').value;
            const secret = secretInput.value;

            if (!secret) return alert('Установите пароль!');

            // Шифруем текст
            const encrypted = CryptoJS.AES.encrypt(text, secret).toString();

            // Отправляем зашифрованный текст через Pusher API (нужен бэкенд или Debug Console)
            console.log("Зашифровано для отправки:", encrypted);
            document.getElementById('message').value = '';
        };
    </script>
</body>
</html>
