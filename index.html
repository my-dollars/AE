<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoChat</title>
    <!-- Подключаем GunDB и модули шифрования -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>
    <div id="auth">
        <input id="alias" placeholder="Имя">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="signUp()">Создать аккаунт</button>
        <button onclick="signIn()">Войти</button>
    </div>

    <div id="chat-ui" style="display:none;">
        <div id="messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc;"></div>
        <input id="msg-input" placeholder="Сообщение...">
        <button onclick="send()">Отправить</button>
    </div>

    <script>
        const gun = Gun(['https://gun-manhattan.herokuapp.com']); // Публичный узел для синхронизации
        const user = gun.user().recall({storage: true});

        // Регистрация
        async function signUp() {
            user.create(document.getElementById('alias').value, document.getElementById('pass').value, (ack) => {
                if (ack.err) alert(ack.err); else signIn();
            });
        }

        // Вход
        async function signIn() {
            user.auth(document.getElementById('alias').value, document.getElementById('pass').value, (ack) => {
                if (ack.err) alert(ack.err); else {
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('chat-ui').style.display = 'block';
                    loadMessages();
                    requestNotifications(); // Просим разрешение на уведомления
                }
            });
        }

        // Отправка (сообщение шифруется ключом группы/пользователя)
        async function send() {
            const secret = await SEA.encrypt(document.getElementById('msg-input').value, 'наш-общий-ключ');
            gun.get('our-secret-chat-room').set(secret);
            document.getElementById('msg-input').value = '';
        }

        // Получение и расшифровка
        async function loadMessages() {
            gun.get('our-secret-chat-room').map().once(async (data) => {
                const dec = await SEA.decrypt(data, 'наш-общий-ключ');
                if (dec) {
                    const div = document.createElement('div');
                    div.innerText = dec;
                    document.getElementById('messages').appendChild(div);
                    showNotification(dec); // Пуш, если свернуто
                }
            });
        }

        function requestNotifications() {
            Notification.requestPermission();
        }

        function showNotification(text) {
            if (Notification.permission === 'granted' && document.hidden) {
                new Notification('Новое сообщение', { body: text });
            }
        }
    </script>
</body>
</html>
