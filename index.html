<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeChat</title>
    <!-- Загружаем библиотеки через надежный CDN -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 280px; margin: auto; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #0088cc; color: white; font-weight: bold; cursor: pointer; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; background: white; max-width: 70%; align-self: flex-start; }
        .msg.me { align-self: flex-end; background: #effdde; }
        .footer { padding: 10px; background: white; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="screen active">
        <div class="card">
            <h2>Вход в чат</h2>
            <input id="alias" placeholder="Логин">
            <input id="pass" type="password" placeholder="Пароль">
            <button onclick="handleAuth('login')">Войти</button>
            <button onclick="handleAuth('reg')" style="background:none; color:#0088cc; margin-top:10px;">Создать аккаунт</button>
            <p id="debug" style="font-size:10px; color:red;"></p>
        </div>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat-screen" class="screen">
        <div style="background:white; padding:15px; font-weight:bold; border-bottom:1px solid #ddd;">Чат группы</div>
        <div id="messages"></div>
        <div class="footer">
            <input id="msg-input" placeholder="Сообщение...">
            <button onclick="sendMsg()" style="width:60px;">➤</button>
        </div>
    </div>

    <script>
        // 1. Инициализация Gun
        const gun = Gun(['https://gun-manhattan.herokuapp.com']);
        const user = gun.user();
        const debug = document.getElementById('debug');

        // 2. Функция авторизации
        async function handleAuth(type) {
            const a = document.getElementById('alias').value;
            const p = document.getElementById('pass').value;
            
            if(!a || !p) return alert("Введите данные!");
            console.log("Кнопка нажата:", type);

            if(type === 'reg') {
                user.create(a, p, (ack) => {
                    if(ack.err) alert(ack.err);
                    else alert("Аккаунт создан! Теперь жми Войти");
                });
            } else {
                user.auth(a, p, (ack) => {
                    if(ack.err) {
                        alert("Ошибка: " + ack.err);
                        debug.innerText = "Ошибка: " + ack.err;
                    } else {
                        // ПЕРЕКЛЮЧАЕМ ИНТЕРФЕЙС
                        document.getElementById('auth-screen').classList.remove('active');
                        document.getElementById('chat-screen').classList.add('active');
                        startChat();
                    }
                });
            }
        }

        // 3. Отправка сообщений
        async function sendMsg() {
            const val = document.getElementById('msg-input').value;
            if(!val) return;
            
            // Шифруем для всей группы (тестовый ключ '123')
            const enc = await SEA.encrypt(val, '123');
            gun.get('my-secret-room-unique-id').set({ name: document.getElementById('alias').value, text: enc });
            document.getElementById('msg-input').value = '';
        }

        // 4. Получение сообщений
        function startChat() {
            gun.get('my-secret-room-unique-id').map().once(async (data) => {
                if(!data || !data.text) return;
                const dec = await SEA.decrypt(data.text, '123');
                
                const div = document.createElement('div');
                div.className = 'msg ' + (data.name === document.getElementById('alias').value ? 'me' : '');
                div.innerText = data.name + ": " + (dec || "Ошибка дешифровки");
                document.getElementById('messages').appendChild(div);
            });
        }
    </script>
</body>
</html>
