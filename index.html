<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // Node v2.1</title>
    <style>
        :root {
            --bg: #000000;
            --card: #121212;
            --accent: #00ff41;
            --text: #ffffff;
            --dim: #888888;
            --border: #222222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Auth Overlay */
        #auth {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }

        /* Header Area */
        header { padding: 40px 20px 20px; border-bottom: 1px solid var(--border); }
        .bal-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
        .bal-main { font-size: 38px; font-weight: 800; margin: 5px 0; display: flex; align-items: baseline; gap: 8px; }
        .addr-tag { font-family: monospace; font-size: 11px; color: var(--dim); background: #111; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

        /* Navigation Scrollable */
        .tabs { 
            display: flex; gap: 10px; padding: 15px 20px; 
            overflow-x: auto; scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--dim);
            padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
            white-space: nowrap; transition: 0.2s;
        }
        .tab-btn.active { background: var(--text); color: #000; border-color: var(--text); }

        /* Content Scroll Area */
        .content { flex: 1; overflow-y: auto; padding: 10px 20px 100px; }
        .page { display: none; animation: fadeIn 0.2s ease-out; }
        .page.active { display: block; }

        /* Cards & UI */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 16px; border-radius: 18px; }
        .card-label { font-size: 10px; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; font-weight: 700; }
        .card-val { font-size: 20px; font-weight: 700; color: var(--text); }

        .log-box { 
            background: #080808; border: 1px solid var(--border); border-radius: 18px; 
            padding: 15px; font-family: 'Courier New', monospace; font-size: 11px; 
            color: var(--accent); min-height: 120px; line-height: 1.6;
        }

        .input { 
            width: 100%; background: var(--card); border: 1px solid var(--border); 
            color: #fff; padding: 16px; border-radius: 14px; margin-bottom: 15px; outline: none;
        }

        .btn { 
            width: 100%; background: var(--accent); color: #000; padding: 16px; 
            border-radius: 14px; border: none; font-weight: 700; font-size: 15px;
        }
        .btn:active { transform: scale(0.98); opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth">
        <h1 style="font-size: 28px; font-weight: 900; margin-bottom: 10px;">AXON</h1>
        <input type="password" id="seed" class="input" placeholder="Введите ваш ключ" style="text-align:center">
        <button class="btn" onclick="Core.auth()">Инициализировать</button>
    </div>

    <header>
        <div class="bal-label">Общий баланс</div>
        <div class="bal-main"><span id="total-bal">150.00</span><span style="color:#444; font-size:18px">AXN</span></div>
        <div class="addr-tag" id="my-addr">AX-MTU1MG==</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="UI.tab(this, 'p-main')">Обзор</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-tx')">Перевод</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-mine')">Майнинг</button>
        <button class="tab-btn" onclick="UI.tab(this, 'p-dao')">Управление</button>
    </div>

    <div class="content">
        <!-- Page: Main -->
        <div id="p-main" class="page active">
            <div class="grid">
                <div class="card"><div class="card-label">Staked</div><div class="card-val">0.00</div></div>
                <div class="card"><div class="card-label">Nodes</div><div class="card-val">12</div></div>
            </div>
            <div class="card-label" style="margin-left:5px">Live Protocol Stream</div>
            <div id="log" class="log-box">
                <span style="opacity:0.5">> AXON PROTOCOL INITIALIZED. P2P MESH READY.</span><br>
                Ожидание запуска ноды...
            </div>
        </div>

        <!-- Page: Transfer -->
        <div id="p-tx" class="page">
            <div class="card-label">Получатель</div>
            <input type="text" class="input" placeholder="AX-XXXX-XXXX">
            <div class="card-label">Сумма</div>
            <input type="number" class="input" placeholder="0.00">
            <button class="btn">Отправить AXN</button>
        </div>

        <!-- Page: Mining (Placeholder) -->
        <div id="p-mine" class="page">
            <div class="card" style="text-align:center; padding: 40px 20px;">
                <div class="card-label">Текущая доходность</div>
                <div class="card-val" style="font-size:32px; color:var(--accent); margin: 10px 0;">+0.0042 AXN</div>
                <button class="btn" onclick="Core.log('Майнинг запущен...')">Старт Ноды</button>
            </div>
        </div>

        <!-- Page: DAO (Placeholder) -->
        <div id="p-dao" class="page">
            <div class="card-label">Активное предложение</div>
            <div class="card">
                <div style="font-weight:700; margin-bottom:10px">BIP-44: Снижение эмиссии</div>
                <div style="height:6px; background:#222; border-radius:3px; margin: 15px 0;">
                    <div style="width:35%; height:100%; background:var(--accent); border-radius:3px"></div>
                </div>
                <button class="btn" style="background:#fff; color:#000">Голосовать</button>
            </div>
        </div>
    </div>

    <script>
        const Core = {
            auth() {
                const s = document.getElementById('seed').value;
                if(s.length < 3) return;
                document.getElementById('auth').style.display = 'none';
                this.log("Node status: <span style='color:#fff'>Active</span>");
            },
            log(msg) {
                const l = document.getElementById('log');
                l.innerHTML = `> ${msg}<br>` + l.innerHTML;
            }
        };

        const UI = {
            tab(btn, id) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if(window.navigator.vibrate) window.navigator.vibrate(5);
            }
        };
    </script>
</body>
</html>
