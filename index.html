<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        input { background: transparent; border-bottom: 1px solid #222; text-align: center; color: #fff; outline: none; text-transform: uppercase; font-size: 10px; }
        .indicator { width: 6px; height: 6px; border-radius: 50%; background: #111; transition: 0.5s; align-self: center; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #msgs { flex: 1; overflow-y: auto; padding: 100px 20px 20px; display: flex; flex-direction: column; gap: 15px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="fixed top-0 w-full flex justify-between p-8 bg-black z-50">
        <input type="text" id="u" placeholder="USER" value="ADMIN" class="w-20">
        <div id="dot" class="indicator"></div>
        <input type="text" id="r" placeholder="ROOM" value="LOBBY" class="w-20">
    </div>
    <div id="msgs"></div>
    <div class="p-8 bg-black border-t border-[#111] flex gap-4">
        <input type="text" id="mi" placeholder="VIBRATION..." class="flex-1 text-left">
        <button onclick="h()" id="b" class="text-[10px] font-bold">JOIN</button>
    </div>
    <script>
        let s, c = false;
        function h() {
            const u = document.getElementById('u').value, r = document.getElementById('r').value, i = document.getElementById('mi');
            if (!c) {
                s = io("https://ae-production.up.railway.app");
                s.on("connect", () => {
                    c = true; document.getElementById('dot').classList.add('online');
                    document.getElementById('b').innerText = "SEND";
                    s.emit("join", { user: u, room: r });
                });
                s.on("update", (d) => {
                    const div = document.createElement('div');
                    div.className = 'm';
                    div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${d.u} • ${d.t}</div>${d.m}`;
                    document.getElementById('msgs').appendChild(div);
                    document.getElementById('msgs').scrollTop = 99999;
                });
            } else if (i.value.trim()) {
                s.emit("message", { user: u, room: r, msg: i.value });
                i.value = '';
            }
        }
    </script>
</body>
</html>
