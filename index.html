<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Future Node MVP</title>
    <!-- Подключаем актуальный SDK -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --blue: #007aff; --bg: #000000; --card: #1c1c1e; --red: #ff3b30; }
        body { background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; box-sizing: border-box; }
        #main-app { display: none; flex-direction: column; height: 100%; }
        
        .card { background: var(--card); padding: 25px; border-radius: 24px; margin: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { background: #2c2c2e; border: 1px solid #3a3a3c; color: white; padding: 15px; width: 100%; box-sizing: border-box; border-radius: 12px; margin-bottom: 12px; font-size: 16px; outline: none; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 600; width: 100%; cursor: pointer; font-size: 16px; transition: all 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }
        .btn-secondary { background: #2c2c2e; margin-top: 10px; }
        .btn-stop { background: var(--red) !important; }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(18, 18, 18, 0.95); display: flex; border-top: 0.5px solid #333; padding: 12px 0 25px 0; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #888; cursor: pointer; border: none; background: none; transition: 0.2s; }
        .nav-item.active { color: var(--blue); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 4px; }

        .hidden { display: none !important; }
        .page { flex: 1; overflow-y: auto; padding-bottom: 100px; }
    </style>
</head>
<body>

    <!-- ЭКРАН ЛОГИНА -->
    <div id="auth-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🌐</div>
        <h2 style="margin-bottom: 30px;">Future Node <span style="color: var(--blue);">MVP</span></h2>
        <input type="text" id="login" placeholder="Придумайте ID или имя">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn" onclick="startApp()">Создать / Войти</button>
    </div>

    <!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app">
        <div id="tab-wallet" class="page">
            <div class="card" style="background: linear-gradient(145deg, #007aff, #0051ff); margin-top: 50px;">
                <div style="font-size: 13px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9;">Доступный баланс</div>
                <div style="font-size: 48px; font-weight: 800; margin: 10px 0;" id="balance-val">0.00</div>
                <div id="wallet-id" style="font-size: 11px; font-family: monospace; opacity: 0.7; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 5px;">ID: ...</div>
            </div>
            
            <div style="padding: 0 20px;">
                <button class="btn btn-secondary" onclick="sendCoins()">📤 Отправить монеты</button>
                <p style="text-align: center; color: #555; font-size: 12px; margin-top: 15px;">Сеть: Mainnet (Beta)</p>
            </div>
        </div>

        <div id="tab-mine" class="page hidden">
            <div class="card" style="margin-top: 50px;">
                <div id="status-dot" style="width: 12px; height: 12px; background: #555; border-radius: 50%; margin: 0 auto 10px auto;"></div>
                <h3 id="mine-status">Узел простаивает</h3>
                <h1 style="font-size: 56px; margin: 15px 0;" id="blocks-val">0</h1>
                <p style="color: #888; font-size: 14px;">Добыто блоков в текущей сессии</p>
                <button class="btn" id="mine-btn" onclick="toggleMining()">ЗАПУСТИТЬ УЗЕЛ</button>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-item active" id="btn-wallet" onclick="switchTab('wallet')">
                <span class="nav-icon">💰</span> Кошелек
            </button>
            <button class="nav-item" id="btn-mine" onclick="switchTab('mine')">
                <span class="nav-icon">⚡</span> Майнинг
            </button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let miningInterval = null;
        let userData = {
            bal: parseFloat(localStorage.getItem('fn_balance')) || 0.00,
            blocks: parseInt(localStorage.getItem('fn_blocks')) || 0
        };

        function startApp() {
            const l = document.getElementById('login').value;
            if(l.length < 3) {
                tg.showAlert("ID должен быть длиннее 3 символов");
                return;
            }

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            
            // Генерация визуального адреса
            const shortId = btoa(l).substring(0, 10).toUpperCase();
            document.getElementById('wallet-id').innerText = "NODE_ADDR: " + shortId;
            
            updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function switchTab(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            document.getElementById('tab-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name).classList.add('active');
            tg.HapticFeedback.selectionChanged();
        }

        function toggleMining() {
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('mine-status');
            const dot = document.getElementById('status-dot');

            if (miningInterval) {
                // Остановка
                clearInterval(miningInterval);
                miningInterval = null;
                btn.innerText = "ЗАПУСТИТЬ УЗЕЛ";
                btn.classList.remove('btn-stop');
                status.innerText = "Узел остановлен";
                dot.style.background = "#555";
            } else {
                // Запуск
                btn.innerText = "ОСТАНОВИТЬ";
                btn.classList.add('btn-stop');
                status.innerText = "Синхронизация с блоками...";
                dot.style.background = "#4cd964";
                
                miningInterval = setInterval(() => {
                    userData.bal += 0.05;
                    userData.blocks += 1;
                    saveData();
                    updateUI();
                    tg.HapticFeedback.impactOccurred('light');
                }, 4000);
            }
        }

        function sendCoins() {
            // Реальная логика MVP через prompt (в Telegram работает стабильно)
            const address = prompt("Введите адрес получателя:");
            if (!address) return;

            const amount = prompt("Сколько отправить?");
            const val = parseFloat(amount);

            if (isNaN(val) || val <= 0) {
                tg.showAlert("Ошибка: Неверная сумма");
            } else if (val > userData.bal) {
                tg.showAlert("Ошибка: Недостаточно средств на балансе");
            } else {
                userData.bal -= val;
                saveData();
                updateUI();
                tg.showConfirm(`Транзакция отправлена!\nСумма: ${val} FN\nПолучатель: ${address.substring(0,10)}...`);
            }
        }

        function saveData() {
            localStorage.setItem('fn_balance', userData.bal.toFixed(4));
            localStorage.setItem('fn_blocks', userData.blocks);
        }

        function updateUI() {
            document.getElementById('balance-val').innerText = userData.bal.toFixed(2);
            document.getElementById('blocks-val').innerText = userData.blocks;
        }
    </script>
</body>
</html>
