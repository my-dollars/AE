<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Crypto Private</title>
    <style>
        body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #0f1621; color: white; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #17212b; padding: 15px; display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10; }
        input { background: #242f3d; border: 1px solid #2f3947; color: white; padding: 10px; border-radius: 10px; outline: none; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; background-color: #0f1621; }
        .footer { background: #17212b; padding: 15px; display: flex; gap: 10px; }
        button { background: #5288c1; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .msg { margin-bottom: 12px; padding: 10px 15px; border-radius: 15px; background: #182533; max-width: 75%; clear: both; float: left; word-wrap: break-word; line-height: 1.4; }
        .own { background: #2b5278; float: right; border-bottom-right-radius: 4px; }
        .system { text-align: center; color: #7f91a4; font-size: 0.85em; margin: 15px 0; clear: both; }
    </style>
</head>
<body>
    <div class="header">
        <input id="user" placeholder="Имя" style="width: 80px;">
        <input id="room" type="password" placeholder="Ключ комнаты" style="flex: 1;">
        <button onclick="init()">ВХОД</button>
    </div>
    <div id="chat"><div class="system">Введите секретный ключ для входа</div></div>
    <div class="footer">
        <input id="msgInp" placeholder="Сообщение..." style="flex: 1;" disabled onkeypress="if(event.keyCode==13) send()">
        <button onclick="send()" id="sendBtn" disabled>➤</button>
    </div>

<script>
    let ws, roomKey, currentRoom;

    async function deriveKey(pwd) {
        const enc = new TextEncoder();
        const material = await crypto.subtle.importKey("raw", enc.encode(pwd), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("tg-salt-v1"), iterations: 100000, hash: "SHA-256" },
            material, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
    }

    async function init() {
        currentRoom = document.getElementById('room').value;
        if (!currentRoom) return alert("Введите ключ!");
        
        roomKey = await deriveKey(currentRoom);
        
        // Авто-определение протокола: wss для https и ws для http
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        // Подключаемся к тому же хосту, на котором открыт сайт
        const wsUrl = `${protocol}//${window.location.host}`;
        
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', room: currentRoom }));
            document.getElementById('msgInp').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chat').innerHTML = "<div class='system'>Безопасное соединение установлено</div>";
        };

        ws.onmessage = async (e) => {
            const data = JSON.parse(e.data);
            try {
                const dec = await crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: new Uint8Array(data.iv) }, 
                    roomKey, 
                    new Uint8Array(data.text)
                );
                addMsg(data.user, new TextDecoder().decode(dec), 'in');
            } catch(err) { 
                addMsg(data.user, "[Ошибка расшифровки: неверный ключ]", 'in'); 
            }
        };

        ws.onclose = () => {
            document.getElementById('chat').innerHTML += "<div class='system' style='color:red'>Связь разорвана. Перезагрузите страницу.</div>";
        };
    }

    async function send() {
        const text = document.getElementById('msgInp').value;
        const user = document.getElementById('user').value || "Аноним";
        if (!text || !ws) return;

        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, roomKey, new TextEncoder().encode(text));
        
        ws.send(JSON.stringify({ 
            type: 'msg', 
            room: currentRoom, 
            user, 
            text: Array.from(new Uint8Array(enc)), 
            iv: Array.from(iv) 
        }));
        
        addMsg(user, text, 'own');
        document.getElementById('msgInp').value = "";
    }

    function addMsg(u, t, type) {
        const chat = document.getElementById('chat');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type === 'own' ? 'own' : ''}`;
        msgDiv.innerHTML = `<b>${u}</b><br>${t}`;
        chat.appendChild(msgDiv);
        
        const spacer = document.createElement('div');
        spacer.style.clear = 'both';
        chat.appendChild(spacer);
        
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
