<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Core Blockchain Node</title>
    <script src="https://telegram.org"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #0a0b10; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .stat-label { font-size: 10px; color: #8b949e; text-transform: uppercase; }
        .stat-value { font-size: 18px; color: var(--neon); font-weight: bold; }
        #console { background: #000; height: 150px; border: 1px solid #30363d; border-radius: 8px; padding: 10px; font-size: 11px; overflow-y: auto; color: #3fb950; margin-bottom: 20px; }
        .mine-btn { 
            width: 100%; padding: 20px; border: none; border-radius: 15px;
            background: linear-gradient(45deg, #00f2ff, #0066ff);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }
        .mining-active { animation: pulse 1.5s infinite; background: #ff4b2b !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Баланс</div><div class="stat-value" id="balance">0.00</div></div>
        <div class="stat-card"><div class="stat-label">Сложность</div><div class="stat-value" id="difficulty">4</div></div>
        <div class="stat-card"><div class="stat-label">Блок №</div><div class="stat-value" id="block-height">0</div></div>
        <div class="stat-card"><div class="stat-label">Награда</div><div class="stat-value" id="reward">50.0</div></div>
    </div>

    <div id="console">Initializing Node v1.0.26...<br>Ready to mine.</div>
    <button class="mine-btn" id="actionBtn">START MINING</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let isMining = false;
        let nonce = 0;
        let lastHash = "00000000000000000000000000000000";
        
        let blockchain = {
            height: parseInt(localStorage.getItem('bc_height')) || 0,
            balance: parseFloat(localStorage.getItem('bc_balance')) || 0,
            difficulty: parseInt(localStorage.getItem('bc_diff')) || 3,
            reward: parseFloat(localStorage.getItem('bc_reward')) || 50
        };

        function log(msg) {
            const con = document.getElementById('console');
            con.innerHTML += `> ${msg}<br>`;
            con.scrollTop = con.scrollHeight;
        }

        function updateUI() {
            document.getElementById('balance').innerText = blockchain.balance.toFixed(4);
            document.getElementById('block-height').innerText = blockchain.height;
            document.getElementById('difficulty').innerText = blockchain.difficulty;
            document.getElementById('reward').innerText = blockchain.reward.toFixed(2);
        }

        function startMiningLoop() {
            if (!isMining) return;

            // Пачка из 150 хешей за итерацию (баланс мощности и отклика)
            const target = "0".repeat(blockchain.difficulty);
            for (let i = 0; i < 150; i++) {
                nonce++;
                const data = blockchain.height + lastHash + nonce + blockchain.difficulty;
                const currentHash = CryptoJS.SHA256(data).toString();

                if (currentHash.startsWith(target)) {
                    foundBlock(currentHash);
                    return; 
                }
            }

            if (nonce % 1500 === 0) {
                log(`Mining... Nonce: ${nonce}`);
            }

            requestAnimationFrame(startMiningLoop); // Более плавно, чем setTimeout
        }

        function foundBlock(hash) {
            blockchain.height++;
            blockchain.balance += blockchain.reward;
            lastHash = hash;
            nonce = 0;

            log(`<span style="color:#4ade80">BLOCK FOUND!</span>`);
            
            // Сложность +1 каждые 3 блока
            if (blockchain.height % 3 === 0) {
                blockchain.difficulty++;
                log(`Difficulty UP: ${blockchain.difficulty}`);
            }

            // Халвинг каждые 10 блоков
            if (blockchain.height % 10 === 0) {
                blockchain.reward /= 2;
                log(`HALVING! Reward: ${blockchain.reward}`);
            }

            saveData();
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
            
            if (isMining) startMiningLoop();
        }

        function saveData() {
            localStorage.setItem('bc_balance', blockchain.balance);
            localStorage.setItem('bc_height', blockchain.height);
            localStorage.setItem('bc_diff', blockchain.difficulty);
            localStorage.setItem('bc_reward', blockchain.reward);
        }

        document.getElementById('actionBtn').addEventListener('click', function() {
            isMining = !isMining;
            this.classList.toggle('mining-active');
            
            if(isMining) {
                this.innerText = "STOP NODE";
                log("Worker active...");
                startMiningLoop();
            } else {
                this.innerText = "START MINING";
                log("Worker stopped.");
            }
            tg.HapticFeedback.impactOccurred('medium');
        });

        updateUI();
    </script>
</body>
</html>
