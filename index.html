<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Future Node: DeACN</title>
    <!-- SDK загружается в фоне, не мешая открытию сайта -->
    <script async src="https://telegram.org"></script>
    <style>
        :root { --blue: #007aff; --bg: #000; --card: #0d0d0d; --neon: #00ff41; --gold: #ffd700; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 30px; text-align: center; background: #000; position: fixed; width: 100%; z-index: 2000; }
        #main-app { display: none; flex-direction: column; height: 100%; position: relative; }
        
        .card { background: var(--card); padding: 20px; border-radius: 24px; border: 1px solid #1a1a1a; margin: 15px; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn-stop { background: #ff3b30 !important; }

        input { background: #111; border: 1px solid #333; color: var(--neon); padding: 18px; width: 100%; box-sizing: border-box; border-radius: 15px; margin-bottom: 15px; text-align: center; font-size: 16px; outline: none; }
        .terminal { background: #050505; border-radius: 14px; padding: 12px; font-family: monospace; font-size: 10px; height: 110px; overflow: hidden; color: var(--neon); text-align: left; margin: 15px 0; border: 1px solid #111; line-height: 1.4; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; padding-bottom: 25px; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #555; background: none; border: none; padding: 15px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: var(--blue); border-top: 2px solid var(--blue); }
        
        .page { display: none; padding-top: 20px; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <!-- Экран входа -->
    <div id="auth-screen">
        <div style="font-size: 60px; margin-bottom: 20px;">🛡️</div>
        <h2 style="letter-spacing: 2px;">FUTURE NODE</h2>
        <p style="color: #444; font-size: 12px; margin-bottom: 30px;">DECENTRALIZED NETWORK (DAO)</p>
        <input type="text" id="login" placeholder="Идентификатор узла">
        <button class="btn" onclick="start()">ВОЙТИ В СЕТЬ</button>
    </div>

    <!-- Основной интерфейс -->
    <div id="main-app">
        <div id="p-wallet" class="page active">
            <div class="card" style="border-color: var(--gold); margin-top: 30px;">
                <div style="font-size: 10px; color: var(--gold); letter-spacing: 1px;">VOTING POWER</div>
                <div style="font-size: 48px; font-weight: 800; margin: 10px 0;" id="b">0.0000</div>
                <div style="font-size: 12px; color: var(--gold);" id="vp">0.0000%</div>
            </div>
            <div class="card" style="border-style: dashed; text-align: left;">
                <div style="font-size: 10px; color: #555;">PROPOSAL #1: ACTIVATE STEALTH PROXY</div>
                <button class="btn" style="margin-top: 10px; padding: 10px; font-size: 10px; background: #1a1a1a;" onclick="alert('Голос принят!')">ГОЛОСОВАТЬ ЗА</button>
            </div>
        </div>

        <div id="p-node" class="page">
            <div class="card">
                <div style="display:flex; justify-content: space-between; font-size: 10px; color: #444;">
                    <span>RELAY NODE</span>
                    <span id="st">OFFLINE</span>
                </div>
                <h1 id="bl" style="font-size: 64px; margin: 10px 0;">0</h1>
                <div class="terminal" id="log">> Консенсус: Ожидание...</div>
                <button class="btn" id="m-btn" onclick="toggle()">ЗАПУСТИТЬ УЗЕЛ</button>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-item active" onclick="tab('wallet', this)">💰 DAO</button>
            <button class="nav-item" onclick="tab('node', this)">⚡ NODE</button>
        </nav>
    </div>

    <script>
        let run = false, timer = null;
        let s = { b: parseFloat(localStorage.getItem('f_b')) || 0, bl: parseInt(localStorage.getItem('f_bl')) || 0 };

        function start() {
            if(document.getElementById('login').value.length < 2) return;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            upd();
        }

        function toggle() {
            const btn = document.getElementById('m-btn'), st = document.getElementById('st'), log = document.getElementById('log');
            if(run) {
                run = false; clearInterval(timer);
                btn.innerText = "ЗАПУСТИТЬ УЗЕЛ"; btn.classList.remove('btn-stop');
                st.innerText = "OFFLINE"; st.style.color = "#444";
            } else {
                run = true;
                btn.innerText = "ОСТАНОВИТЬ"; btn.classList.add('btn-stop');
                st.innerText = "ACTIVE"; st.style.color = "var(--neon)";
                timer = setInterval(() => {
                    s.bl++; s.b += (0.005 / (1 + s.bl/1000)); // Дефляционная награда
                    log.innerHTML = `> [${new Date().toLocaleTimeString()}] Block Verified by Network<br>` + log.innerHTML.slice(0, 500);
                    upd();
                    localStorage.setItem('f_b', s.b); localStorage.setItem('f_bl', s.bl);
                }, 3000);
            }
        }

        function tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active');
        }

        function upd() {
            document.getElementById('b').innerText = s.b.toFixed(4);
            document.getElementById('bl').innerText = s.bl;
            document.getElementById('vp').innerText = (s.b / 1000000 * 100).toFixed(6) + "%";
        }
    </script>
</body>
</html>
