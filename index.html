<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | P2P</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { padding: 25px; display: flex; gap: 10px; border-top: 1px solid #111; }
        .on { color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: b 2s infinite; }
        @keyframes b { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top">
        <input type="text" id="u" placeholder="NAME" value="USER" style="width: 80px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">OFFLINE</span>
        <input type="text" id="r" placeholder="ROOM ID" style="width: 80px;">
    </div>
    <div id="msgs"></div>
    <div class="bot">
        <input type="text" id="i" placeholder="MESSAGE..." style="flex: 1; text-align: left;">
        <button onclick="connect()" id="btn" style="background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 10px; padding: 5px 15px; cursor: pointer;">JOIN</button>
    </div>

    <script>
        let peer, conn, user;

        function connect() {
            user = document.getElementById('u').value;
            const room = document.getElementById('r').value;
            if(!room) return alert("ENTER ROOM ID");

            // Инициализируем P2P соединение
            peer = new Peer(room); 

            peer.on('open', (id) => {
                document.getElementById('st').innerText = "HOSTING";
                document.getElementById('st').classList.add('on');
                addMsg("SYSTEM", "Вы создали комнату. Другие могут войти по ID: " + id);
            });

            peer.on('connection', (c) => {
                conn = c;
                setupChat();
            });

            // Если комната уже создана кем-то другим — подключаемся к ней
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    peer = new Peer();
                    peer.on('open', () => {
                        conn = peer.connect(room);
                        setupChat();
                    });
                }
            });
        }

        function setupChat() {
            document.getElementById('st').innerText = "ONLINE";
            document.getElementById('st').classList.add('on');
            document.getElementById('btn').innerText = "SEND";
            document.getElementById('btn').onclick = send;

            conn.on('data', (data) => addMsg(data.u, data.m));
        }

        function send() {
            const m = document.getElementById('i').value;
            if(!m || !conn) return;
            conn.send({ u: user, m: m });
            addMsg(user, m);
            document.getElementById('i').value = "";
        }

        function addMsg(u, m) {
            const div = document.createElement('div');
            div.className = 'm';
            div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${u}</div>${m}`;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = 99999;
        }
    </script>
</body>
</html>
