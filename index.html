<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Private Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <!-- Используем совместимую версию Firebase для работы напрямую в браузере -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #d4af37; height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        input { background: transparent; border-bottom: 1px solid #222; transition: 0.4s; }
        input:focus { border-color: #d4af37; outline: none; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #d4af37; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- ВХОД -->
    <div id="auth-screen" class="glass p-10 rounded-[50px] w-full max-w-sm text-center shadow-[0_0_50px_rgba(0,0,0,1)]">
        <h1 class="text-4xl font-light tracking-[0.4em] mb-12 uppercase">Aura</h1>
        <div class="space-y-8">
            <input type="text" id="username" placeholder="NAME" class="w-full text-center py-2 tracking-widest uppercase text-xs">
            <input type="text" id="room-id" placeholder="ROOM ID" class="w-full text-center py-2 tracking-widest uppercase text-xs">
            <button onclick="joinRoom()" class="w-full py-4 border border-[#d4af37] text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition-all duration-700 uppercase text-[10px] tracking-[0.3em] mt-4 rounded-full">
                Enter
            </button>
        </div>
    </div>

    <!-- ЧАТ -->
    <div id="room-screen" class="hidden glass p-8 rounded-[50px] w-full max-w-2xl h-[85vh] flex flex-col shadow-[0_0_60px_rgba(0,0,0,1)]">
        <div class="flex justify-between items-center mb-8 border-b border-[#222] pb-6">
            <span id="display-room" class="text-[9px] tracking-[0.5em] uppercase opacity-40">Space: -</span>
            <button onclick="location.reload()" class="text-[9px] tracking-widest uppercase hover:text-white transition-colors">Exit</button>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto space-y-6 px-2 mb-6 text-sm font-light leading-relaxed"></div>
        <div class="flex gap-4 items-center bg-[#0a0a0a] rounded-full px-6 py-2 border border-[#1a1a1a]">
            <input type="text" id="msg-input" placeholder="TYPE MESSAGE..." class="flex-1 border-none text-[11px] tracking-widest uppercase py-3">
            <button onclick="sendMsg()" class="text-[#d4af37] hover:text-white transition-colors text-[10px] tracking-widest uppercase font-semibold">Send</button>
        </div>
    </div>

    <script>
        // Твои данные из конфига
        const firebaseConfig = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            authDomain: "aurachat-f9d4f.firebaseapp.com",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            storageBucket: "aurachat-f9d4f.firebasestorage.app",
            messagingSenderId: "532846952097",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = '';
        let user = '';

        function joinRoom() {
            user = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room-id').value.trim();
            if(!user || !currentRoom) return;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            document.getElementById('display-room').innerText = `Space: ${currentRoom}`;

            // Подключаемся к комнате
            db.ref('rooms/' + currentRoom).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const div = document.createElement('div');
                div.className = "animate-fade-in";
                div.innerHTML = `<span class="opacity-30 uppercase text-[8px] block tracking-tighter mb-1">${data.user}</span> 
                                 <span class="text-[#eee] tracking-wide">${data.text}</span>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        function sendMsg() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            db.ref('rooms/' + currentRoom).push({ user, text });
            input.value = '';
        }

        // Отправка по Enter
        document.getElementById('msg-input').addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMsg();
        });
    </script>
</body>
</html>
