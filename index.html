<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Future Node: Anti-Censorship</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --blue: #007aff; --bg: #000000; --card: #111111; --neon: #00ff41; --gold: #ffd700; }
        body { background: var(--bg); color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; -webkit-user-select: none; }
        
        /* Экран входа */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 30px; text-align: center; box-sizing: border-box; }
        #main-app { display: none; flex-direction: column; height: 100%; }
        
        .shield-icon { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,122,255,0.5)); }
        h2 { letter-spacing: 4px; margin: 10px 0; font-weight: 900; }
        .subtitle { color: #666; font-size: 11px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin: 15px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance-num { font-size: 50px; font-weight: 800; color: var(--gold); margin: 10px 0; }
        
        .terminal { background: #050505; border-radius: 12px; padding: 12px; font-family: 'Courier New', monospace; font-size: 10px; height: 100px; overflow: hidden; color: var(--neon); border: 1px solid #222; text-align: left; line-height: 1.5; }
        
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 18px; width: 100%; box-sizing: border-box; border-radius: 15px; margin-bottom: 15px; font-size: 16px; outline: none; text-align: center; }
        .btn { background: var(--blue); color: white; border: none; padding: 20px; border-radius: 18px; font-weight: bold; width: 100%; cursor: pointer; font-size: 15px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,122,255,0.3); }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        .btn-stop { background: #ff3b30 !important; box-shadow: 0 5px 15px rgba(255,59,48,0.3); }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.95); display: flex; padding: 10px 0 30px; border-top: 1px solid #222; backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; color: #555; background: none; border: none; font-size: 11px; font-weight: bold; }
        .nav-item.active { color: var(--blue); }
        
        .hidden { display: none !important; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; background: #333; margin-right: 5px; }
        .active-dot { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <div class="shield-icon">🛡️</div>
        <h2>FUTURE NODE</h2>
        <div class="subtitle">Decentralized Anti-Censorship Node (DeACN)</div>
        <input type="text" id="node-id" placeholder="Введите ключ или имя узла">
        <button class="btn" id="start-btn">Инициировать узел</button>
    </div>

    <!-- 2. ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
    <div id="main-app">
        <!-- ВКЛАДКА: КОШЕЛЕК -->
        <div id="tab-wallet" class="page">
            <div class="card" style="text-align: center; margin-top: 40px;">
                <div style="font-size: 12px; color: #888;">NETWORK ASSETS (FN)</div>
                <div class="balance-num" id="balance-val">0.0000</div>
                <div id="wallet-addr" style="font-size: 9px; color: #444; word-break: break-all; font-family: monospace;"></div>
                <div style="margin-top: 25px;">
                    <button class="btn" style="background: #1a1a1a; font-size: 12px; border: 1px solid #333;" onclick="alert('Вывод будет доступен после TGE')">Вывести токены</button>
                </div>
            </div>
        </div>

        <!-- ВКЛАДКА: УЗЕЛ (МАЙНИНГ) -->
        <div id="tab-mine" class="page hidden" style="padding-top: 10px;">
            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <span style="font-size: 10px; font-weight: bold; color: #555;">RELAY STATUS</span>
                    <div style="display: flex; align-items: center;">
                        <div id="led" class="status-dot"></div>
                        <span id="status-label" style="font-size: 10px; color: #555;">OFFLINE</span>
                    </div>
                </div>

                <div style="text-align: center;">
                    <div style="font-size: 12px; color: #888;">ОБРАБОТАНО ТРАФИКА (BLOCKS)</div>
                    <h1 id="blocks-val" style="font-size: 60px; margin: 5px 0;">0</h1>
                    <div id="diff-label" style="font-size: 10px; color: var(--blue);">СЛОЖНОСТЬ: 1.00x</div>
                </div>

                <div class="terminal" id="term-log">
                    > Система готова к работе...<br>
                    > Нажмите START для запуска моста...<br>
                </div>

                <button class="btn" id="mine-trigger" style="margin-top: 20px;">Запустить Мост</button>
            </div>
        </div>

        <!-- НАВИГАЦИЯ -->
        <nav class="nav">
            <button class="nav-item active" id="nav-wallet-btn">💰 CRYPTO</button>
            <button class="nav-item" id="nav-mine-btn">⚡ NODE</button>
        </nav>
    </div>

    <script>
        // Инициализация Telegram SDK (если доступно)
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        let isRunning = false;
        let timer = null;
        let stats = {
            bal: parseFloat(localStorage.getItem('future_bal')) || 0,
            blocks: parseInt(localStorage.getItem('future_blocks')) || 0
        };

        const logs = [
            "Маскировка под HTTPS-трафик...",
            "Туннелирование через Relay-сервер...",
            "Обход DPI фильтрации...",
            "Шифрование пакета (AES-256)...",
            "Подключение к мосту Shadowsocks...",
            "Проверка доступности узла..."
        ];

        // КНОПКА ВХОДА (ИСПРАВЛЕНО)
        document.getElementById('start-btn').addEventListener('click', function() {
            const input = document.getElementById('node-id').value;
            if (input.length < 2) {
                alert("Введите имя узла!");
                return;
            }
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('wallet-addr').innerText = "VLESS://" + btoa(input).slice(0,24) + "@deacn_relay";
            updateDisplay();
        });

        // КНОПКА МАЙНИНГА (ИСПРАВЛЕНО)
        document.getElementById('mine-trigger').addEventListener('click', function() {
            const btn = this;
            const led = document.getElementById('led');
            const statusLabel = document.getElementById('status-label');
            const term = document.getElementById('term-log');

            if (isRunning) {
                // ОСТАНОВКА
                isRunning = false;
                clearInterval(timer);
                btn.innerText = "Запустить Мост";
                btn.classList.remove('btn-stop');
                led.classList.remove('active-dot');
                statusLabel.innerText = "OFFLINE";
                term.innerHTML = "> Соединение разорвано...<br>" + term.innerHTML;
            } else {
                // ЗАПУСК
                isRunning = true;
                btn.innerText = "Остановить";
                btn.classList.add('btn-stop');
                led.classList.add('active-dot');
                statusLabel.innerText = "ACTIVE RELAY";
                statusLabel.style.color = "#00ff41";
                
                timer = setInterval(() => {
                    // Экономика: чем больше блоков, тем выше сложность (дефляция)
                    let difficulty = 1 + (stats.blocks / 300);
                    let reward = 0.05 / difficulty;
                    
                    stats.blocks += 1;
                    stats.bal += reward;
                    
                    // Логи
                    let logMsg = logs[Math.floor(Math.random() * logs.length)];
                    term.innerHTML = `> [${new Date().toLocaleTimeString()}] ${logMsg}<br>` + term.innerHTML;
                    if (term.innerHTML.length > 800) term.innerHTML = term.innerHTML.slice(0, 800);

                    document.getElementById('diff-label').innerText = `СЛОЖНОСТЬ: ${difficulty.toFixed(2)}x`;
                    
                    saveData();
                    updateDisplay();
                    
                    if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }, 3000);
            }
        });

        // НАВИГАЦИЯ
        document.getElementById('nav-wallet-btn').onclick = () => switchTab('wallet');
        document.getElementById('nav-mine-btn').onclick = () => switchTab('mine');

        function switchTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('nav-' + tab + '-btn').classList.add('active');
        }

        function saveData() {
            localStorage.setItem('future_bal', stats.bal);
            localStorage.setItem('future_blocks', stats.blocks);
        }

        function updateDisplay() {
            document.getElementById('balance-val').innerText = stats.bal.toFixed(4);
            document.getElementById('blocks-val').innerText = stats.blocks;
        }
    </script>
</body>
</html>
