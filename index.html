<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OVERRIDE // GENESIS NODE</title>
    <style>
        :root {
            --accent: #ffd700;
            --neon: #00ff41;
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', 'Courier New', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

        #app {
            width: 100%; max-width: 500px; height: 100%;
            background: radial-gradient(circle at top, #111 0%, #030303 100%);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Quantum Auth Screen */
        #auth-overlay {
            position: absolute; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px;
            text-align: center; transition: 0.5s;
        }

        .seed-input {
            background: var(--glass); border: 1px solid var(--accent); color: var(--accent);
            padding: 15px; width: 100%; border-radius: 12px; margin: 20px 0; outline: none;
        }

        /* Main UI */
        header { padding: 25px; border-bottom: 1px solid var(--border); text-align: center; }
        .node-id { font-size: 10px; color: var(--neon); opacity: 0.7; letter-spacing: 2px; }

        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: var(--glass); padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-label { font-size: 9px; text-transform: uppercase; color: #888; }
        .stat-val { font-size: 1.2rem; font-weight: bold; color: var(--accent); display: block; margin-top: 5px; }

        #terminal {
            flex: 1; overflow-y: auto; padding: 20px; font-size: 11px; line-height: 1.5;
            background: rgba(0,0,0,0.3); margin: 0 20px; border-radius: 12px; border: 1px solid var(--border);
            color: rgba(0, 255, 65, 0.8);
        }

        .dao-section { padding: 20px; background: rgba(255, 215, 0, 0.05); margin-top: 10px; }
        .vote-bar { height: 4px; background: #222; margin: 10px 0; border-radius: 2px; overflow: hidden; }
        #vote-progress { height: 100%; width: 0%; background: var(--accent); transition: 1s; }

        .btn {
            background: var(--neon); color: #000; border: none; padding: 18px;
            border-radius: 14px; font-weight: 900; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; margin: 20px;
        }
        .btn:active { transform: scale(0.98); filter: brightness(1.2); }
        .btn:disabled { background: #333; color: #666; }

        /* Mutation Effect */
        .mutated { --neon: #ff00ea; --accent: #00e5ff; filter: hue-rotate(270deg); }

        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
        .scanline { position: absolute; width: 100%; height: 2px; background: rgba(0,255,65,0.1); top: 0; animation: scanline 4s linear infinite; pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="scanline"></div>

    <!-- Login -->
    <div id="auth-overlay">
        <h1 style="color: var(--accent); letter-spacing: 5px;">S A T O S H I</h1>
        <p style="font-size: 10px; margin-top: 10px; opacity: 0.6;">QUANTUM-RESISTANT PROTOCOL v1.0</p>
        <input type="password" id="seed-phrase" class="seed-input" placeholder="ENTER PRIVATE SEED">
        <button class="btn" style="width: 100%" onclick="Core.init()">Initialize Node</button>
    </div>

    <header>
        <div class="node-id" id="display-id">NODE::OFFLINE</div>
        <h2 style="letter-spacing: 2px;">OVERRIDE NETWORK</h2>
    </header>

    <div class="stats-container">
        <div class="stat-card">
            <span class="stat-label">Balance (OVR)</span>
            <span class="stat-val" id="balance">0.0000</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Voting Power</span>
            <span class="stat-val" id="vp">0.0%</span>
        </div>
    </div>

    <div id="terminal"></div>

    <div class="dao-section" id="dao-box">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 10px; font-weight: bold;">BIP-001: STEALTH PROXY</span>
            <span style="font-size: 10px; color: var(--accent)" id="vote-count">0/51%</span>
        </div>
        <div class="vote-bar"><div id="vote-progress"></div></div>
        <button class="btn" style="margin: 10px 0 0 0; padding: 10px; font-size: 10px; width: 100%;" id="vote-btn" onclick="Core.castVote()">Sign & Vote with Balance</button>
    </div>

    <button id="mine-btn" class="btn" onclick="Core.startMining()">Start Mining (Bypass DPI)</button>
</div>

<script>
    /* 
       Satoshi's Autonomous Core 2026
       Post-Quantum Mesh Logic
    */

    const Core = {
        vault: { balance: 0, votes: 0, id: "", active: false, mutated: false },
        
        init() {
            const seed = document.getElementById('seed-phrase').value;
            if(seed.length < 4) return alert("Seed too weak.");
            
            this.vault.id = "X-" + btoa(seed).substring(0, 12).toUpperCase();
            document.getElementById('auth-overlay').style.opacity = "0";
            setTimeout(() => document.getElementById('auth-overlay').style.display = "none", 500);
            
            document.getElementById('display-id').innerText = `NODE::${this.vault.id}`;
            this.log("System initialized. ML-KEM keys generated.", "neon");
            this.sync();
        },

        log(msg, type = "") {
            const t = document.getElementById('terminal');
            const line = document.createElement('div');
            line.style.marginBottom = "5px";
            line.innerHTML = `[${new Date().toLocaleTimeString()}] <span style="color:var(--${type})">${msg}</span>`;
            t.prepend(line);
        },

        startMining() {
            if(this.vault.active) return;
            this.vault.active = true;
            document.getElementById('mine-btn').disabled = true;
            this.mineLoop();
        },

        mineLoop() {
            if(!this.vault.active) return;

            // Simulate Lattice-based proof of work
            const reward = 0.0042 / (1 + (this.vault.balance / 100)); // Deflationary
            this.vault.balance += reward;
            
            const packets = ["TCP_OBFS4", "SNI_GHOST", "P2P_RELAY", "DPI_BYPASS"];
            const p = packets[Math.floor(Math.random()*packets.length)];
            
            this.log(`Relayed ${p} via Lattice-Shield... +${reward.toFixed(6)} OVR`);
            this.sync();
            this.haptic(50);

            setTimeout(() => this.mineLoop(), 3000);
        },

        castVote() {
            if(this.vault.balance <= 0) return this.log("Error: Zero Voting Power.", "accent");
            
            this.vault.votes += (this.vault.balance * 10); // Balance-weighted voting
            this.log(`BIP-001 signed. Weighted Power: ${this.vault.balance.toFixed(2)}`, "accent");
            this.haptic([100, 50, 100]);
            this.sync();
        },

        sync() {
            document.getElementById('balance').innerText = this.vault.balance.toFixed(4);
            
            // VP is relative to a simulated network total
            const netTotal = 100; 
            const vp = (this.vault.balance / netTotal) * 100;
            document.getElementById('vp').innerText = vp.toFixed(2) + "%";

            // DAO Progress
            const progress = Math.min(this.vault.votes, 51);
            document.getElementById('vote-progress').style.width = (progress / 0.51) + "%";
            document.getElementById('vote-count').innerText = `${progress.toFixed(1)}/51%`;

            if(progress >= 51 && !this.vault.mutated) {
                this.mutateProtocol();
            }
        },

        mutateProtocol() {
            this.vault.mutated = true;
            document.body.classList.add('mutated');
            this.log("!!! CONSENSUS REACHED: SHIFTING PROTOCOL !!!", "accent");
            this.log("System Mutation: BIP-001 Stealth Proxy Active.", "accent");
            document.getElementById('dao-box').innerHTML = "<h3 style='color:var(--accent); text-align:center'>PROTOCOL EVOLVED</h3>";
            this.haptic(500);
        },

        haptic(pattern) {
            if(window.navigator.vibrate) window.navigator.vibrate(pattern);
        }
    };

    // Global listener for terminal auto-scroll
    setInterval(() => {
        const t = document.getElementById('terminal');
        if(t.children.length > 50) t.removeChild(t.lastChild);
    }, 5000);
</script>
</body>
</html>
