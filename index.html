<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeChat P2P</title>
    <!-- ПОДКЛЮЧАЕМ ТВОИ ЛОКАЛЬНЫЕ ФАЙЛЫ (Они не заблокируются) -->
    <script src="gun.js"></script>
    <script src="sea.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1e; color: white; margin: 0; display: flex; height: 100vh; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        .card { background: #2c2c2e; padding: 25px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #3a3a3c; background: #3a3a3c; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #007aff; color: white; font-weight: bold; cursor: pointer; }
        #chat { width: 100%; height: 100vh; flex-direction: column; display: none; background: #000; position: fixed; top: 0; left: 0; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 10px; border-radius: 12px; background: #3a3a3c; align-self: flex-start; max-width: 80%; }
        .m.me { background: #007aff; align-self: flex-end; }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth" class="card">
        <h2>Crypto Chat</h2>
        <input id="user" placeholder="Твоё имя">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="start()">Войти</button>
        <p id="st" style="font-size: 10px; color: #8e8e93; margin-top: 10px;">Статус: Ожидание файлов...</p>
    </div>

    <!-- ЭКРАН ЧАТА -->
    <div id="chat">
        <header style="padding: 15px; background: #2c2c2e; border-bottom: 1px solid #3a3a3c;">Чат группы</header>
        <div id="msgs"></div>
        <div style="padding: 15px; background: #1c1c1e; display: flex; gap: 10px;">
            <input id="msg" style="margin:0" placeholder="Сообщение...">
            <button style="width: 70px" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        let gun, user;

        // Проверяем загрузку локальных файлов
        window.onload = () => {
            const st = document.getElementById('st');
            if (typeof Gun !== 'undefined') {
                st.innerText = "Система готова!";
                st.style.color = "green";
                // Подключаемся к надежному реле (синхронизация)
                gun = Gun(['https://gun-manhattan.herokuapp.com']);
                user = gun.user();
            } else {
                st.innerText = "Ошибка: Файлы gun.js или sea.js не найдены в репозитории!";
                st.style.color = "red";
            }
        };

        function start() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Введите данные!");

            user.auth(u, p, (ack) => {
                if(ack.err) {
                    // Если аккаунта нет - создаем
                    user.create(u, p, (res) => {
                        if(res.err) alert(res.err);
                        else alert("Аккаунт создан! Нажми 'Войти' еще раз.");
                    });
                } else {
                    document.getElementById('auth').classList.add('hidden');
                    document.getElementById('chat').style.display = 'flex';
                    listen();
                }
            });
        }

        async function send() {
            const input = document.getElementById('msg');
            if(!input.value) return;
            // Шифруем (SEA) и отправляем в общую комнату
            const secret = await SEA.encrypt(input.value, 'shared_key_123');
            gun.get('our_global_room').set({ name: document.getElementById('user').value, text: secret });
            input.value = '';
        }

        function listen() {
            gun.get('our_global_room').map().once(async (data) => {
                if(!data || !data.text) return;
                const dec = await SEA.decrypt(data.text, 'shared_key_123');
                const div = document.createElement('div');
                div.className = 'm ' + (data.name === document.getElementById('user').value ? 'me' : '');
                div.innerText = data.name + ": " + dec;
                document.getElementById('msgs').appendChild(div);
                document.getElementById('msgs').scrollTop = 99999;
            });
        }
    </script>
</body>
</html>
