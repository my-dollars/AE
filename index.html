<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | COMMFORT</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; align-items: center; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 110px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 40px; left: 0; right: 0; padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #111; z-index: 100; }
        .btn { background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 9px; padding: 12px; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .on { color: #00ff88 !important; text-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="top">
        <input type="text" id="u" placeholder="ИМЯ" value="USER" style="width: 80px;">
        <div id="status-area">
            <span id="st" style="font-size: 9px; letter-spacing: 2px;">ОФЛАЙН</span>
        </div>
        <input type="text" id="k" placeholder="КЛЮЧ" style="width: 80px;">
    </div>
    <div id="msgs"></div>
    <div class="bot" id="btns" style="display: flex; width: 100%; box-sizing: border-box;">
        <button onclick="gen()" class="btn" style="flex: 1; margin-right: 5px;">ГЕНЕРИРОВАТЬ</button>
        <button onclick="join()" class="btn" style="flex: 1; margin-left: 5px;">ПРИСОЕДИНИТЬСЯ</button>
    </div>
    <div class="bot" id="chat" style="display: none; width: 100%; box-sizing: border-box;">
        <input type="text" id="mi" placeholder="VIBRATION..." style="flex: 1; text-align: left; border-bottom: 1px solid #d4af3730;">
        <button onclick="send()" class="btn" style="flex: 0; padding: 15px 30px; margin-left: 10px;">SEND</button>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let ref = null, connected = false;

        function notify(t) {
            const e = document.getElementById('toast');
            e.innerText = t; e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 3000);
        }

        function gen() {
            const key = "AX-" + Math.floor(100 + Math.random() * 899);
            document.getElementById('k').value = key;
            db.ref('rooms/' + key + '/active').set(true);
            notify("КЛЮЧ СОЗДАН: " + key);
            connect(key);
        }

        function join() {
            const key = document.getElementById('k').value.trim();
            if(!key) return notify("ВВЕДИТЕ КЛЮЧ");
            db.ref('rooms/' + key).once('value', (s) => {
                if (s.exists()) { notify("КЛЮЧ АКТИВИРОВАН"); connect(key); }
                else { notify("КЛЮЧ НЕ ВЕРЕН"); }
            });
        }

        function connect(key) {
            connected = true;
            // Меняем ОФЛАЙН на кнопку ОТСОЕДИНИТЬ
            document.getElementById('status-area').innerHTML = `<span onclick="disconnect()" style="font-size: 8px; color: #ff4444; cursor: pointer; letter-spacing: 1px; border: 1px solid #ff444450; padding: 4px 8px; border-radius: 4px;">ОТСОЕДИНИТЬ</span>`;
            document.getElementById('btns').style.display = 'none';
            document.getElementById('chat').style.display = 'flex';
            
            ref = db.ref('rooms/' + key + '/msgs');
            ref.on('child_added', (s) => {
                if (s.key === 'active') return;
                const d = s.val();
                const div = document.createElement('div');
                div.className = 'm';
                div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${d.u} • ${d.t}</div>${d.m}`;
                document.getElementById('msgs').appendChild(div);
                document.getElementById('msgs').scrollTop = 99999;
            });
        }

        function disconnect() {
            if(ref) ref.off(); // Выключаем прослушку сообщений
            connected = false;
            location.reload(); // Самый надежный способ "чистого" отсоединения
        }

        function send() {
            const m = document.getElementById('mi').value;
            if(!m || !ref) return;
            const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            ref.push({ u: document.getElementById('u').value, m: m, t: t });
            document.getElementById('mi').value = '';
        }
    </script>
</body>
</html>
