<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gun Dark Chat</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #0e1621; --side: #17212b; --msg: #182533; --my-msg: #2b5278; --text: #f5f5f5; --accent: #40a7e3; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        
        /* Авторизация */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .auth-card { background: var(--side); padding: 2rem; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); width: 300px; text-align: center; }
        
        /* Интерфейс */
        #chat-app { display: none; width: 100%; grid-template-columns: 250px 1-fr; }
        .sidebar { background: var(--side); border-right: 1px solid #000; padding: 10px; }
        .chat-area { display: flex; flex-direction: column; flex-grow: 1; }
        .messages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Сообщения */
        .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 14px; position: relative; }
        .msg.other { background: var(--msg); align-self: flex-start; }
        .msg.me { background: var(--my-msg); align-self: flex-end; }
        .msg-info { font-size: 10px; opacity: 0.6; margin-bottom: 4px; }

        /* Ввод */
        .input-bar { padding: 15px; background: var(--side); display: flex; gap: 10px; }
        input, button { background: #242f3d; border: none; color: #fff; padding: 10px; border-radius: 5px; }
        input { flex-grow: 1; outline: none; }
        button { cursor: pointer; background: var(--accent); font-weight: bold; }
        .room-btn { width: 100%; margin-top: 5px; text-align: left; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h3>Войти в чат</h3>
        <input type="text" id="username" placeholder="Логин" style="width: 80%; margin-bottom: 10px;"><br>
        <input type="password" id="password" placeholder="Пароль" style="width: 80%; margin-bottom: 10px;"><br>
        <button onclick="auth('login')">Войти</button>
        <button onclick="auth('reg')" style="background: transparent;">Рег.</button>
    </div>
</div>

<div id="chat-app" style="display: flex; width: 100%;">
    <div class="sidebar">
        <h4>Комнаты</h4>
        <input type="text" id="newRoom" placeholder="Название комнаты" style="width: 85%; font-size: 12px;">
        <button onclick="joinRoom(document.getElementById('newRoom').value)" class="room-btn">+</button>
        <div id="room-list"></div>
    </div>
    <div class="chat-area">
        <div id="chat-title" style="padding: 15px; background: var(--side); font-weight: bold;">Выберите комнату</div>
        <div class="messages" id="msg-box"></div>
        <div class="input-bar">
            <input type="text" id="msg-input" placeholder="Написать сообщение...">
            <button onclick="send()"> SEND </button>
        </div>
    </div>
</div>

<script>
    const gun = Gun(['https://gun-manhattan.herokuapp.com']);
    const user = gun.user().recall({storage: true});
    let currentRoom = null;

    // Авторизация
    async function auth(type) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(type === 'reg') user.create(u, p, (ack) => ack.err ? alert(ack.err) : auth('login'));
        else user.auth(u, p, (ack) => {
            if(ack.err) return alert(ack.err);
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-app').style.display = 'flex';
            joinRoom('general');
        });
    }

    // Комнаты
    function joinRoom(name) {
        if(!name) return;
        currentRoom = name;
        document.getElementById('chat-title').innerText = "Комната: " + name;
        document.getElementById('msg-box').innerHTML = '';
        
        // Слушаем сообщения (шифрование SEA включено в логику)
        gun.get('room-' + name).map().once(async (data, id) => {
            if(!data) return;
            const msgDiv = document.createElement('div');
            const isMe = data.pub === user.is.pub;
            msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
            msgDiv.innerHTML = `<div class="msg-info">${data.alias}</div>${data.text}`;
            document.getElementById('msg-box').appendChild(msgDiv);
            document.getElementById('msg-box').scrollTop = 99999;
        });
    }

    // Отправка
    function send() {
        const text = document.getElementById('msg-input').value;
        if(!text || !currentRoom) return;
        
        gun.get('room-' + currentRoom).set({
            text: text,
            alias: user.is.alias,
            pub: user.is.pub,
            time: Date.now()
        });
        document.getElementById('msg-input').value = '';
    }
</script>
</body>
</html>
