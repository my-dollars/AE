<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Future Node</title>
    <!-- SDK Телеграма, чтобы кнопки работали внутри приложения -->
    <script src="https://telegram.org"></script>
    <style>
        :root { --blue: #007aff; --bg: #000000; --card: #1c1c1e; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Экран входа */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        
        /* Экран приложения (скрыт в начале) */
        #main-app { display: none; flex-direction: column; height: 100%; }
        
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin: 20px; text-align: center; }
        input { background: #2c2c2e; border: none; color: white; padding: 15px; width: 100%; box-sizing: border-box; border-radius: 12px; margin-bottom: 10px; font-size: 16px; }
        
        .btn { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }

        /* Нижнее меню */
        .nav { position: fixed; bottom: 0; width: 100%; background: #121212; display: flex; border-top: 0.5px solid #333; padding: 15px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 12px; color: #888; cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--blue); font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- 1. ЭКРАН ЛОГИНА -->
    <div id="auth-screen">
        <h1 style="font-size: 50px; margin: 0;">🏦</h1>
        <h2>Будущий кошелек</h2>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="pass" placeholder="Пароль">
        <button class="btn" onclick="startApp()">Войти в Кошелек</button>
    </div>

    <!-- 2. ЭКРАН ПРИЛОЖЕНИЯ -->
    <div id="main-app">
        <!-- ВКЛАДКА КОШЕЛЕК -->
        <div id="tab-wallet" class="page">
            <div class="card" style="background: linear-gradient(135deg, #007aff, #00c6ff); margin-top: 40px;">
                <div style="font-size: 14px; opacity: 0.8;">Ваш баланс</div>
                <div style="font-size: 42px; font-weight: bold;" id="balance-val">0.00</div>
                <div id="wallet-id" style="font-size: 10px; margin-top: 10px; opacity: 0.6;">Загрузка ID...</div>
            </div>
            <div style="padding: 0 20px;">
                <button class="btn" style="background: #2c2c2e;" onclick="window.Telegram.WebApp.showAlert('Переводы в разработке')">Отправить монеты</button>
            </div>
        </div>

        <!-- ВКЛАДКА МАЙНИНГ -->
        <div id="tab-mine" class="page hidden" style="padding-top: 40px;">
            <div class="card">
                <h2>Майнинг Узел</h2>
                <h1 id="blocks-val">0</h1>
                <p style="color: #888;">Добыто блоков</p>
                <button class="btn" id="mine-btn" onclick="runMining()">ЗАПУСТИТЬ</button>
            </div>
        </div>

        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <nav class="nav">
            <button class="nav-item active" id="btn-wallet" onclick="switchTab('wallet')">💰 Кошелек</button>
            <button class="nav-item" id="btn-mine" onclick="switchTab('mine')">⛏️ Мой вид</button>
        </nav>
    </div>

    <script>
        // Инициализация Telegram SDK
        const tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        let isMining = false;
        let data = {
            bal: parseFloat(localStorage.getItem('my_bal')) || 0,
            blocks: parseInt(localStorage.getItem('my_blocks')) || 0
        };

        // ФУНКЦИЯ ВХОДА (ОЖИВЛЯЕТ КНОПКУ ВОЙТИ)
        function startApp() {
            const l = document.getElementById('login').value;
            const p = document.getElementById('pass').value;

            if(l.length < 2 || p.length < 2) {
                alert("Введите логин и пароль!");
                return;
            }

            // Прячем логин, показываем приложение
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            // Генерируем ID
            document.getElementById('wallet-id').innerText = "ID: " + btoa(l).substring(0,8).toUpperCase();
            
            updateDisplay();
            tg.HapticFeedback.impactOccurred('medium'); // Вибрация
        }

        // ПЕРЕКЛЮЧЕНИЕ КНОПОК ВНИЗУ
        function switchTab(name) {
            // Скрываем все вкладки
            document.getElementById('tab-wallet').classList.add('hidden');
            document.getElementById('tab-mine').classList.add('hidden');
            document.getElementById('btn-wallet').classList.remove('active');
            document.getElementById('btn-mine').classList.remove('active');

            // Показываем нужную
            document.getElementById('tab-' + name).classList.remove('hidden');
            document.getElementById('btn-' + name).classList.add('active');
            
            tg.HapticFeedback.impactOccurred('light');
        }

        // МАЙНИНГ
        function runMining() {
            const btn = document.getElementById('mine-btn');
            isMining = !isMining;

            if(isMining) {
                btn.innerText = "ОСТАНОВИТЬ";
                btn.style.background = "#ff3b30";
                
                // Каждые 3 секунды добавляем монеты
                window.mTimer = setInterval(() => {
                    data.bal += 0.10;
                    data.blocks += 1;
                    updateDisplay();
                    // Сохраняем в память телефона
                    localStorage.setItem('my_bal', data.bal);
                    localStorage.setItem('my_blocks', data.blocks);
                }, 3000);
                
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                btn.innerText = "ЗАПУСТИТЬ";
                btn.style.background = "#007aff";
                clearInterval(window.mTimer);
            }
        }

        function updateDisplay() {
            document.getElementById('balance-val').innerText = data.bal.toFixed(2);
            document.getElementById('blocks-val').innerText = data.blocks;
        }
    </script>
</body>
</html>
