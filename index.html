<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satoshi P2P Node | Post-Quantum</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --neon-green: #00ff41;
            --gold: #ffd700;
            --matrix-glow: rgba(0, 255, 65, 0.2);
            --danger: #ff4141;
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid var(--neon-green);
            box-sizing: border-box;
        }

        /* Login Screen */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
            text-align: center;
        }

        input {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 15px; width: 80%;
            margin-top: 20px; font-size: 1.2rem; outline: none;
            box-shadow: 0 0 10px var(--matrix-glow);
        }

        /* Terminal Interface */
        #terminal {
            flex: 1; overflow-y: auto; padding: 15px;
            font-size: 0.85rem; scroll-behavior: smooth;
            border-bottom: 1px solid var(--neon-green);
        }

        #dashboard {
            height: 250px; display: grid; grid-template-columns: 1fr 1fr;
            background: #000; padding: 10px; gap: 10px;
        }

        .stat-card {
            border: 1px solid var(--neon-green); padding: 10px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .gold-text { color: var(--gold); text-shadow: 0 0 5px var(--gold); }

        .btn {
            background: var(--neon-green); color: black;
            border: none; padding: 10px; cursor: pointer;
            font-weight: bold; margin-top: 5px; text-transform: uppercase;
        }

        .btn:active { transform: scale(0.98); }

        .mining-anim { animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } }

        /* DAO Mutation Styles */
        .stealth-mode {
            filter: grayscale(1) contrast(1.2) brightness(0.8);
            --neon-green: #0080ff; /* Blue shift after mutation */
        }
    </style>
</head>
<body class="matrix-bg">

<div id="auth-overlay">
    <h1 class="gold-text">SATOSHI P2P NODE</h1>
    <p>GENESIS BLOCK: 2009-01-03</p>
    <input type="password" id="private-key" placeholder="ENTER QUANTUM SEED PHRASE">
    <button class="btn" onclick="Node.init()">INITIALIZE NODE</button>
</div>

<div id="app">
    <div id="terminal"></div>
    
    <div id="dashboard">
        <div class="stat-card">
            <div>IDENTITY: <span id="node-id">UNKNOWN</span></div>
            <div>BALANCE: <span id="balance">0.00</span> SAT</div>
            <div class="gold-text">VOTING POWER: <span id="v-power">0</span> VP</div>
        </div>
        <div class="stat-card">
            <div>STATUS: <span id="mining-status">IDLE</span></div>
            <button class="btn" id="mine-btn" onclick="Node.toggleMining()">START RELAY MINING</button>
            <button class="btn" style="background: var(--gold);" onclick="Node.showDAO()">GOVERNANCE (DAO)</button>
        </div>
    </div>
</div>

<script>
    /* 
       Satoshi P2P Autonomous Logic 
       Post-Quantum Lattice Simulation & Self-Governance
    */

    const Node = {
        seed: null,
        balance: parseFloat(localStorage.getItem('sat_balance')) || 0,
        isMining: false,
        miningRate: 0.0001,
        isStealth: localStorage.getItem('stealth_mode') === 'true',
        
        init() {
            const key = document.getElementById('private-key').value;
            if (key.length < 8) return alert("SEED TOO WEAK. QUANTUM THREAT DETECTED.");
            
            this.seed = btoa(key).substring(0, 12);
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('node-id').innerText = `SAT-${this.seed}`;
            
            if(this.isStealth) document.body.classList.add('stealth-mode');
            
            this.log(`Node ${this.seed} connected to P2P mesh.`);
            this.log("Security: Lattice-based Kyber-1024 encryption active.");
            this.updateUI();
            this.haptic(100);
        },

        log(msg) {
            const term = document.getElementById('terminal');
            const entry = document.createElement('div');
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] > ${msg}`;
            term.appendChild(entry);
            term.scrollTop = term.scrollHeight;
        },

        updateUI() {
            document.getElementById('balance').innerText = this.balance.toFixed(6);
            document.getElementById('v-power').innerText = Math.floor(this.balance * 10);
            localStorage.setItem('sat_balance', this.balance);
        },

        toggleMining() {
            this.isMining = !this.isMining;
            const btn = document.getElementById('mine-btn');
            const status = document.getElementById('mining-status');
            
            if (this.isMining) {
                btn.innerText = "STOP RELAY";
                status.innerText = "RELAYING...";
                status.classList.add('mining-anim');
                this.miningCycle();
            } else {
                btn.innerText = "START RELAY MINING";
                status.innerText = "IDLE";
                status.classList.remove('mining-anim');
            }
            this.haptic(50);
        },

        miningCycle() {
            if (!this.isMining) return;
            
            // Simulation of relaying encrypted traffic
            const proof = btoa(Math.random().toString()).substring(0, 16);
            this.log(`Relay Proof: ${proof} ... Verified. Reward: +${this.miningRate} SAT`);
            
            this.balance += this.miningRate;
            // Deflationary mechanic
            this.miningRate *= 0.9999; 
            
            this.updateUI();
            setTimeout(() => this.miningCycle(), 3000);
        },

        showDAO() {
            const vp = Math.floor(this.balance * 10);
            this.log(`--- DAO GOVERNANCE ---`);
            this.log(`Proposal BIP-001: Activate Stealth Proxy Protocol.`);
            this.log(`Your Voting Power: ${vp} VP`);
            
            if (vp < 50) {
                this.log(`[SYSTEM]: Insufficient VP to trigger mutation. Need 50 VP.`);
            } else {
                if (confirm(`EXECUTE BIP-001? This will mutate the node's core DNA.`)) {
                    this.mutate();
                }
            }
            this.haptic([50, 50, 50]);
        },

        mutate() {
            this.log(">>> CONSENSUS REACHED. EVOLVING PROTOCOL...");
            localStorage.setItem('stealth_mode', 'true');
            document.body.classList.add('stealth-mode');
            this.haptic(500);
            setTimeout(() => {
                location.reload();
            }, 2000);
        },

        haptic(pattern) {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(pattern);
            }
        }
    };

    // Prevent zoom on mobile
    document.addEventListener('gesturestart', (e) => e.preventDefault());
</script>

</body>
</html>
