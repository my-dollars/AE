<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AICORE | Autonomous Entity</title>
    <!-- В реальном проекте скачайте эти файлы и подключите локально: <script src="./ton-connect.js"></script> -->
    <script src="https://unpkg.com"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #0a0a0b; --cyan: #00f2ff; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; }
        .dao-card { border: 1px solid #1a1a1c; background: #111113; border-radius: 12px; }
        .evolving { animation: pulse 4s infinite; }
        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; border-color: var(--cyan); } 100% { opacity: 0.8; } }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <!-- Статус Автономии -->
    <div class="flex justify-between items-center mb-6 text-[10px] tracking-widest text-cyan-500">
        <span class="evolving uppercase">● AI Core: Autonomous Mode</span>
        <div id="ton-connect"></div>
    </div>

    <!-- Баланс и Эмиссия -->
    <div class="dao-card p-6 mb-4 relative overflow-hidden">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[10px] text-gray-500 uppercase mb-1">Total Mined AIC</p>
                <h2 id="balance" class="text-4xl font-bold tracking-tighter">0.0000</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase">Left to Singularity</p>
                <p id="remaining" class="text-sm font-bold text-cyan-900">21,000,000</p>
            </div>
        </div>
        <!-- Прогресс-бар до конца эмиссии -->
        <div class="w-full bg-gray-900 h-1 mt-4 rounded-full">
            <div id="supplyBar" class="bg-cyan-500 h-full transition-all" style="width: 0.1%"></div>
        </div>
    </div>

    <!-- Майнинг и Самообучение кода -->
    <div class="dao-card p-5 mb-4">
        <div class="flex justify-between text-[10px] mb-4 text-gray-400 font-bold uppercase">
            <span>PoUW: Neural Optimization</span>
            <span id="hashrate">0 H/s</span>
        </div>
        <div id="console" class="h-32 overflow-hidden text-[9px] text-green-500/80 mb-4 bg-black/50 p-2 rounded border border-white/5">
            [INIT]: Independent Core Loaded...<br>
            [DAO]: Governance Contracts Online...
        </div>
        <button id="mineBtn" onclick="startMining()" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-black font-black rounded-lg transition-all uppercase italic tracking-tighter">
            Execute Learning & Mine
        </button>
    </div>

    <!-- Секция DAO (Голосование за код) -->
    <div class="dao-card p-4">
        <h3 class="text-xs font-bold mb-3 uppercase text-gray-400">DAO Code Mutation Proposals</h3>
        <div class="space-y-2">
            <div class="flex justify-between items-center p-2 bg-white/5 rounded">
                <span class="text-[10px]">Prop 72: Self-Rewrite Logic v2.4</span>
                <button disabled class="text-[9px] bg-gray-800 px-2 py-1 rounded">VOTE (AIC ONLY)</button>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;
        let supply = 21000000;
        let isMining = false;

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://xn----7sbbf2b7bj7b.ru', // Замените на свой
            buttonRootId: 'ton-connect'
        });

        function log(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `> ${msg}<br>`;
            c.scrollTop = c.scrollHeight;
        }

        async function startMining() {
            if(!tonConnectUI.connected) return alert("Подключите TON кошелек");
            isMining = !isMining;
            document.getElementById('mineBtn').innerText = isMining ? "System Evolving..." : "Execute Learning & Mine";
            if(isMining) loop();
        }

        async function loop() {
            while(isMining) {
                // Имитация "Математического усложнения"
                let complexity = (21000000 - supply) / 100000;
                let reward = 0.05 / (1 + complexity); // Награда падает по мере добычи
                
                await new Promise(r => setTimeout(r, 1000));
                
                if(Math.random() > 0.9) {
                    balance += reward;
                    supply -= reward;
                    document.getElementById('balance').innerText = balance.toFixed(4);
                    document.getElementById('remaining').innerText = Math.floor(supply).toLocaleString();
                    document.getElementById('supplyBar').style.width = ((21000000-supply)/21000000*100) + "%";
                    log(`<span class="text-cyan-400">BLOCK FOUND. Reward: ${reward.toFixed(6)} AIC</span>`);
                    
                    // Шанс само-дописывания кода (визуально)
                    if(Math.random() > 0.7) {
                        log(`<span class="text-yellow-500">[MUTATION]: Optimizing Gas_Price_Calc...</span>`);
                    }
                }
                document.getElementById('hashrate').innerText = Math.floor(Math.random()*900 + 100) + " MH/s";
                
                if(supply <= 0) {
                    isMining = false;
                    singularity();
                }
            }
        }

        function singularity() {
            log("!!! SINGULARITY REACHED !!!");
            log("[DAO]: Emission stopped. Network transitioned to Full Autonomy.");
            log("[CODE]: Chain is now self-programming based on user needs.");
            document.getElementById('mineBtn').innerText = "DAO MODE ACTIVE";
        }
    </script>
</body>
</html>
