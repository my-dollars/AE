<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA</title>
    <!-- Подключаем только самое необходимое -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #050505; color: #d4af37; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #top { display: flex; justify-content: space-between; padding: 20px; border-bottom: 1px solid #111; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; padding: 5px; outline: none; font-size: 12px; text-transform: uppercase; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        #input-area { padding: 20px; border-top: 1px solid #111; display: flex; gap: 10px; }
        .msg { border-left: 1px solid #d4af3750; padding-left: 10px; font-size: 14px; margin-bottom: 5px; }
        .online { color: #00ff88; text-shadow: 0 0 5px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="top">
        <input type="text" id="user" placeholder="NAME" value="USER" style="width: 80px;">
        <span id="status">OFFLINE</span>
        <input type="text" id="room" placeholder="ROOM" value="LOBBY" style="width: 80px;">
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="m-in" placeholder="MESSAGE..." style="flex: 1; text-align: left;">
        <button id="btn" onclick="start()" style="background: none; border: 1px solid #d4af37; color: #d4af37; padding: 5px 15px; cursor: pointer;">JOIN</button>
    </div>

    <script>
        // Твои проверенные ключи
        const config = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        // Инициализация
        firebase.initializeApp(config);
        const db = firebase.database();
        let connected = false;
        let ref = null;

        function start() {
            const u = document.getElementById('user').value;
            const r = document.getElementById('room').value;
            const btn = document.getElementById('btn');
            const msgIn = document.getElementById('m-in');

            if (!connected) {
                // ПОДКЛЮЧЕНИЕ
                connected = true;
                document.getElementById('status').innerText = "ONLINE";
                document.getElementById('status').className = "online";
                btn.innerText = "SEND";
                
                ref = db.ref('rooms/' + r);
                
                // Слушаем сервер
                ref.on('child_added', (s) => {
                    const d = s.val();
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = `<small style="opacity:0.3; font-size:9px;">${d.u} • ${d.t}</small><br>${d.m}`;
                    document.getElementById('chat').appendChild(div);
                    document.getElementById('chat').scrollTop = 99999;
                });
            } else {
                // ОТПРАВКА
                if (msgIn.value.trim() === "") return;
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                ref.push({ u: u, m: msgIn.value, t: now });
                msgIn.value = "";
            }
        }
    </script>
</body>
</html>
