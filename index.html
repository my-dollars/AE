<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org"></script>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: radial-gradient(circle, #1a1a2e, #16213e); color: #fff; text-align: center; }
        #ton-connect { margin: 20px auto; }
        .mining-area { border: 2px solid #4ecca3; padding: 30px; border-radius: 50%; width: 150px; height: 150px; margin: 20px auto; cursor: pointer; transition: 0.2s; }
        .mining-area:active { transform: scale(0.9); box-shadow: 0 0 20px #4ecca3; }
    </style>
</head>
<body>
    <h1>Future Chain Alpha</h1>
    <div id="ton-connect"></div> <!-- Кнопка входа через TON -->
    
    <div class="mining-area" onclick="mine()">
        <h2 id="balance">0</h2>
        <p>TAP TO MINE</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 1. Подключаем реальный блокчейн TON
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://xn----7sbbf2b7bj7b.github.io',
            buttonRootId: 'ton-connect'
        });

        let energy = 100;
        let coins = 0;

        function mine() {
            if (energy > 0) {
                coins += 1;
                energy -= 1;
                document.getElementById('balance').innerText = coins;
                tg.HapticFeedback.impactOccurred('light');
            } else {
                tg.showAlert("Энергия на нуле! Жди восстановления.");
            }
        }
    </script>
</body>
</html>
