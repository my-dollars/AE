<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Future Node: Anti-Censorship Protocol</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --blue: #007aff; --bg: #000000; --card: #111111; --gold: #ffd700; --neon: #00ff41; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 25px; text-align: center; }
        #main-app { display: none; flex-direction: column; height: 100%; }
        
        .card { background: var(--card); padding: 20px; border-radius: 15px; margin: 15px; border: 1px solid #333; position: relative; overflow: hidden; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--blue), transparent); animation: scan 3s linear infinite; }
        @keyframes scan { 0% { left: -100%; } 100% { left: 100%; } }

        .balance-num { font-size: 45px; font-weight: bold; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        .terminal { background: #050505; border-radius: 8px; padding: 12px; font-size: 10px; height: 120px; overflow-y: hidden; color: var(--neon); border: 1px solid #222; margin-top: 15px; line-height: 1.4; }
        
        input { background: #111; border: 1px solid #444; color: var(--neon); padding: 15px; width: 100%; box-sizing: border-box; border-radius: 5px; margin-bottom: 10px; font-size: 16px; }
        .btn { background: var(--blue); color: white; border: none; padding: 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn:active { background: #0056b3; }
        .btn-stop { background: #cc0000 !important; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; display: flex; padding-bottom: 25px; border-top: 1px solid #222; }
        .nav-item { flex: 1; text-align: center; color: #555; background: none; border: none; padding: 15px; font-size: 12px; }
        .nav-item.active { color: var(--blue); border-top: 2px solid var(--blue); }
        
        .hidden { display: none !important; }
        .status-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #222; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="font-size: 50px; margin-bottom: 10px;">🛡️</div>
        <h2 style="letter-spacing: 3px;">FUTURE NODE</h2>
        <p style="color: #888; font-size: 12px; margin-bottom: 25px;">ДЕЦЕНТРАЛИЗОВАННЫЙ ОБХОД БЛОКИРОВОК (DeACN)</p>
        <input type="text" id="node-name" placeholder="Введите ключ доступа">
        <button class="btn" id="login-trigger">ИНИЦИИРОВАТЬ УЗЕЛ</button>
    </div>

    <div id="main-app">
        <!-- WALLET -->
        <div id="tab-wallet" class="page">
            <div class="card" style="text-align: center; margin-top: 40px;">
                <div style="font-size: 11px; color: #888; margin-bottom: 10px;">АКТИВЫ ПРОТОКОЛА (FN)</div>
                <div class="balance-num" id="balance-val">0.0000</div>
                <div id="node-addr" style="font-size: 9px; color: #444; margin-top: 10px; word-break: break-all;"></div>
                <button class="btn" style="margin-top: 20px; font-size: 12px; padding: 12px;" onclick="tg.showAlert('Транзакции защищены протоколом Stealth')">ОТПРАВИТЬ FN</button>
            </div>
        </div>

        <!-- MINING (RELAY) -->
        <div id="tab-mine" class="page hidden">
            <div class="card" style="margin-top: 20px;">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 10px;">NETWORK RELAY STATUS</span>
                    <span id="status-text" style="color: #ff3b30; font-size: 10px;">OFFLINE</span>
                </div>
                
                <div style="text-align: center; margin: 15px 0;">
                    <div style="font-size: 12px; color: #888;">ПОДТВЕРЖДЕНО ПАКЕТОВ</div>
                    <h1 id="blocks-val" style="font-size: 50px; margin: 10px 0; color: var(--neon);">0</h1>
                    <div id="difficulty" style="font-size: 9px; color: #555;">СЛОЖНОСТЬ СЕТИ: 1.00x</div>
                </div>

                <div class="terminal" id="term">
                    > Узел готов к дешифровке...<br>
                    > Ожидание команды START...<br>
                </div>
                
                <button class="btn" id="mine-trigger" style="margin-top: 15px;">ЗАПУСТИТЬ МОСТ</button>
            </div>
        </div>

        <nav class="nav">
            <button class="nav-item active" id="btn-wallet">💰 CRYPTO</button>
            <button class="nav-item" id="btn-mine">⚡ RELAY</button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        let run = false;
        let timer = null;
        let data = {
            bal: parseFloat(localStorage.getItem('fn_v3_bal')) || 0,
            blocks: parseInt(localStorage.getItem('fn_v3_blocks')) || 0
        };

        const logs = [
            "Маскировка трафика под HTTPS...",
            "Обход DPI фильтрации...",
            "Создание туннеля через CDN...",
            "Пересылка пакета (128kb)...",
            "Защита от активного пробинга...",
            "Генерация Reality-ключа..."
        ];

        // ИСПРАВЛЕННЫЙ ЗАПУСК
        document.getElementById('login-trigger').onclick = function() {
            const name = document.getElementById('node-name').value;
            if(!name) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('node-addr').innerText = "VLESS://" + btoa(name + "salt").slice(0,32) + "@fn_relay:443";
            updateUI();
        };

        document.getElementById('mine-trigger').onclick = function() {
            const btn = this;
            const status = document.getElementById('status-text');
            const term = document.getElementById('term');

            if(run) {
                run = false;
                clearInterval(timer);
                btn.innerText = "ЗАПУСТИТЬ МОСТ";
                btn.classList.remove('btn-stop');
                status.innerText = "OFFLINE";
                status.style.color = "#ff3b30";
            } else {
                run = true;
                btn.innerText = "ОСТАНОВИТЬ";
                btn.classList.add('btn-stop');
                status.innerText = "ACTIVE RELAY";
                status.style.color = var(--neon);
                
                timer = setInterval(() => {
                    // Механика: чем больше блоков, тем сложнее добыча
                    let diff = 1 + (data.blocks / 250);
                    let reward = 0.08 / diff;
                    
                    data.blocks += 1;
                    data.bal += reward;
                    
                    let msg = logs[Math.floor(Math.random() * logs.length)];
                    term.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + term.innerHTML;
                    if(term.innerHTML.length > 600) term.innerHTML = term.innerHTML.slice(0, 600);

                    document.getElementById('difficulty').innerText = `СЛОЖНОСТЬ СЕТИ: ${diff.toFixed(2)}x`;
                    
                    save();
                    updateUI();
                    if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }, 2500);
            }
        };

        document.getElementById('btn-wallet').onclick = () => switchTab('wallet');
        document.getElementById('btn-mine').onclick = () => switchTab('mine');

        function switchTab(t) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('btn-' + t).classList.add('active');
        }

        function save() {
            localStorage.setItem('fn_v3_bal', data.bal);
            localStorage.setItem('fn_v3_blocks', data.blocks);
        }

        function updateUI() {
            document.getElementById('balance-val').innerText = data.bal.toFixed(4);
            document.getElementById('blocks-val').innerText = data.blocks;
        }
    </script>
</body>
</html>
