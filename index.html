<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AICORE P2P Ledger</title>
    <!-- Библиотека для P2P связи между устройствами (Peer-to-Peer) -->
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #ffffff; color: #1d1d1f; font-family: -apple-system, sans-serif; }
        .card { background: #f5f5f7; border-radius: 24px; padding: 24px; }
        .btn { background: #0071e3; color: white; border-radius: 12px; font-weight: 600; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .mono { font-family: 'SF Mono', monospace; font-size: 10px; }
    </style>
</head>
<body class="max-w-md mx-auto p-6 pb-24">

    <header class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black tracking-tight">AICORE <span class="text-blue-600">P2P</span></h1>
        <div id="peer-count" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded-full font-bold uppercase">Nodes: Connect...</div>
    </header>

    <!-- Кошелек -->
    <div class="card mb-6 shadow-sm border border-gray-100">
        <p class="text-[10px] uppercase font-bold text-gray-400 mb-2">Ваш баланс в едином реестре</p>
        <div class="flex items-baseline gap-2">
            <h2 id="balance-display" class="text-5xl font-bold tracking-tighter">0.00</h2>
            <span class="font-bold text-blue-500">AIC</span>
        </div>
        <p id="my-id" class="mono mt-4 p-2 bg-white rounded-lg text-gray-500 break-all border border-gray-100 italic"></p>
    </div>

    <!-- Перевод -->
    <div class="space-y-3">
        <h3 class="text-sm font-bold ml-2">Отправить по P2P-каналу</h3>
        <input id="target-id" class="w-full p-4 rounded-2xl bg-gray-100 outline-none text-xs mono" placeholder="Вставьте ID получателя...">
        <input id="send-amount" type="number" class="w-full p-4 rounded-2xl bg-gray-100 outline-none font-bold" placeholder="Сумма AIC">
        <button onclick="sendTransaction()" class="btn w-full py-4 shadow-lg shadow-blue-200">ПОДПИСАТЬ И ПЕРЕДАТЬ</button>
    </div>

    <!-- Реестр Транзакций (Live) -->
    <div class="mt-8">
        <p class="text-[10px] font-black uppercase text-gray-400 mb-3 ml-2">Последние записи в цепи:</p>
        <div id="ledger-box" class="space-y-2 max-h-40 overflow-y-auto">
            <div class="text-[10px] text-gray-400 italic px-2">Синхронизация реестра...</div>
        </div>
    </div>

    <script>
        // 1. Инициализация P2P Реестра (Gun.js)
        // Используем публичные relay-узлы для первичного поиска устройств
        const gun = Gun(['https://gun-manhattan.herokuapp.com']);
        const chain = gun.get('aicore-global-ledger-2026');

        // 2. Создание ID устройства (Wallet Address)
        const mySecret = localStorage.getItem('aic-secret') || Math.random().toString(36).slice(2);
        localStorage.setItem('aic-secret', mySecret);
        const myID = 'AIC_' + btoa(mySecret).substring(0, 12);
        document.getElementById('my-id').innerText = "Ваш ID: " + myID;

        // 3. Работа с Балансом
        // В нашем P2P-блокчейне баланс хранится в распределенном графе
        chain.get(myID).on((data) => {
            const bal = data ? data.balance : 0;
            document.getElementById('balance-display').innerText = parseFloat(bal).toFixed(2);
        });

        // 4. Майнинг (для теста даем начальные монеты)
        if (!localStorage.getItem('mined')) {
            chain.get(myID).put({ balance: 100.00 }); // Дарим 100 AIC за запуск ноды
            localStorage.setItem('mined', 'true');
        }

        // 5. Функция Перевода (Запись в реестр)
        function sendTransaction() {
            const target = document.getElementById('target-id').value;
            const amount = parseFloat(document.getElementById('send-amount').value);
            const myCurrentBal = parseFloat(document.getElementById('balance-display').innerText);

            if (!target || !amount || amount <= 0) return alert("Ошибка ввода");
            if (amount > myCurrentBal) return alert("Недостаточно AIC!");

            // Списываем у себя
            chain.get(myID).put({ balance: myCurrentBal - amount });

            // Добавляем получателю (он увидит это мгновенно)
            chain.get(target).once((data) => {
                const targetBal = (data ? data.balance : 0) + amount;
                chain.get(target).put({ balance: targetBal });
            });

            // Записываем транзакцию в историю
            const txId = Math.random().toString(16).slice(2);
            chain.get('history').get(txId).put({
                from: myID,
                to: target,
                amount: amount,
                time: new Date().toLocaleTimeString()
            });

            alert("Транзакция отправлена в P2P сеть!");
        }

        // 6. Отображение Истории (Live со всех устройств)
        chain.get('history').map().on((tx) => {
            if (!tx) return;
            const item = document.createElement('div');
            item.className = "bg-gray-50 p-2 rounded-lg text-[9px] mono border border-gray-100";
            item.innerHTML = `<span class="text-blue-500">${tx.time}</span> | ${tx.from.slice(0,6)} -> ${tx.to.slice(0,6)} | <span class="font-bold">${tx.amount} AIC</span>`;
            const box = document.getElementById('ledger-box');
            box.prepend(item);
            if (box.childNodes.length > 10) box.lastChild.remove();
        });

        // Статус сети
        setInterval(() => {
            document.getElementById('peer-count').innerText = "Nodes: Active (P2P)";
        }, 3000);

    </script>
</body>
</html>
