<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AXON // BITCOIN STANDARD</title>
    <style>
        :root { --bg: #000; --green: #00ff41; --dim: #1a1a1a; --warn: #ffcc00; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* AUTH LAYER */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; padding: 30px; align-items: center; justify-content: center; text-align: center; }
        .seed-box { background: var(--dim); padding: 20px; border-radius: 8px; margin: 20px 0; font-size: 14px; color: var(--warn); border: 1px dashed var(--warn); }
        input, textarea { width: 100%; max-width: 350px; background: #080808; border: 1px solid #333; color: var(--green); padding: 15px; margin: 10px 0; outline: none; }
        .btn { width: 100%; max-width: 350px; background: var(--green); color: #000; border: none; padding: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* MAIN UI */
        header { padding: 30px; border-bottom: 1px solid var(--dim); }
        .bal { font-size: 42px; font-weight: 800; color: var(--green); letter-spacing: -2px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--dim); }
        .s-box { padding: 15px 30px; border-right: 1px solid var(--dim); }
        .label { font-size: 9px; color: #555; text-transform: uppercase; }

        .terminal { flex: 1; background: #000; padding: 20px; font-size: 11px; color: #008f11; overflow-y: auto; line-height: 1.5; }
        footer { padding: 20px; background: #050505; border-top: 1px solid var(--dim); }
    </style>
</head>
<body>

<div id="gate">
    <h2 style="color: var(--green); letter-spacing: 5px;">AXON MESH</h2>
    
    <div id="setup-view">
        <p style="font-size: 12px; margin-top: 20px;">НОВЫЙ УЗЕЛ? СОХРАНИТЕ ЭТИ 12 СЛОВ:</p>
        <div class="seed-box" id="new-seed">...генерируем хаос...</div>
        <p style="font-size: 9px; color: #666;">ПОТЕРЯЕТЕ СЛОВА — ПОТЕРЯЕТЕ ВСЁ.</p>
        <button class="btn" onclick="Core.launch(true)">Я ЗАПИСАЛ, ВОЙТИ</button>
        <button class="btn" style="background:none; color:var(--green); border:1px solid var(--green)" onclick="Core.showImport()">У МЕНЯ ЕСТЬ СИД-ФРАЗА</button>
    </div>

    <div id="import-view" style="display:none">
        <p style="font-size: 12px;">ВВЕДИТЕ ВАШИ 12 СЛОВ:</p>
        <textarea id="input-seed" rows="3" placeholder="word1 word2 ..."></textarea>
        <button class="btn" onclick="Core.launch(false)">ВОССТАНОВИТЬ ДОСТУП</button>
        <button class="btn" style="background:none; color:#555; border:1px solid #333" onclick="location.reload()">НАЗАД</button>
    </div>
</div>

<header>
    <div class="label">Balance Asset</div>
    <div class="bal"><span id="ui-bal">0.0000</span> <span style="font-size: 16px; color:#333">AXN</span></div>
    <div id="ui-addr" style="font-size: 9px; color: #444; margin-top: 10px;">ADDR :: STANDBY</div>
</header>

<div class="stats">
    <div class="s-box"><div class="label">Сложность</div><div id="ui-diff">1.00</div></div>
    <div class="s-box"><div class="label">Сеть</div><div style="color:var(--green)">P2P_SIMULATOR</div></div>
</div>

<div class="terminal" id="term">> ИНИЦИАЛИЗАЦИЯ ЯДРА...</div>

<footer>
    <button class="btn" onclick="Core.mine()">ПОДТВЕРДИТЬ ТРАНЗАКЦИИ (MINE)</button>
</footer>

<script>
const Core = {
    wordList: ["alpha", "beta", "gamma", "delta", "echo", "fox", "golf", "hotel", "india", "july", "kilo", "lima", "maze", "node", "ocean", "pixel", "quant", "river", "solar", "terra", "unit", "vocal", "wave", "zone"],
    currentSeed: '',
    
    init() {
        // Создаем новую фразу при загрузке
        let words = [];
        for(let i=0; i<12; i++) words.push(this.wordList[Math.floor(Math.random()*this.wordList.length)]);
        this.currentSeed = words.join(' ');
        document.getElementById('new-seed').innerText = this.currentSeed;
    },

    showImport() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('import-view').style.display = 'flex';
    },

    async launch(isNew) {
        const seed = isNew ? this.currentSeed : document.getElementById('input-seed').value.trim().toLowerCase();
        if(seed.split(' ').length < 12) return alert("Нужно ровно 12 слов");

        // Генерируем адрес из сид-фразы
        const hash = await this.sha256(seed);
        this.address = hash.substring(0, 16).toUpperCase();
        this.seed = seed;
        
        // Загружаем баланс именно для этого адреса
        this.balance = parseFloat(localStorage.getItem(`ax_v12_${this.address}`) || 0);
        
        document.getElementById('gate').style.transform = 'translateY(-100%)';
        document.getElementById('ui-addr').innerText = `ADDR :: AX-${this.address}`;
        this.updateUI();
        this.log(`Узел запущен. Адрес детерминирован из Seed-фразы.`);
    },

    async sha256(m) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(m));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    },

    mine() {
        this.log("Поиск хеша блока...");
        setTimeout(() => {
            const reward = 0.05;
            this.balance += reward;
            localStorage.setItem(`ax_v12_${this.address}`, this.balance);
            this.log(`Блок найден! Награда: ${reward} AXN`);
            this.updateUI();
        }, 1500);
    },

    log(m) {
        const t = document.getElementById('term');
        t.innerHTML = `> ${m}<br>` + t.innerHTML;
    },

    updateUI() {
        document.getElementById('ui-bal').innerText = this.balance.toFixed(4);
    }
};

window.onload = () => Core.init();
</script>
</body>
</html>
