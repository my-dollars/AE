<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | P2P SYSTEM</title>
    <!-- Библиотека PeerJS превращает браузер в сервер -->
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 110px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 40px; left: 0; right: 0; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #000; z-index: 100; }
        .btn { background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 9px; padding: 12px; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .on { color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; display: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="toast"></div>
    <div class="top">
        <input type="text" id="u" placeholder="ИМЯ" value="USER" style="width: 80px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">ОФЛАЙН</span>
        <input type="text" id="k" placeholder="КЛЮЧ" style="width: 80px;">
    </div>
    <div id="msgs"></div>
    <div class="bot">
        <div id="auth-btns" style="display: flex; gap: 10px;">
            <button onclick="gen()" class="btn" style="flex: 1;">ГЕНЕРИРОВАТЬ</button>
            <button onclick="join()" class="btn" style="flex: 1;">ПРИСОЕДИНИТЬСЯ</button>
        </div>
        <div id="chat-input" style="display: none; gap: 10px;">
            <input type="text" id="mi" placeholder="VIBRATION..." style="flex: 1; text-align: left;">
            <button onclick="send()" class="btn">SEND</button>
        </div>
    </div>
    <script>
        let peer, conn, user, isHost = false;

        function notify(t) {
            const e = document.getElementById('toast');
            e.innerText = t; e.style.display = 'block';
            setTimeout(() => e.style.display = 'none', 3000);
        }

        // ГЕНЕРАЦИЯ (Создаем ID и ждем гостей)
        function gen() {
            user = document.getElementById('u').value || "HOST";
            const key = "AX-" + Math.floor(100 + Math.random() * 899);
            document.getElementById('k').value = key;
            
            peer = new Peer(key); // Регистрируем этот ID в сети
            isHost = true;

            peer.on('open', (id) => {
                notify("КЛЮЧ СОЗДАН: " + id);
                document.getElementById('st').innerText = "HOSTING";
                document.getElementById('st').className = "on";
                document.getElementById('auth-btns').style.display = 'none';
                document.getElementById('chat-input').style.display = 'flex';
            });

            peer.on('connection', (c) => {
                conn = c;
                notify("КЛЮЧ АКТИВИРОВАН ГOСТЕМ");
                setupEvents();
            });
        }

        // ПРИСОЕДИНЕНИЕ (Подключаемся к хосту)
        function join() {
            user = document.getElementById('u').value || "GUEST";
            const key = document.getElementById('k').value.trim();
            if(!key) return notify("ВВЕДИТЕ КЛЮЧ");

            peer = new Peer(); // Создаем случайный ID для себя
            peer.on('open', () => {
                conn = peer.connect(key); // Стыкуемся с хостом по его ключу
                setupEvents();
            });
            
            peer.on('error', () => notify("КЛЮЧ НЕ ВЕРЕН"));
        }

        function setupEvents() {
            conn.on('open', () => {
                document.getElementById('st').innerText = "ОНЛАЙН";
                document.getElementById('st').className = "on";
                document.getElementById('auth-btns').style.display = 'none';
                document.getElementById('chat-input').style.display = 'flex';
                notify("СОЕДИНЕНИЕ УСТАНОВЛЕНО");
            });

            conn.on('data', (d) => addMsg(d.u, d.m, d.t));
        }

        function send() {
            const m = document.getElementById('mi').value;
            if(!m || !conn) return;
            const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            conn.send({ u: user, m: m, t: t });
            addMsg(user, m, t);
            document.getElementById('mi').value = '';
        }

        function addMsg(u, m, t) {
            const div = document.createElement('div');
            div.className = 'm';
            div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${u} • ${t}</div>${m}`;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = 99999;
        }
    </script>
</body>
</html>
