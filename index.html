<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Blockchain</title>
    <!-- Подключаем SDK Телеграма и Крипто-библиотеку -->
    <script src="https://telegram.org"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .block { border: 2px solid #0088cc; margin: 10px auto; padding: 15px; border-radius: 12px; 
                background: #252525; max-width: 90%; word-wrap: break-word; font-size: 11px; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; 
                border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .hash { color: #00ff88; }
    </style>
</head>
<body>
    <h1>Mini Blockchain</h1>
    <div id="status">Инициализация...</div>
    <br>
    <button id="mineBtn">Майнить блок</button>
    <div id="chain"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Класс блока
        class Block {
            constructor(index, data, prevHash = '') {
                this.index = index;
                this.data = data;
                this.prevHash = prevHash;
                this.timestamp = Date.now();
                this.hash = this.calculateHash();
            }

            calculateHash() {
                // Безопасный вызов CryptoJS
                return CryptoJS.SHA256(
                    this.index + this.prevHash + this.timestamp + JSON.stringify(this.data)
                ).toString();
            }
        }

        let blockchain = [];

        function init() {
            // Создаем первый блок
            blockchain.push(new Block(0, "Genesis Block", "0"));
            document.getElementById('status').innerText = "Блокчейн готов!";
            render();
        }

        function render() {
            const container = document.getElementById('chain');
            container.innerHTML = blockchain.map(b => `
                <div class="block">
                    <b>Блок #${b.index}</b><br>
                    <span class="hash">Hash: ${b.hash}</span><br>
                    <small>Prev: ${b.prevHash.substring(0, 24)}...</small>
                </div>
            `).reverse().join('');
        }

        function addBlock() {
            const prevBlock = blockchain[blockchain.length - 1];
            const userName = tg.initDataUnsafe.user?.first_name || "Guest";
            
            const newBlock = new Block(
                blockchain.length, 
                { user: userName, action: "Mine" }, 
                prevBlock.hash
            );
            
            blockchain.push(newBlock);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            render();
        }

        // Ждем полной загрузки страницы и библиотек
        window.onload = () => {
            document.getElementById('mineBtn').onclick = addBlock;
            init();
        };
    </script>
</body>
</html>
