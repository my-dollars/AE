<!-- Подключение Tailwind и Google Fonts -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<body class="bg-[#0D0D0D] text-[#E0E0E0] font-['Inter'] flex items-center justify-center min-h-screen">
  <div class="w-full max-w-md p-8 bg-[#1A1A1A] border border-[#2A2A2A] rounded-3xl shadow-2xl backdrop-blur-md bg-opacity-80">
    <h1 class="text-3xl font-light tracking-widest text-center mb-8 bg-gradient-to-r from-[#D4AF37] to-[#F9E29C] bg-clip-text text-transparent">LUMINA</h1>
    
    <div class="space-y-6">
      <input type="text" id="name" placeholder="Ваше имя" 
             class="w-full bg-transparent border-b border-[#333] py-2 outline-none focus:border-[#D4AF37] transition-colors placeholder-[#555]">
      
      <input type="text" id="roomId" placeholder="ID Комнаты" 
             class="w-full bg-transparent border-b border-[#333] py-2 outline-none focus:border-[#D4AF37] transition-colors placeholder-[#555]">
      
      <button class="w-full py-4 mt-4 bg-[#D4AF37] text-black font-semibold rounded-xl hover:bg-[#F9E29C] transition-all transform active:scale-95 shadow-[0_0_20px_rgba(212,175,55,0.2)]">
        Войти в пространство
      </button>
    </div>
  </div>
</body>
