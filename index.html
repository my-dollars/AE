<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Safe Messenger</title>
    <!-- Подключаем локальные файлы, которые ты создашь в GitHub -->
    <script src="gun.js"></script>
    <script src="sea.js"></script>
    <style>
        :root { --tg-blue: #248bcf; --bg: #ffffff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .active { display: flex; }

        /* Вход */
        #auth-screen { justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .card { width: 100%; max-width: 320px; text-align: center; }
        h1 { color: var(--tg-blue); font-size: 24px; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #f9f9f9; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: var(--tg-blue); color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .link { color: var(--tg-blue); font-size: 14px; margin-top: 20px; cursor: pointer; display: block; font-weight: 500; }
        #status { font-size: 11px; margin-top: 20px; line-height: 1.4; }

        /* Чат */
        header { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: #f0f2f5; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.05); position: relative; }
        .me { align-self: flex-end; background: #effdde; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }
        .u-name { font-size: 11px; color: var(--tg-blue); font-weight: bold; display: block; margin-bottom: 2px; }
        .footer { padding: 10px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ВХОД -->
    <div id="auth-screen" class="screen active">
        <div class="card">
            <h1>Safe Messenger</h1>
            <input id="alias" placeholder="Твой логин">
            <input id="pass" type="password" placeholder="Твой пароль">
            <button onclick="handleAuth('login')">Войти</button>
            <span class="link" onclick="handleAuth('reg')">Создать аккаунт</span>
            <div id="status">Проверка системы...</div>
        </div>
    </div>

    <!-- ЭКРАН 2: ЧАТ -->
    <div id="chat-screen" class="screen">
        <header>
            <span id="chat-user">Мессенджер</span>
            <span style="color: #999; font-weight: normal; font-size: 14px;" onclick="location.reload()">Выйти</span>
        </header>
        <div id="messages"></div>
        <div class="footer">
            <input id="msg-input" style="margin:0" placeholder="Сообщение...">
            <button style="width: 60px;" onclick="send()">➤</button>
        </div>
    </div>

    <script>
        let gun, user;
        const ROOM = 'global_encrypted_room_v3';
        const SECRET = 'key_for_friends_123';

        // Проверка библиотек при запуске
        window.onload = () => {
            const st = document.getElementById('status');
            if (typeof Gun !== 'undefined') {
                st.innerHTML = "<span style='color:green'>● Система готова к работе</span>";
                gun = Gun(['https://gun-manhattan.herokuapp.com']);
                user = gun.user().recall({storage: true});
            } else {
                st.innerHTML = "<span style='color:red'>● Ошибка: Библиотеки заблокированы.<br>Создай файлы gun.js и sea.js в GitHub!</span>";
            }
        };

        async function handleAuth(mode) {
            const a = document.getElementById('alias').value;
            const p = document.getElementById('pass').value;
            if(!a || !p) return alert("Введите логин и пароль");

            // Если библиотеки не загрузились, даем войти для теста интерфейса
            if (typeof Gun === 'undefined') {
                alert("Внимание: библиотеки не найдены, чат будет работать только в демо-режиме.");
                openApp(a);
                return;
            }

            if(mode === 'reg') {
                user.create(a, p, (ack) => {
                    if(ack.err) alert("Ошибка: " + ack.err);
                    else alert("Аккаунт создан! Теперь жми Войти");
                });
            } else {
                user.auth(a, p, (ack) => {
                    if(ack.err) alert("Ошибка входа: " + ack.err);
                    else openApp(a);
                });
            }
        }

        function openApp(userName) {
            document.getElementById('auth-screen').classList.remove('active');
            document.getElementById('chat-screen').classList.add('active');
            document.getElementById('chat-user').innerText = "Я: " + userName;
            
            if (typeof Gun !== 'undefined') {
                startListening();
                if(Notification.permission !== 'granted') Notification.requestPermission();
            }
        }

        async function send() {
            const input = document.getElementById('msg-input');
            if(!input.value || typeof SEA === 'undefined') return;

            const encrypted = await SEA.encrypt(input.value, SECRET);
            gun.get(ROOM).set({
                name: document.getElementById('alias').value,
                text: encrypted,
                at: Date.now()
            });
            input.value = '';
        }

        function startListening() {
            const box = document.getElementById('messages');
            gun.get(ROOM).map().once(async (data) => {
                if(!data || !data.text) return;
                const dec = await SEA.decrypt(data.text, SECRET);
                if(!dec) return;

                const isMe = data.name === document.getElementById('alias').value;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `<span class="u-name">${data.name}</span>${dec}`;
                box.appendChild(div);
                box.scrollTop = box.scrollHeight;

                if(document.hidden && !isMe) {
                    new Notification("Сообщение от " + data.name, { body: dec });
                }
            });
        }
    </script>
</body>
</html>
