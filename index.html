<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA | Luxury Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #d4af37; height: 100dvh; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(25px); border: 1px solid rgba(212, 175, 55, 0.15); }
        input { background: transparent; border-bottom: 1px solid #222; transition: 0.5s; color: white; }
        input:focus { border-color: #d4af37; outline: none; }
        .btn-gold { border: 1px solid #d4af37; color: #d4af37; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 99px; }
        .btn-gold:hover { background: #d4af37; color: #000; box-shadow: 0 0 40px rgba(212, 175, 55, 0.3); }
        #messages::-webkit-scrollbar { width: 2px; }
        #messages::-webkit-scrollbar-thumb { background: #d4af37; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- LOGIN -->
    <div id="auth-screen" class="glass p-12 rounded-[60px] w-full max-w-sm text-center shadow-2xl fade-in">
        <h1 class="text-5xl font-light tracking-[0.6em] mb-14 uppercase opacity-90">Aura</h1>
        <div class="space-y-10">
            <input type="text" id="username" placeholder="NAME" class="w-full text-center py-3 tracking-[0.4em] uppercase text-[10px]">
            <input type="text" id="room-id" placeholder="SPACE ID" class="w-full text-center py-3 tracking-[0.4em] uppercase text-[10px]">
            <button onclick="joinRoom()" class="btn-gold w-full py-5 uppercase text-[9px] tracking-[0.5em] mt-8">Enter Frequency</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="room-screen" class="hidden glass p-10 rounded-[60px] w-full max-w-2xl h-[85vh] flex flex-col shadow-2xl fade-in">
        <div class="flex justify-between items-center mb-10 border-b border-[#222] pb-6">
            <span id="display-room" class="text-[8px] tracking-[0.6em] uppercase opacity-30">Frequency: -</span>
            <button onclick="location.reload()" class="text-[8px] tracking-widest uppercase hover:text-white transition-opacity">Disconnect</button>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto space-y-8 mb-8 text-[14px] font-light tracking-wide px-4"></div>
        <div class="flex gap-4 items-center bg-[#0a0a0a] rounded-full px-8 py-2 border border-[#1a1a1a]">
            <input type="text" id="msg-input" placeholder="SEND VIBRATION..." class="flex-1 border-none text-[10px] tracking-[0.3em] uppercase py-4">
            <button onclick="sendMsg()" class="text-[#d4af37] text-[10px] tracking-[0.4em] uppercase font-bold hover:scale-110 transition-transform">Send</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            authDomain: "aurachat-f9d4f.firebaseapp.com",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            storageBucket: "aurachat-f9d4f.firebasestorage.app",
            messagingSenderId: "532846952097",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentRoom = '', user = '';

        function joinRoom() {
            user = document.getElementById('username').value.trim();
            currentRoom = document.getElementById('room-id').value.trim();
            if(!user || !currentRoom) return;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('room-screen').classList.remove('hidden');
            document.getElementById('display-room').innerText = `Frequency: ${currentRoom}`;

            db.ref('rooms/' + currentRoom).on('child_added', (s) => {
                const d = s.val();
                const div = document.createElement('div');
                div.className = "fade-in";
                div.innerHTML = `<div class="opacity-20 text-[7px] tracking-[0.4em] uppercase mb-2">${d.user}</div>
                                 <div class="text-[#fdfdfd] border-l-2 border-[#d4af37] pl-5 py-2 bg-gradient-to-r from-[#d4af3710] to-transparent">${d.text}</div>`;
                document.getElementById('messages').appendChild(div);
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });
        }

        function sendMsg() {
            const i = document.getElementById('msg-input');
            if(!i.value.trim()) return;
            db.ref('rooms/' + currentRoom).push({ user, text: i.value });
            i.value = '';
        }
        document.getElementById('msg-input').addEventListener("keypress", (e) => { if(e.key === "Enter") sendMsg(); });
    </script>
</body>
</html>
