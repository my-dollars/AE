<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // P2P MESH LIVE</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root { --bg: #000; --green: #00ff41; --dim: #0a0a0a; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }

        header { padding: 40px 25px 20px; border-bottom: 1px solid var(--border); background: #050505; }
        .bal-val { font-size: 36px; font-weight: 900; color: var(--green); }
        .peer-info { font-size: 8px; color: #444; margin-top: 5px; word-break: break-all; cursor: pointer; }

        .net-status { background: var(--dim); padding: 8px 25px; border-bottom: 1px solid var(--border); font-size: 9px; display: flex; justify-content: space-between; color: #555; }
        
        .viewport { flex: 1; overflow-y: auto; padding: 15px; background: #020202; padding-bottom: 220px; }
        .block { background: #080808; border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; border-left: 3px solid var(--green); }
        .msg-text { color: #ffaa00; font-size: 10px; margin-top: 8px; font-style: italic; }

        .controls { position: fixed; bottom: 0; width: 100%; background: rgba(5,5,5,0.98); backdrop-filter: blur(15px); border-top: 1px solid var(--border); padding: 15px 20px calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
        .input { background: #000; border: 1px solid var(--border); color: var(--green); padding: 10px; font-size: 10px; outline: none; margin-bottom: 8px; width: 100%; }
        .btn { width: 100%; background: var(--green); color: #000; border: none; padding: 16px; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .btn:disabled { background: #111; color: #333; }
    </style>
</head>
<body>

<header>
    <div class="bal-val"><span id="ui-bal">0.0000</span> <span style="font-size: 12px; color: #444;">AXN</span></div>
    <div class="peer-info" id="ui-my-id" onclick="navigator.clipboard.writeText(this.innerText)">PEER ID: ИНИЦИАЛИЗАЦИЯ...</div>
</header>

<div class="net-status">
    <div id="ui-conn">КЛИЕНТ: OFFLINE</div>
    <div id="ui-blocks">БЛОКИ: 0</div>
</div>

<div class="viewport" id="chain-view"></div>

<div class="controls">
    <div style="display: flex; gap: 5px;">
        <input type="text" id="remote-id" class="input" placeholder="CONNECT TO PEER ID...">
        <button class="btn" style="padding: 10px; width: auto; font-size: 8px;" onclick="P2P.connect()">СВЯЗАТЬ</button>
    </div>
    <input type="text" id="tx-msg" class="input" placeholder="СООБЩЕНИЕ В СЕТЬ...">
    <button id="mine-btn" class="btn" onclick="P2P.mine()">ПОДТВЕРДИТЬ БЛОК (PoW)</button>
</div>

<script>
const P2P = {
    peer: null,
    conn: null,
    chain: JSON.parse(localStorage.getItem('axon_p2p_chain') || '[]'),
    
    init() {
        this.peer = new Peer('ax-' + Math.random().toString(36).substr(2, 9));
        this.peer.on('open', (id) => {
            document.getElementById('ui-my-id').innerText = `MY ID: ${id} (TAP TO COPY)`;
        });

        // Слушаем входящие соединения
        this.peer.on('connection', (c) => {
            this.conn = c;
            this.setupConn();
            alert("Узел подключился к вам!");
        });

        this.render();
        this.updateUI();
    },

    connect() {
        const remoteId = document.getElementById('remote-id').value;
        if(!remoteId) return;
        this.conn = this.peer.connect(remoteId);
        this.setupConn();
        alert("Попытка соединения...");
    },

    setupConn() {
        this.conn.on('open', () => {
            document.getElementById('ui-conn').innerText = "КЛИЕНТ: CONNECTED";
            document.getElementById('ui-conn').style.color = "#00ff41";
            // Отправляем свою цепочку при подключении
            this.conn.send({ type: 'CHAIN', data: this.chain });
        });

        this.conn.on('data', (data) => {
            if(data.type === 'BLOCK') {
                this.addBlock(data.data, false);
            }
            if(data.type === 'CHAIN') {
                this.syncChain(data.data);
            }
        });
    },

    async mine() {
        const btn = document.getElementById('mine-btn');
        const msg = document.getElementById('tx-msg').value;
        btn.disabled = true; btn.innerText = "POW: ВЫЧИСЛЕНИЕ...";

        let nonce = 0;
        let prev = this.chain.length > 0 ? this.chain[0].hash : "0".repeat(64);
        let hash = "";

        while (true) {
            nonce++;
            const raw = prev + nonce + msg;
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
            hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
            if (nonce % 1000 === 0) await new Promise(r => setTimeout(r, 0));
            if (hash.startsWith("000")) break;
        }

        const block = { h: this.chain.length + 1, hash: hash, msg: msg, r: 50, ts: new Date().toLocaleTimeString() };
        this.addBlock(block, true);
        
        document.getElementById('tx-msg').value = '';
        btn.disabled = false; btn.innerText = "ПОДТВЕРДИТЬ БЛОК (PoW)";
    },

    addBlock(block, broadcast) {
        // Простая проверка валидности
        if(this.chain.find(b => b.hash === block.hash)) return;
        
        this.chain.unshift(block);
        localStorage.setItem('axon_p2p_chain', JSON.stringify(this.chain.slice(0, 50)));
        
        if(broadcast && this.conn && this.conn.open) {
            this.conn.send({ type: 'BLOCK', data: block });
        }
        
        this.render();
        this.updateUI();
    },

    syncChain(remoteChain) {
        remoteChain.forEach(b => {
            if(!this.chain.find(x => x.hash === b.hash)) this.chain.push(b);
        });
        this.chain.sort((a,b) => b.h - a.h);
        this.render();
        this.updateUI();
    },

    render() {
        const view = document.getElementById('chain-view');
        view.innerHTML = this.chain.map(b => `
            <div class="block">
                <div style="display:flex; justify-content:space-between; font-size:9px;">
                    <b>BLOCK #${b.h}</b> <span>${b.ts}</span>
                </div>
                ${b.msg ? `<div class="msg-text">MESSAGE: ${b.msg}</div>` : ''}
                <div style="font-size:7px; color:#333; margin-top:5px; word-break:break-all;">HASH: ${b.hash}</div>
            </div>
        `).join('');
    },

    updateUI() {
        const bal = this.chain.reduce((s, b) => s + b.r, 0);
        document.getElementById('ui-bal').innerText = bal.toFixed(4);
        document.getElementById('ui-blocks').innerText = `БЛОКИ: ${this.chain.length}`;
    }
};
window.onload = () => P2P.init();
</script>
</body>
</html>
