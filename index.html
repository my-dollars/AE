<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Satoshi Hyper-Node: Anti-Censorship P2P</title>
    <style>
        :root {
            --bg-dark: #050505;
            --neon-green: #00ff41;
            --gold: #ffd700;
            --matrix-glow: rgba(0, 255, 65, 0.15);
            --interface-border: 1px solid rgba(0, 255, 65, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            color: var(--neon-green);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; height: 100vh;
        }

        /* Matrix Background Animation */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.1;
        }

        #app {
            display: flex; flex-direction: column; height: 100vh;
            border: var(--interface-border); box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        /* Auth Screen */
        #auth-overlay {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; transition: 0.5s;
        }

        .cyber-input {
            background: rgba(0,0,0,0.8); border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 15px; width: 80%; max-width: 400px;
            text-align: center; font-size: 1rem; margin-bottom: 20px;
            box-shadow: 0 0 15px var(--matrix-glow);
        }

        /* Dashboard */
        header {
            padding: 10px 20px; border-bottom: var(--interface-border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 255, 65, 0.05);
        }

        #terminal {
            flex: 1; overflow-y: auto; padding: 20px;
            font-size: 0.9rem; line-height: 1.4; scroll-behavior: smooth;
        }

        .log-entry { margin-bottom: 5px; border-left: 2px solid var(--neon-green); padding-left: 10px; }
        .log-entry.dilithium { color: #88ccff; border-color: #88ccff; } /* Quantum Log */

        #controls {
            padding: 20px; border-top: var(--interface-border);
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            background: #000;
        }

        .stat-box {
            border: var(--interface-border); padding: 10px;
            display: flex; flex-direction: column;
        }

        .val { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }
        .gold { color: var(--gold); text-shadow: 0 0 8px var(--gold); }

        .btn {
            background: transparent; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 12px; cursor: pointer;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }

        .btn:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Mutation: Stealth Proxy Mode */
        body.stealth-active {
            --neon-green: #ffd700; /* Интерфейс становится золотым (режим VIP/Private) */
            filter: hue-rotate(290deg) brightness(1.2);
        }

        @keyframes pulse {
            0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
        }
        .mining { animation: pulse 1s infinite; color: var(--gold); }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="auth-overlay">
    <h2 class="gold">HYPER-NODE P2P</h2>
    <p style="color: var(--neon-green)">QUANTUM-RESISTANT LAYER</p>
    <input type="password" id="seed-input" class="cyber-input" placeholder="ВВЕДИТЕ ВАШ КВАНТОВЫЙ КЛЮЧ (SEED)">
    <button class="btn" onclick="Core.connect()">ИНИЦИАЛИЗИРОВАТЬ УЗЕЛ</button>
    <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.6;">Нет центрального сервера. Ваш ключ — ваш доступ.</p>
</div>

<div id="app">
    <header>
        <div>NODE_ID: <span id="node-id" class="gold">?</span></div>
        <div id="net-status" style="color: var(--gold)">MESH_SYNC: ACTIVE</div>
    </header>

    <div id="terminal">
        <div class="log-entry">Satoshi Protocol v4.0.1 (Post-Quantum) Loaded...</div>
        <div class="log-entry">Ожидание авторизации для обхода DPI...</div>
    </div>

    <div id="controls">
        <div class="stat-box">
            <span>BALANCE (SAT)</span>
            <span id="balance" class="val">0.000000</span>
        </div>
        <div class="stat-box">
            <span>VOTING POWER</span>
            <span id="vp" class="val gold">0 VP</span>
        </div>
        <button id="mine-btn" class="btn" onclick="Core.toggleMining()">START POC MINING</button>
        <button id="dao-btn" class="btn" onclick="Core.triggerDAO()">BIP-001: STEALTH PROXY</button>
    </div>
</div>

<script>
    // --- CORE LOGIC ---
    const Core = {
        userData: { balance: 0, vp: 0, id: "" },
        mining: false,
        rate: 0.000042, // Deflationary starting rate
        
        connect() {
            const seed = document.getElementById('seed-input').value;
            if (seed.length < 6) return alert("Ключ слишком короток для Dilithium-защиты.");
            
            // Генерируем ID на основе "квантового" хеширования (симуляция)
            this.userData.id = btoa(seed).substring(0, 10).toUpperCase();
            this.userData.balance = parseFloat(localStorage.getItem(`bal_${this.userData.id}`)) || 0;
            
            document.getElementById('auth-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                this.log(`Узел ${this.userData.id} вошел в Mesh-сеть.`, 'dilithium');
                this.log("Используется Kyber-1024 для упаковки трафика...");
                this.updateUI();
                this.haptic(100);
            }, 500);
        },

        log(msg, type = '') {
            const t = document.getElementById('terminal');
            const e = document.createElement('div');
            e.className = `log-entry ${type}`;
            e.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            t.appendChild(e);
            t.scrollTop = t.scrollHeight;
        },

        updateUI() {
            document.getElementById('node-id').innerText = this.userData.id;
            document.getElementById('balance').innerText = this.userData.balance.toFixed(6);
            this.userData.vp = Math.floor(this.userData.balance * 100);
            document.getElementById('vp').innerText = `${this.userData.vp} VP`;
            localStorage.setItem(`bal_${this.userData.id}`, this.userData.balance);
        },

        toggleMining() {
            this.mining = !this.mining;
            const btn = document.getElementById('mine-btn');
            btn.innerText = this.mining ? "STOP RELAYING" : "START POC MINING";
            if(this.mining) {
                this.log("Запущен майнинг Proof-of-Connectivity...");
                this.log("Ваш узел ретранслирует зашифрованные пакеты (Bypass DPI)...");
                this.mineLoop();
            }
            this.haptic(50);
        },

        mineLoop() {
            if (!this.mining) return;
            
            // Имитация ретрансляции трафика (реальное решение проблемы блокировок)
            const trafficTargets = ["YouTube_Tunnel", "Twitter_Relay", "Discord_Gateway", "Telegram_Mesh"];
            const target = trafficTargets[Math.floor(Math.random() * trafficTargets.length)];
            
            this.userData.balance += this.rate;
            this.rate *= 0.9998; // Дефляция: сложность растет
            
            this.log(`Пакет передан через ${target}. Награда: +${this.rate.toFixed(8)} SAT`);
            this.updateUI();
            
            setTimeout(() => this.mineLoop(), 2500);
        },

        triggerDAO() {
            this.log("--- GOVERNANCE CHECK ---");
            if (this.userData.vp < 100) {
                this.log("ОШИБКА: Для активации Stealth Proxy нужно минимум 100 VP (майните больше).", "dilithium");
                this.haptic([100, 50, 100]);
            } else {
                this.log("КОНСЕНСУС 51% ДОСТИГНУТ. Мутация протокола...");
                this.haptic(500);
                setTimeout(() => {
                    document.body.classList.add('stealth-active');
                    this.log("ПРОТОКОЛ МУТИРОВАЛ: STEALTH PROXY АКТИВИРОВАН.", "gold");
                    alert("BIP-001 Принят: Весь трафик узла теперь маскируется под HTTPS-запросы к государственным ресурсам.");
                }, 2000);
            }
        },

        haptic(p) { if(window.navigator.vibrate) window.navigator.vibrate(p); }
    };

    // --- MATRIX ANIMATION ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = chars.charAt(Math.floor(Math.random() * chars.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);
</script>
</body>
</html>
