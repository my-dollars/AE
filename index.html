<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA</title>
    <!-- Подключаем библиотеку для связи с твоим сервером на Railway -->
    <script src="https://cdn.socket.io"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 110px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 40px; left: 0; right: 0; padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #111; z-index: 100; }
        .on { color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top">
        <input type="text" id="u" placeholder="NAME" value="USER" style="width: 80px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">ОФЛАЙН</span>
        <input type="text" id="r" placeholder="ROOM" value="777" style="width: 80px;">
    </div>
    <div id="msgs"></div>
    <div class="bot">
        <input type="text" id="i" placeholder="СООБЩЕНИЕ..." style="flex: 1; text-align: left;">
        <button onclick="handle()" id="btn" style="background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 10px; padding: 12px 18px; cursor: pointer; border-radius: 8px;">JOIN</button>
    </div>

    <script>
        let socket, connected = false;
        // ТВОЙ СЕРВЕР ИЗ RAILWAY
        const URL = "https://ae-production.up.railway.app"; 

        function handle() {
            const u = document.getElementById('u').value, r = document.getElementById('r').value, i = document.getElementById('i');
            const btn = document.getElementById('btn');

            if (!connected) {
                socket = io(URL); // Подключаемся к Railway
                socket.on("connect", () => {
                    connected = true;
                    document.getElementById('st').innerText = "ОНЛАЙН";
                    document.getElementById('st').className = "on";
                    btn.innerText = "ОТПРАВИТЬ";
                    socket.emit("join", { user: u, room: r });
                });
                socket.on("update", (d) => {
                    const div = document.createElement('div');
                    div.className = 'm';
                    div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${d.u} • ${d.t}</div>${d.m}`;
                    document.getElementById('msgs').appendChild(div);
                    document.getElementById('msgs').scrollTop = 99999;
                });
            } else if (i.value.trim()) {
                socket.emit("message", { user: u, room: r, msg: i.value });
                i.value = '';
            }
        }
    </script>
</body>
</html>
