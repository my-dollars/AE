<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AXON // MESH CORE 9.0</title>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --accent: #00ff41; --gold: #ffd700; --text: #fff; --dim: #444; --border: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* GATE / AUTH */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; transition: 0.8s cubic-bezier(0.2, 0, 0, 1); }
        .e-ring { position: relative; width: 240px; height: 240px; margin-bottom: 20px; }
        #e-canvas { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 50%; z-index: 10; cursor: crosshair; touch-action: none; }
        .ring-bg { fill: none; stroke: var(--border); stroke-width: 2; }
        .ring-fill { fill: none; stroke: var(--accent); stroke-width: 4; stroke-dasharray: 628; stroke-dashoffset: 628; transition: 0.1s linear; filter: drop-shadow(0 0 10px var(--accent)); }

        .form { width: 100%; max-width: 340px; display: none; flex-direction: column; gap: 12px; }
        .input { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 18px; border-radius: 14px; outline: none; text-align: center; width: 100%; font-size: 14px; }
        .btn { width: 100%; background: var(--accent); color: #000; padding: 18px; border-radius: 14px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }

        /* UI */
        header { padding: 50px 25px 25px; border-bottom: 1px solid var(--border); }
        .bal-val { font-size: 44px; font-weight: 900; letter-spacing: -2px; }
        .node-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 9px; color: var(--accent); background: rgba(0,255,65,0.05); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0,255,65,0.2); margin-top: 12px; font-weight: 700; }

        .net-stats { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border); }
        .s-box { background: var(--bg); padding: 15px 25px; border-right: 1px solid var(--border); }
        .s-label { font-size: 8px; color: var(--dim); text-transform: uppercase; margin-bottom: 4px; }
        .s-num { font-size: 13px; font-weight: 700; color: var(--gold); }

        .viewport { flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .terminal { background: #020202; border: 1px solid var(--border); padding: 20px; border-radius: 16px; font-size: 10px; color: var(--accent); height: 100%; overflow-y: auto; line-height: 1.6; }
        .terminal b { color: #fff; }

        nav { position: fixed; bottom: 0; width: 100%; display: flex; padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); gap: 10px; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- AUTH GATE -->
    <div id="gate">
        <h1 style="font-size: 32px; letter-spacing: 8px; font-weight: 900; margin-bottom: 5px;">AXON</h1>
        <p id="step-desc" style="font-size: 10px; color: var(--dim); margin-bottom: 30px;">[ PHASE 1: ГЕНЕРАЦИЯ SEED ]</p>
        
        <div class="e-ring" id="entropy-ui">
            <svg viewBox="0 0 210 210" style="transform: rotate(-90deg)">
                <circle class="ring-bg" cx="105" cy="105" r="100""")/>>
                <circle id="e-bar" class="ring-fill" cx="105" cy="105" r="100""")/>>
            </svg>
            <canvas id="e-canvas" width="240" height="240"></canvas>
        </div>

        <div class="form" id="setup-form">
            <input type="password" id="p1" class="input" placeholder="МАСТЕР-ПАРОЛЬ (AES-256)">
            <button class="btn" onclick="Core.setup()">СОЗДАТЬ ЗАШИФРОВАННЫЙ УЗЕЛ</button>
        </div>

        <div class="form" id="login-form">
            <input type="password" id="p2" class="input" placeholder="ВВЕДИТЕ ПАРОЛЬ">
            <button class="btn" onclick="Core.login()">РАЗБЛОКИРОВАТЬ</button>
        </div>
    </div>

    <!-- MAIN UI -->
    <header>
        <div style="font-size: 9px; color: var(--dim); letter-spacing: 1px; font-weight: 800;">NETWORK ASSET VALUE</div>
        <div class="bal-val"><span id="bal">0.00000000</span> <span style="font-size: 16px; color: var(--dim); vertical-align: middle;">AXN</span></div>
        <div class="node-tag" id="addr">NODE::OFFLINE</div>
    </header>

    <div class="net-stats">
        <div class="s-box"><div class="s-label">Нагрузка (Load)</div><div class="s-num" id="s-load">0.0%</div></div>
        <div class="s-box" style="border:none;"><div class="s-label">Сложность</div><div class="s-num" id="s-diff">1.024</div></div>
    </div>

    <div class="viewport">
        <div class="terminal" id="term">> ОЖИДАНИЕ КВАНТОВОЙ ИНИЦИАЛИЗАЦИИ...</div>
    </div>

    <nav>
        <button class="btn" id="m-btn" onclick="Core.toggle()" style="display:none">ЗАПУСТИТЬ ТРАНЗИТ</button>
    </nav>

    <script>
        const Core = {
            db: { bal: 0, entropy: [], secret: '', active: false, diff: 1.024 },

            init() {
                const v = localStorage.getItem('AXON_V9_VAULT');
                if(v) {
                    document.getElementById('entropy-ui').style.display = 'none';
                    document.getElementById('login-form').style.display = 'flex';
                    document.getElementById('step-desc').innerText = "ТРЕБУЕТСЯ ДЕШИФРОВКА";
                }
                this.db.bal = parseFloat(localStorage.getItem('AXON_V9_BAL') || 0);
                this.db.diff = parseFloat(localStorage.getItem('AXON_V9_DIFF') || 1.024);
                this.updateUI();
            },

            collect(e) {
                if(this.db.entropy.length >= 250) return;
                const p = e.touches ? e.touches : e;
                this.db.entropy.push(`${p.clientX}${p.clientY}${Date.now()}`);
                document.getElementById('e-bar').style.strokeDashoffset = 628 - (this.db.entropy.length / 250 * 628);
                if(this.db.entropy.length === 250) {
                    document.getElementById('entropy-ui').style.display = 'none';
                    document.getElementById('setup-form').style.display = 'flex';
                    document.getElementById('step-desc').innerText = "[ PHASE 2: ШИФРОВАНИЕ ]";
                }
                if(window.navigator.vibrate) window.navigator.vibrate(2);
            },

            async setup() {
                const pass = document.getElementById('p1').value;
                if(pass.length < 8) return alert("Пароль слишком короткий!");
                const raw = this.db.entropy.join(':') + pass;
                const hashBuf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(raw));
                this.db.secret = Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
                localStorage.setItem('AXON_V9_VAULT', btoa(this.db.secret + ":" + btoa(pass)));
                this.launch();
            },

            login() {
                const pass = document.getElementById('p2').value;
                const vault = atob(localStorage.getItem('AXON_V9_VAULT')).split(':');
                if(btoa(pass) === vault[1]) {
                    this.db.secret = vault[0];
                    this.launch();
                } else {
                    alert("ОШИБКА: НЕВЕРНЫЙ ПАРОЛЬ");
                }
            },

            launch() {
                document.getElementById('gate').style.transform = 'translateY(-100%)';
                document.getElementById('addr').innerText = "ADDR::AX-" + this.db.secret.substring(0, 12).toUpperCase();
                document.getElementById('m-btn').style.display = 'block';
                this.log("<b>NODE ONLINE.</b> Ядро 9.0 запущено.");
                this.log("Смысл: <b>Proof-of-Bandwidth</b> (Ценность через трафик)");
            },

            log(m) {
                const t = document.getElementById('term');
                t.innerHTML = `[${new Date().toLocaleTimeString()}] > ${m}<br>` + t.innerHTML;
            },

            updateUI() {
                document.getElementById('bal').innerText = this.db.bal.toFixed(8);
                document.getElementById('s-diff').innerText = this.db.diff.toFixed(4);
                localStorage.setItem('AXON_V9_BAL', this.db.bal);
                localStorage.setItem('AXON_V9_DIFF', this.db.diff);
            },

            toggle() {
                this.db.active = !this.db.active;
                const b = document.getElementById('m-btn');
                b.innerText = this.db.active ? "ОСТАНОВИТЬ ТРАНЗИТ" : "ЗАПУСТИТЬ ТРАНЗИТ";
                b.style.background = this.db.active ? "#ff3e3e" : "var(--accent)";
                if(this.db.active) this.mesh();
            },

            mesh() {
                if(!this.db.active) { document.getElementById('s-load').innerText = "0.0%"; return; }
                
                // Симуляция "Соседей", которым нужен твой интернет
                const neighbors = ["Node_77", "Stealth_User", "Proxy_X", "Mesh_Peer"];
                const n = neighbors[Math.floor(Math.random()*neighbors.length)];
                const load = Math.random();
                document.getElementById('s-load').innerText = (load * 100).toFixed(1) + "%";

                this.log(`Запрос от <b>${n}</b>: Ретрансляция трафика...`);
                
                setTimeout(() => {
                    const reward = (0.0001 * load) / this.db.diff;
                    this.db.bal += reward;
                    this.db.diff += 0.00005; // Дефляция: сложность растет
                    this.log(`Пакет пропущен. Награда: <b style="color:var(--gold)">+${reward.toFixed(8)} AXN</b>`);
                    this.updateUI();
                    if(window.navigator.vibrate) window.navigator.vibrate(20);
                    setTimeout(() => this.mesh(), 3000 + Math.random()*2000);
                }, 1500);
            }
        };

        const canvas = document.getElementById('e-canvas');
        ['mousemove', 'touchmove'].forEach(e => {
            canvas.addEventListener(e, (ev) => { ev.preventDefault(); Core.collect(ev); }, { passive: false });
        });

        window.onload = () => Core.init();
    </script>
</body>
</html>
