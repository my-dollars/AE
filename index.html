<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛓ Stable-Chat (P2P)</title>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { font-family: sans-serif; background: #0b0d0f; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1e252b; padding: 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; border-left: 4px solid #00ff88; }
        .controls { padding: 15px; background: #161b22; border-top: 1px solid #30363d; display: flex; flex-direction: column; gap: 8px; }
        input { padding: 14px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; font-size: 16px; }
        button { padding: 14px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .label { font-size: 12px; color: #888; margin-bottom: -5px; margin-left: 5px; }
    </style>
</head>
<body>

<div id="chat"></div>

<div class="controls">
    <div class="label">Ключ состыковки (адрес сети)</div>
    <input type="text" id="pair-key" placeholder="Пример: my-secure-bridge-777">
    
    <div class="label">Пароль шифрования сообщений</div>
    <input type="password" id="pass" placeholder="Секретный код">
    
    <input type="text" id="text" placeholder="Введите сообщение..." autocomplete="off">
    <button id="sendBtn">ОТПРАВИТЬ В СЕТЬ</button>
</div>

<script>
    // Инициализация P2P узлов (имитация узлов блокчейна)
    const gun = Gun(['https://gun-manhattan.herokuapp.com']);
    let currentChannel = null;

    // Функция подписки на "адрес" (ключ состыковки)
    function connectToNetwork() {
        const pairKey = document.getElementById('pair-key').value;
        if (!pairKey) return;

        // Если мы уже подписаны, отписываемся (для смены ключа)
        if (currentChannel) currentChannel.off();

        // Подключаемся к "ветке" сети по ключу состыковки
        currentChannel = gun.get('stable-net-' + pairKey).get('tx-history');

        // РЕАКЦИЯ ПО ФАКТУ: слушаем новые транзакции в этой ветке
        currentChannel.map().once(function(data, id) {
            const password = document.getElementById('pass').value;
            if (!password || !data) return;

            try {
                const bytes = CryptoJS.AES.decrypt(data, password);
                const text = bytes.toString(CryptoJS.enc.Utf8);
                if (text) render(text);
            } catch (e) { /* Данные не для нас или неверный пароль */ }
        });
    }

    // Отслеживаем ввод ключа состыковки для переподключения
    document.getElementById('pair-key').onchange = connectToNetwork;

    // ОТПРАВКА (как транзакция USDT)
    document.getElementById('sendBtn').onclick = function() {
        const pairKey = document.getElementById('pair-key').value;
        const password = document.getElementById('pass').value;
        const text = document.getElementById('text').value;

        if (!pairKey || !password || !text) return alert("Заполните все поля!");

        // 1. Шифруем данные
        const encrypted = CryptoJS.AES.encrypt(text, password).toString();

        // 2. Отправляем в ветку, привязанную к ключу состыковки
        gun.get('stable-net-' + pairKey).get('tx-history').set(encrypted);
        
        document.getElementById('text').value = '';
    };

    function render(text) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.textContent = text;
        const chatBox = document.getElementById('chat');
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
