<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | KEY SYSTEM</title>
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; z-index: 10; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 120px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 30px; left: 0; right: 0; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #000; border-top: 1px solid #111; }
        .btn { background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 9px; padding: 12px; cursor: pointer; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .on { color: #00ff88; text-shadow: 0 0 10px #00ff88; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 10px; font-weight: bold; z-index: 200; display: none; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>
    <div class="top">
        <input type="text" id="u" placeholder="ИМЯ" value="USER" style="width: 70px;">
        <span id="st" style="font-size: 9px;">ОФЛАЙН</span>
        <input type="text" id="k" placeholder="КЛЮЧ" style="width: 70px;">
    </div>

    <div id="msgs"></div>

    <div class="bot">
        <div style="display: flex; gap: 10px;">
            <button onclick="genKey()" class="btn" style="flex: 1;">Генерировать ключ</button>
            <button onclick="joinKey()" id="j-btn" class="btn" style="flex: 1;">Войти по ключу</button>
        </div>
        <div id="chat-input" style="display: none; gap: 10px; margin-top: 5px;">
            <input type="text" id="msg" placeholder="СООБЩЕНИЕ..." style="flex: 1; text-align: left;">
            <button onclick="send()" class="btn">ОТПРАВИТЬ</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyANJZ1s5s_GtWs3mIjaO5EjjviII_6WVnk",
            databaseURL: "https://aurachat-f9d4f-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aurachat-f9d4f",
            appId: "1:532846952097:web:cffa6ee762a1bd347dfae0"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let ref = null, curKey = null;

        function notify(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function genKey() {
            const key = "AX-" + Math.floor(10 + Math.random() * 90);
            document.getElementById('k').value = key;
            notify("КЛЮЧ СОЗДАН: " + key);
            connect(key);
        }

        function joinKey() {
            const key = document.getElementById('k').value.trim();
            if(!key) return alert("ВВЕДИТЕ КЛЮЧ");
            notify("КЛЮЧ АКТИВИРОВАН");
            connect(key);
        }

        function connect(key) {
            curKey = key;
            document.getElementById('st').innerText = "ОНЛАЙН";
            document.getElementById('st').className = "on";
            document.getElementById('chat-input').style.display = 'flex';
            
            ref = db.ref('keys/' + key);
            ref.on('child_added', (s) => {
                const d = s.val();
                const div = document.createElement('div');
                div.className = 'm';
                div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${d.u} • ${d.t}</div>${d.m}`;
                document.getElementById('msgs').appendChild(div);
                document.getElementById('msgs').scrollTop = 99999;
            });
        }

        function send() {
            const m = document.getElementById('msg').value;
            const u = document.getElementById('u').value || "ANON";
            if(!m || !ref) return;
            const t = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            ref.push({ u, m, t });
            document.getElementById('msg').value = '';
        }
    </script>
</body>
</html>
