<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AURA | P2P</title>
    <!-- Библиотека для прямой связи браузеров -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top { padding: 25px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; background: #000; }
        input { background: transparent; border: none; border-bottom: 1px solid #222; color: #fff; text-align: center; text-transform: uppercase; font-size: 10px; letter-spacing: 2px; outline: none; }
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; margin-bottom: 120px; }
        .m { border-left: 1px solid #d4af3730; padding-left: 15px; font-size: 13px; }
        .bot { position: fixed; bottom: 40px; left: 0; right: 0; padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid #111; z-index: 100; }
        .btn { background: none; border: 1px solid #d4af37; color: #d4af37; font-size: 9px; padding: 12px; cursor: pointer; border-radius: 5px; text-transform: uppercase; flex: 1; }
        .on { color: #00ff88 !important; text-shadow: 0 0 10px #00ff88; animation: b 2s infinite; }
        @keyframes b { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="top">
        <input type="text" id="u" placeholder="ИМЯ" value="USER" style="width: 70px;">
        <span id="st" style="font-size: 9px; letter-spacing: 2px;">ОФЛАЙН</span>
        <input type="text" id="k" placeholder="КЛЮЧ" style="width: 70px;">
    </div>
    <div id="msgs"></div>
    <div class="bot" id="btns">
        <button onclick="start(true)" class="btn">ГЕНЕРИРОВАТЬ</button>
        <button onclick="start(false)" class="btn">ПРИСОЕДИНИТЬСЯ</button>
    </div>
    <div class="bot" id="chat" style="display: none;">
        <input type="text" id="mi" placeholder="VIBRATION..." style="flex: 1; text-align: left;">
        <button onclick="send()" class="btn" style="flex: 0; padding: 15px 30px;">SEND</button>
    </div>

    <script>
        let b, user;

        function start(isHost) {
            user = document.getElementById('u').value || "USER";
            let key = document.getElementById('k').value.trim();

            if (isHost) {
                // Генерируем короткий ключ для удобства
                key = "AX-" + Math.floor(100 + Math.random() * 899);
                document.getElementById('k').value = key;
            } else if (!key) {
                return alert("ВВЕДИТЕ КЛЮЧ");
            }

            // Создаем P2P узел
            b = new Bugout(key);
            
            b.on("server", (address) => {
                document.getElementById('st').innerText = "ОНЛАЙН";
                document.getElementById('st').className = "on";
                document.getElementById('btns').style.display = 'none';
                document.getElementById('chat').style.display = 'flex';
                addMsg("SYSTEM", "КАНАЛ ОТКРЫТ: " + key);
            });

            // Слушаем сообщения
            b.on("message", (address, data) => {
                addMsg(data.u, data.m);
            });
        }

        function send() {
            const m = document.getElementById('mi').value;
            if (!m) return;
            b.send({ u: user, m: m });
            document.getElementById('mi').value = '';
        }

        function addMsg(u, m) {
            const div = document.createElement('div');
            div.className = 'm';
            div.innerHTML = `<div style="opacity:0.2; font-size:7px;">${u}</div>${m}`;
            document.getElementById('msgs').appendChild(div);
            document.getElementById('msgs').scrollTop = 99999;
        }
    </script>
</body>
</html>
