<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Будущий кошелек</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --accent: #007aff; --bg: #000000; --card: #1c1c1e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .page { display: none; padding: 20px; flex: 1; overflow-y: auto; text-align: center; }
        .active { display: flex; flex-direction: column; justify-content: center; }
        
        .card { background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 20px; }
        input { background: #2c2c2e; border: none; color: white; padding: 15px; width: 100%; box-sizing: border-box; border-radius: 12px; margin-bottom: 10px; font-size: 16px; }
        
        .btn-main { background: var(--accent); color: white; border: none; padding: 18px; border-radius: 15px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; }
        
        /* Нижнее меню */
        .nav-bar { display: none; background: #121212; border-top: 0.5px solid #333; padding: 10px 0; position: fixed; bottom: 0; width: 100%; justify-content: space-around; }
        .nav-item { color: #888; text-decoration: none; font-size: 12px; cursor: pointer; border: none; background: none; }
        .nav-item.active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen" class="page active">
        <h1 style="font-size: 60px; margin: 0;">🏦</h1>
        <h2 style="margin-bottom: 30px;">Будущий кошелек</h2>
        <input type="text" id="node-login" placeholder="Логин">
        <input type="password" id="node-pass" placeholder="Пароль">
        <button class="btn-main" onclick="handleAuth()">Войти в Кошелек</button>
    </div>

    <!-- ЭКРАН КОШЕЛЬКА -->
    <div id="page-wallet" class="page">
        <div class="card" style="background: linear-gradient(135deg, #007aff, #00c6ff);">
            <div style="font-size: 14px; opacity: 0.8;">Баланс</div>
            <div style="font-size: 42px; font-weight: bold;" id="bal">0.00</div>
            <div id="addr-display" style="font-size: 10px; margin-top: 10px; opacity: 0.6;">...</div>
        </div>
        <button class="btn-main" style="background: #2c2c2e;">📤 Отправить</button>
    </div>

    <!-- ЭКРАН МАЙНИНГА (МОЙ ВИД) -->
    <div id="page-mine" class="page">
        <h2>Мой вид (Майнинг)</h2>
        <div class="card">
            <h3 id="mine-blocks">Блоки: 0</h3>
            <button class="btn-main" id="mineBtn" onclick="toggleMining()">ЗАПУСТИТЬ</button>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="nav-bar" id="main-nav">
        <button class="nav-item active-nav" onclick="showTab('wallet', this)">💰 Кошелек</button>
        <button class="nav-item" onclick="showTab('mine', this)">⛏️ Мой вид</button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
