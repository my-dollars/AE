<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVERRIDE // P2P Mesh Node 2026</title>
    <!-- Современный стек: Glassmorphism, CSS Grid, Haptic Ready -->
    <style>
        :root {
            --accent: #ffd700; /* Gold Power */
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --neon: #00ff41;
            --bg: #030303;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        /* 2026 Glassmorphism Design */
        #node-container {
            width: 92%; max-width: 450px; height: 85vh;
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex; flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative; overflow: hidden;
        }

        header {
            padding: 30px; text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; background: var(--neon);
            margin-right: 8px; box-shadow: 0 0 10px var(--neon);
        }

        #stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            padding: 20px; gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 20px; border-radius: 20px;
            display: flex; flex-direction: column;
        }

        .card small { color: rgba(255,255,255,0.4); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .card .val { font-size: 1.4rem; font-weight: 700; margin-top: 5px; color: var(--accent); }

        #live-log {
            flex: 1; overflow-y: auto; padding: 20px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            color: rgba(255,255,255,0.5); line-height: 1.6;
        }

        .log-line { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 4px 0; }
        .log-line b { color: var(--neon); }

        footer { padding: 25px; display: flex; flex-direction: column; gap: 12px; }

        .btn {
            padding: 18px; border-radius: 18px; border: none;
            font-weight: 700; font-size: 14px; cursor: pointer;
            transition: 0.2s; text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-main { background: var(--neon); color: #000; }
        .btn-main:active { transform: scale(0.96); opacity: 0.8; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: #fff; }

        /* Animation for Traffic Visualization */
        .pulse { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--neon), transparent); animation: flow 2s infinite linear; }
        @keyframes flow { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    </style>
</head>
<body>

<div id="node-container">
    <div class="pulse"></div>
    <header>
        <div style="font-size: 12px; opacity: 0.6; margin-bottom: 5px;">OVERRIDE NETWORK v2.6</div>
        <h2 id="node-name">NODE-ACTIVE</h2>
        <div style="margin-top: 10px;"><span class="status-dot"></span><small>MESH SYNC: 100%</small></div>
    </header>

    <div id="stats-grid">
        <div class="card">
            <small>Вклад в сеть</small>
            <span class="val" id="relay-count">0.0 GB</span>
        </div>
        <div class="card">
            <small>Ваш баланс (SAT)</small>
            <span class="val" id="bal">0.0000</span>
        </div>
        <div class="card" style="grid-column: span 2;">
            <small>Польза: Bypass Efficiency</small>
            <div style="display: flex; align-items: baseline; gap: 10px;">
                <span class="val" style="color: #fff;">99.8%</span>
                <small style="color: var(--neon);">DPI-SHIELD ACTIVE</small>
            </div>
        </div>
    </div>

    <div id="live-log">
        <div class="log-line">--- Инициализация протокола OVERRIDE ---</div>
        <div class="log-line">Квантовое шифрование: <b>ML-KEM (Kyber)</b></div>
        <div class="log-line">Статус: Ожидание нагрузки...</div>
    </div>

    <footer>
        <button class="btn btn-main" onclick="App.start()">Активировать Мост</button>
        <button class="btn btn-secondary" onclick="App.useTokens()">Использовать SAT: High Speed</button>
    </footer>
</div>

<script>
    const App = {
        data: { bal: 0, relay: 0, active: false },
        
        start() {
            if(this.data.active) return;
            this.data.active = true;
            this.haptic(70);
            this.log("<b>Узел запущен.</b> Поиск ближайших Mesh-точек...");
            this.runRelay();
        },

        runRelay() {
            if(!this.data.active) return;
            
            const packets = ["YouTube Data", "TG-Media", "CDN-Asset", "Discord-Voice"];
            const p = packets[Math.floor(Math.random()*packets.length)];
            
            this.data.relay += Math.random() * 0.5;
            this.data.bal += 0.0001;
            
            this.log(`Ретрансляция: <b>${p}</b> через Stealth-тоннель... OK`);
            this.updateUI();
            
            setTimeout(() => this.runRelay(), 2000);
        },

        useTokens() {
            if(this.data.bal < 0.01) {
                this.log("<span style='color: #ff4141'>НЕДОСТАТОЧНО SAT.</span> Сначала помогите сети как ретранслятор.");
                this.haptic([50, 50, 50]);
                return;
            }
            this.data.bal -= 0.01;
            this.log("<b>АКТИВАЦИЯ ПРИОРИТЕТА.</b> Весь ваш трафик теперь маскируется под видеозвонки.");
            this.updateUI();
            this.haptic(200);
        },

        log(msg) {
            const l = document.getElementById('live-log');
            const d = document.createElement('div');
            d.className = 'log-line';
            d.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            l.prepend(d);
        },

        updateUI() {
            document.getElementById('bal').innerText = this.data.bal.toFixed(4);
            document.getElementById('relay-count').innerText = this.data.relay.toFixed(1) + " MB";
        },

        haptic(v) { if(window.navigator.vibrate) window.navigator.vibrate(v); }
    };
</script>
</body>
</html>
